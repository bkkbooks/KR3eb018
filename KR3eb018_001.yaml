body:
  text: 卷一多讀書論史稱扁鵲飲上池水故能洞見臟腑其所治病無不立起毋待切脈而後知者也然扁鵲常有而上池水不常有則凡號為醫者脈之名義可不講之有素乎夫經絡府俞陰陽會通玄冥幽微變化極難上古神農黃帝岐伯鬼臾區等神明天縱何可幾及降至叔世即有人焉才高識妙可以仰窺聖域亦須精求典籍上發金匱玉函之藏下集專家授受之旨學以博而漸通心以疑而啓悟如此則借證有資力省功倍所謂將登泰岱舍徑奚從欲詣扶桑非舟莫適今者各承家伎不事讀書附會臆見展轉相迷初學則但知難經脈訣泛濫則空談劉李張朱不知難經時與靈素相左脈訣明系入室操戈仲景專法內經余者不無出入知而不能讀讀而不能解解而不能通其中肯綮固非淺識所能窺測乃如王叔和晉之名醫也所撰脈經欲以發靈蘭之祕建後學之准斯亦勤矣而移易穴道誤決死期開妄人之簧鼓遭後來之指摘況其下焉者乎近者高陽生之僞訣盛行比於鴆毒而家弦戶誦略不可解幸蔡西山戴同父輩大聲疾呼明正其罪乃世猶充耳奉若典謨蓋以師承既謬先入為主封己自限忠告難施將使五臟六腑之盈虛血脈營衛之通塞觸塗成滯胥天下而趨邪說者豈非寡學之故不自登於大道乎嗟乎使學者而志慮淵微機穎明發溯流窮源旁收曲採善讀古今之書扶絶學於將墜雖為執鞭亦所欣慕曾何待上池之水侈為異聞也哉脈位法天地五行論人配天地而稱三才人身儼然一小天地也凡兩間之理無所不應他不具論即如脈之合於五行者粲若指掌請得而陳之北方為坎水之位也南方為離火之位也東方為震木之位也西方為兌金之位也中央為坤土之位也試南面而立以觀兩手之部位心屬火居寸亦在南也腎屬水居尺亦在北也肝屬木居左亦在東也肺屬金居右亦在西也脾屬土居關亦在中也以五行相生之理言之天一生水故先從左尺腎水生左關肝木肝木生左寸心火心火為君主其位至高不可下乃分權於相火相火寓於右腎腎本水也而火寓焉如龍伏海底有火相隨右尺相火生右關脾土脾土生右寸肺金金復生水循環無端此相生之理也更以五行相剋之理言之相火在右尺將來剋金賴對待之左尺實腎水也火得水制則不乘金矣脾土在右關將來剋水賴對待之左關實肝木也土得木製則不侮水矣肺金在右寸將來剋木賴對待之左寸實心火也金得火制則不賊木矣右手三部皆得左手三部制矣而左手三部竟無制者獨何歟右寸之肺金有子腎水可復母讎右關之脾土有子肺金可復母讎右尺之相火有子脾土可復母讎是制於人者仍可制人相制而適以相成也此相剋之理也人誠能體天地之道以保其身脈何有不調者哉提綱論經曰調其脈之緩急大小滑澀而病變定矣蓋謂六者足以定諸脈之綱領也又曰小大滑澀浮沉難經則曰浮沉長短滑澀仲景曰弦緊浮沉滑澀此六者名為殘賊能為諸脈作病滑伯仁曰提綱之要不出浮沉遲數滑澀之六脈夫所謂不出於六者亦其足統表裡陰陽虛實冷熱風寒濕燥臟腑血氣之病也浮為陽為表診為風為虛沉為陰為里診為濕為實遲為在臟為寒為冷數為在腑為熱為燥滑為血有餘澀為氣獨滯此諸說者詞雖稍異義實相通若以愚意論之不出表裡寒熱虛實六者之辨而已如浮為在表則散大而芤可類也沉為在裡則細小而伏可類也遲者為寒則徐緩澀結之屬可類也數者為熱則洪滑疾促之屬可類也虛者為不足則短濡微弱之屬可類也實者為有餘則弦緊動革之屬可類也此皆大概人所易知然即六者之中復有相懸之要則人或不能識似是而非誤非淺矣夫浮為表矣而凡陰虛者脈必浮而無力因真陰脫於下而孤陽浮於上是浮不可以概言表而可升散乎沉為里矣而凡表邪初感之盛者陰寒束於皮毛陽氣不能外達則脈必先沉緊是沉不可以概言里而可攻下乎遲為寒矣而傷寒初退餘熱未清脈多遲滑是遲不可以概言寒而可溫中乎數為熱矣而凡虛損之候陰陽俱虧氣血敗亂者脈必急數愈數者愈虛愈虛者愈數是數不可以概言熱而可寒涼乎微細類虛矣而痛極壅閉者脈多伏匿是伏不可以概言虛而可驟補乎洪弦類實矣而真陰大虧者必關格倍常是弦不可以概言實而可消之乎乃知診法於綱領之中而復有大綱領者存焉設不能以四診相參而欲孟浪任意未有不覆人於反掌間者因形氣以定診論逐脈審察者一成之矩也隨人變通者圓機之用也比如浮沉遲數以定表裡寒熱此影之隨形復何論哉然而形體各有不同則脈之來去因之亦異又不可執一說以概病情也何則肥盛之人氣居於表六脈常帶浮洪瘦小之人氣斂於中六脈常帶沉數性急之人五至方為平脈性緩之人四至便作熱醫身長之人下指宜疏身短之人下指宜密北方之人每見實強南方之人恆多軟弱少壯之脈多大老年之脈多虛醉後之脈常數飲後之脈常洪室女尼姑多濡弱嬰兒之脈常七至故經曰形氣相得者生三五不調者死其可不察於此乎而更有說焉肥盛之人雖曰氣居於表浮洪者是其常也然使肌肉過於堅厚則其脈之來也勢將不能直達於皮膚之上反欲重按乃見若徒守浮洪易見之說以輕手取之則模糊細小本脈竟不能測瘦小之人雖曰氣斂於中沉數者是其常也然使肌肉過於淺薄則其脈之來也勢將即呈於皮膚之間反可浮取而知性急之人脈數是其常也適當從容無事亦近舒徐性緩之人脈遲是其常也偶值倥傯多冗亦隨急數北人脈強是其常也或纍世膏粱或母系南産亦未必無軟弱之形南人脈弱是其常也或先天稟足或習耐勞苦亦間有實強之狀少壯脈大是其常也夭促者多見虛細老年脈虛是其常也期頤者更為沉實室女尼姑濡弱者是其常也或境遇優遊襟懷恬憺脈來亦定沖和嬰兒氣稟純陽急數者是其常也或質弱帶寒脈來亦多遲慢以此類推則人身固有一定之形氣形氣之中又必隨地為之轉移方能盡言外之妙也運氣論嘗讀內經至天元紀論七篇推申運氣玄蘊難窺未嘗不廢書三嘆也夫是天地之綱紀變化之淵源非通於大易洪範曆元律法之說者其敢橫心以解矢口而談哉無惑乎當今之人置而弗講久矣先哲有言曰不明五運六氣簡遍方書何濟如經文所載尺寸反左右交指下稍爾不明生死何從臆斷業已志醫可不沉思力索乎總其大綱在五運之太過不及而勝復所以生也太過者其氣勝勝而無制則傷害甚矣不及者其氣衰衰而無復則敗亂極矣此勝復循環之道出乎自然者也故其在天則有五星運氣之應在地則有萬物盛衰之應在人則有臟腑疾病之應如木強勝土則歲星明而鎮星暗土母受侮子必復之故金行伐木以救困土則太白增光歲星反晦也凡氣見於上則災應於下宿屬受傷逆犯必甚五運互為勝復其氣皆然在病如木勝肝強必傷脾土肝勝不已燥必復之而肝亦病矣燥勝不已火必復之而肺亦病矣此五臟互為盛衰其氣亦皆然也夫天運之有太過不及即人身之有虛實也惟其有虛而後強者勝之有勝而後承者復之無衰則無勝矣無勝則無復矣無勝無復其氣和平焉得有病恃強肆暴元氣泄盡焉得無虛故曰有勝則復無勝則否勝微則復微勝甚則復甚勝復之微甚繇變化之盛衰故經之所載天時地化人事至詳至備蓋以明其理之有合也即如周易三百八十四爻乃開明易道之微妙而教人因易以求理因象以知變故孔子曰書不盡言言不盡意此其大義正與本經相同夫天道玄微本不易測及其至也聖人有所不知故凡讀易者當知易道有此變不當曰變止於此也讀運氣者當知天道有是應不當曰應盡於是也今姑舉其大略或疫氣遍行而一方皆病風溫或清寒傷臟則一時皆犯瀉利或痘疹盛行而多凶多吉期各不同或疔毒遍生而是陰是陽每從其類或氣急咳嗽一鄉並興或筋骨疼痛人皆道苦或時下多有中風或前此盛行痰火諸如此者以衆人而患同病謂非運氣之使然歟至其精微則人多陰受而識者為誰夫人殊稟賦令易寒暄利害不侔氣交使然故凡以太陽之人而遇流衍之氣以太陰之人而逢赫曦之紀強者有制弱者遇扶氣得其平何病之有或以強陽遇火則炎烈生矣陰寒遇水則冰霜至矣天有天符歲有歲會人得無人和乎能先覺預防者上智也能因機辨理者明醫也既不能知而且云烏有者下愚也然運氣亦有不可泥者如肝木素虛脾氣太盛而運值太角肝氣稍實脾氣方平五臟類然又內外兩因隨時感觸雖當太過之運亦有不足之時不及之運亦多有餘之患倘執而不通能無損不足而益有餘乎況歲氣之在天地亦有反常之時故冬有非時之溫夏有非時之寒春有非時之燥秋有非時之暖犯之者病又如春氣西行秋氣東行夏氣北行冬氣南行卑下之地春氣常存高阜之境冬氣常在天不足西北而多風地不滿東南而多濕又況百里之內晴雨不同千里之外寒暄各別則方土不同而病亦因之此皆法外之道也若不知常變之道盛衰之理主客承製之位每每鑿經文以害經意徒欲以有限之年辰概無窮之天道隱微幽顯誠非易見管測求全誠亦陋矣復有不明氣化如馬宗素之流假仲景之名而為傷寒鈐法等書用氣運之更遷擬主病之方治拘滯不通斯為大謬又有偏執己見不信運氣蓋亦未精思耳是以通於運氣者必當順天以察運因變以求氣如杜預之言歷曰治歷者當順天以求合非為合以驗天知乎此而後可以言歷運氣之道獨不然哉若徒爾紛紜執有執無且疑且信罕一成之見圓機之用者未足與議也太素脈論嘗讀太素脈而知其僞也夫脈法創自軒岐用以測病情決死生而已安得徵休徵咎比於師巫甚矣楊上善之好誕也每求其故而不得後見華他擬病人於十年之後以為病去亦十年死病存亦十年死病不能為人死生因勸其人勿治他固漢之異人也此以脈論耶抑以脈中之數論耶意此病所患既深雖藥無效又非急證可以遷延計其短期至久乃驗即如內經所云某病某日篤某日死者是也但他決之於十年之前故後人遂吒為神反至略病而重數上善特有小慧見他之行事托之太素陰祖其意而暢其說學者喜其新奇互相附和妄謂塵埃識天子場屋決元魁好事之流更從而和之欺世盜名所從來久矣就中亦有可録之句如曰脈形圓淨至數分明謂之清脈形散澀至數模糊謂之濁質清脈清富貴而多喜質濁脈濁貧賤而多憂質清脈濁此謂清中之濁外富貴而內貧賤質濁脈清此謂濁中之清外貧賤而內富貴若清不甚清濁不甚濁其得失相半而無大得喪也富貴而壽脈清而長貧賤而夭脈濁而促清而促者富貴而夭濁而長者貧賤而壽豫嘗以此驗人百不失一然考其底蘊總不出乎風鑑使風鑑精則太素無漏義矣至其甚者索隱行怪無所不至並且詆呵正業以為不能窮造化之巧操先知之術孔子曰攻乎異端斯害也已其太素脈之謂夫或曰上善不足論而他亦有遺義耶夫他之技甚精而其說又安能無弊乎天下而盡守他之說也則將使病淺者日深病深者日殆視岐黃為贅疣而藥餌可盡廢臨病不治但委於命弛慎疾之心趨夭枉之路豈不哀乎故以病之不可治而勉求治未必無稍延之歲月以病之或可治而不求治勢將有坐失之機宜須善通他之意而一笑上善之術斯得之矣審象論夫證之不齊莫可端倪而盡欲以三指洞其機則戛戛乎難之矣語云胸中了了指下難明此深心體認不肯自欺之言然脈雖變化無定而陰陽表裡寒熱虛實之應於指下又自有確乎不易之理思之思之鬼神將通之耳一曰比類以晰其似所以明相類之脈比其類而合之辨其異而分之鮮不決之疑矣如遲之與緩似乎同也而遲則一息三至脈小而衰緩則一息四至脈大而徐沉之於伏似乎同也而沉則輕舉則無重按乃得伏則重按亦無推筋乃見數緊滑似乎同也而數則來往急迫呼吸六至緊則左右彈指狀如切繩滑則往來流利如珠圓滑浮虛芤似乎同也而浮則舉之有餘按之不足虛則舉之遲大按之則無芤則浮沉可見中候則無濡之與弱似乎同也而濡則細軟而浮弱則細微而沉微之與細似乎同也而微則不及於細若有若無狀類蛛絲細則稍勝於微應指極細狀比一線弦長似乎同也而弦則狀如弓弦端直挺然而搏指長如長竿過於本位而不搏指短與動似乎同也而短為陰脈無頭無尾其來遲滯動為陽脈無頭無尾其來數滑洪之與實似乎同也而洪則狀如洪水盛大滿指重按稍減實乃充實應指有力舉按皆然牢之與革似乎同也而牢則實大而弦牢守其位革則虛大浮弦內虛外急促結澀代似乎同也而促則急促數時暫止結為凝結遲則暫止澀則遲短澀滯至至帶止三五不調代則動而中止不能自還止數有常非暫之比一曰對舉以明相反之脈有可因此而悟彼令陰陽不亂也如浮沉者脈之升降也以察陰陽以分表裡浮法天為輕清沉法地為重濁也遲數者脈之急慢也脈以四至為平如見五至必形氣壯盛或閏以太息五至皆為無疴之象不及為遲太過為數遲陰在臟數陽在腑數在上為陽中之陰在下為陰中之陽遲在上為陽中之陰在下為陰中之陽虛實者脈之剛柔也皆以內之有餘不足故咸以按而知長短者脈之盈縮也長有見於尺寸有通於三部短只見於尺寸蓋必質於中而後知過於中為長不及於中為短滑澀者脈之通滯也千金曰滑者血多氣少血多故流利圓滑澀者氣多血少血少故艱澀而散洪微者脈之盛衰也血熱而盛氣隨以溢滿指洪大沖湧有餘故洪為盛氣虛而寒血隨以澀應指而細欲絶非絶故微為衰緊緩者脈之張弛也緊為寒傷營血脈絡激搏若風起水湧又如切繩轉索緩為風傷衛氣營血不流不能疾速數見關上形如豆大厥厥動搖異於他部者動也藏於內不見其形脈在筋下者伏也結促者脈之陰陽也陽甚則促脈疾而時止陰甚則結脈徐而時止至於代牢弦革芤濡細弱八脈則又不可對舉也三因盡為偶名不知既非一陰一陽寧必過鑿乎經曰前大後小前小後大來疾去徐來徐去疾去不盛來反盛乍大乍小乍長乍短乍數乍疏是二二脈偶見也不可不知一曰辨兼至者所以明相互之脈大抵脈獨見為證者鮮合衆脈為證者多姑舉一二以例其餘如似沉似伏實大弦長之合為勞極軟浮細之合為濡之類是也合衆脈之形為一證者如浮緩為不仁浮滑為飲浮洪大而長為風眩顛疾之類是也有二合脈有三四合脈者然又有一脈獨見而為病亦多者如浮為風又為虛又為氣此一脈之證合也一曰察平脈以定其常所以明本部之脈而治無病之候未能精稔將有無病妄藥之弊矣如足厥陰肝脈弦細而長足少陰腎脈沉實而滑足太陰脾脈沉軟而緩足少陽膽脈弦大而浮足陽明胃脈浮長而緩足太陽膀胱脈洪滑而長手少陰心脈洪大而散手太陰肺脈浮澀而短手厥陰心包絡脈浮大而散手少陽三焦脈洪大而急手陽明大腸脈浮短而滑手太陽小腸脈洪大而緊一曰準時令者所以見四時之變其狀各自不同脈與之應也十二月大寒至二月春分為初之氣厥陰風木主令經曰厥陰之至其脈弦春分至小滿為二之氣少陰君火主令經曰少陰之至其脈鉤小滿至六月大暑為三之氣少陽相火主令經曰少陽之至大而浮大暑至八月秋分為四之氣太陰濕土主令經曰太陰之至其脈沉秋分至十月小雪為五之氣陽明燥金主令經曰陽明之至短而澀小雪至十二月大寒為六之氣太陽寒水主令經曰太陽之至大而長一曰察真藏脈者所以明不治之脈與決短期往而不返如水之流止而不揚如杯之覆使其在肺則上而微茫下而斷絶無根蕭索使其在腎則解散而去欲藏無入去如解索彈搏而來所藏盡出來如彈石在命門右腎與左腎同但內藏相火故其絶也忽爾靜中一躍如蝦之遊如魚之翔火欲絶而忽焰之象也使其在膀胱則泛濫不收至如湧泉以其藏津液而為州都之官故絶形如此凡斯六者皆脈中至為吃緊之處況有象可求學者精勤則熟能生巧三指多回春之德矣若不揣者乃妄圖形象弄巧成拙最為可笑夫脈理淵微須心領神會未可以言求而可以圖示乎如脈之浮沉大小長短弦細猶可圖也如遲數結促亦何從描畫乎欲學岐黃精蘊而為紙上筌蹄是又執形象而趨於愚妄者矣脈有亢制論經曰亢則害承乃制言太過之害也此關於盛衰疑似之間診者其可忽乎夫亢者過於上而不能下之謂也承者受也亢極則反受制也如火本剋金克之太過則為亢而金之子為水可以制火乘其火虛來復母讎而火反受其制矣比之吳王夫差起傾國之兵以與晉爭自謂無敵越王勾踐乘其空虛已入國中矣在脈則當何如曰陽盛者脈必洪大至陽盛之極而脈反伏匿陽極似陰也此干之上九亢龍有悔也其證設在傷寒或因失於汗下使陽氣亢極鬱伏於內狀似陰證唇焦舌燥能飲水漿大便閉硬小便赤澀然其脈雖沉按之著骨必滑數有力審其失氣穢臭殊常或時躁熱不欲衣被或揚手擲足譫語不休此陽證何疑故經曰其脈滑數按之鼓擊於指下者非寒也此為陽盛拒陰也陰盛者脈必細微至陰盛之極而脈反躁疾陰極似陽也此坤之上六龍戰於野也在傷寒則誤服涼藥攻熱太速其人素本腎虛受寒遂變陰證逼其浮游之火發見於外狀似陽證面赤煩躁大便自利小便淡黃嘔逆氣促鄭聲咽痛然其脈按之必沉細遲微審其渴欲飲水復不能飲此陰證何疑故經曰身熱脈數按之不鼓擊於指下者非熱也此謂陰盛拒陽也乃知凡過極者反兼勝己之化在於學者之細心揣測則諸證無不洞其真僞矣衝陽太溪二脈論夫身之內不過陰陽為之根蒂醫者惟明此二字病之吉凶莫不判然矣故凡傷寒危迫手脈難明須察足脈不知者競相譁笑更有內室寧死不願以為羞恥是又大可哀矣豫請陳其說焉經曰治病必求於本本之為言根也源也世未有無源之流無根之木澄其源而流自清灌其根而枝乃茂自然之經也故善為醫者必責根本而本有先天后天之辨先天之本維何足少陰腎是也腎應北方之水水為天一之源後天之本維何足陽明胃是也胃應中宮之土土為萬物之母腎何以為先天之本蓋嬰兒未成先結胞胎其象中空一莖透起形如蓮蕊一莖即臍帶蓮蕊即兩腎也而命寓焉水生木而後肝成木生火而後心成火生土而後脾成土生金而後肺成五臟既生六腑隨之四肢乃具百骸乃全仙經曰借問如何是玄牝嬰兒初生先兩腎故腎為臟腑之本十二脈之根呼吸之本三焦之源而人資之以為始者也故曰先天之本在腎而太溪一穴在足內踝後五分跟骨上動脈陷中此足少陰所注為腧之地也脾胃何以為後天之本蓋嬰兒既生一日不再食則飢七日不食則腸胃涸絶而死經曰安穀則昌絶谷則亡猶兵家之有餉道也餉道一絶萬衆立散胃氣一敗百藥難施一有此身先資穀氣谷入於胃灑陳於六腑而氣至和調於五臟而血生而人資之以為生者也故曰後天之本在脾而衝陽一穴在足跗上五寸高骨間動脈去陷谷二寸此足陽明所過為原之地也脾胃相為夫婦故列胃之動脈而脾即在其中矣古人見腎為先天之本故著之脈曰人之有尺猶樹之有根枝葉雖枯槁根本將自生見脾胃為後天之本故著之脈曰有胃氣則生無胃氣則死所以傷寒必診太溪以察腎氣之盛衰必診衝陽以察胃氣之有無兩脈既在他脈可勿問也如婦人則又獨重太衝者太衝應肝在足指本節後二寸陷中蓋肝者東方木也生物之始又婦人主血而肝為血海此脈不衰則生生之機猶可望也豫見按手而不及足者多矣將欲拯人於危殆蓋亦少探本之學乎脈有不可言傳論脈之理微自古記之昔在黃帝生而神靈猶曰若窺深淵而迎浮雲許叔微曰脈之理幽而難明吾意所解口莫能宣也凡可以筆墨載可以口舌言者皆跡象也至於神理非心領神會焉能盡其玄微耶如古人形容一胃氣脈也而曰不浮不沉此跡象也可以中候求也不疾不徐此跡象也可以至數求也獨所謂意思欣欣悠悠揚揚難以名狀此非古人祕而不言雖欲名狀之而不可得姑引而不發躍然於言詞之表以待能者之自從耳東垣至此亦窮於詞而但言脈貴有神惟其神也故不可以跡象求言語告也又如形容滑脈而曰替替然如珠之圓轉形容澀脈而曰如雨沾沙形容緊脈而曰如切繩轉索形容散脈而曰如楊花散漫形容任脈而曰寸口丸丸此皆跡象之外別有神理就其言狀正惟窮於言語姑借形似以揣摹之耳豫昔寓泉州開元寺月夜與林淡庵論脈凡脈各設一形似最確之物以體象之至於虛脈曰虛合四形浮大遲軟極其摹擬終不相類林最後曰得之矣譬如發酵饅首竟失遲字之義有羽衣錢存三在傍曰何不比之海䖳浮水林大笑擊節蓋海䖳質柔而大隨波上下若人以手按之則驚而沒矣於浮大遲軟字字逼真然為學究訓詁之語設不善領略者不先於虛脈中發憤參求但守一海䖳浮水於胸中豈非戲論乎故以有限之跡象合無窮之疾病則跡象乃有時而窮以無盡之靈明運有限之跡象則疾病無往而不驗所謂口莫能宣者終成絶學也哉脈無根有兩說論天下之醫籍多矣或者各持一說而讀者不能融會漫無可否則不見書之益而徒見書之害矣又何貴乎博學哉即如脈之無根便有兩說一以尺中為根脈之有尺猶樹之有根叔和曰寸關雖無尺猶不絶如此之流何憂殞滅蓋因其有根也若腎脈獨敗是無根矣安望其發生乎一以沉候為根經曰諸浮脈無根者皆死是謂有表無里孤陽不生夫造化之所以亙萬古而不息者一陰一陽互為其根也使陰既絶矣孤陽豈能獨存乎二說似乎不同久而虛心討論實無二致也蓋尺為腎部而沉候之六脈皆腎也要知兩尺之無根與沉取之無根總為腎水涸絶而無資始之原宜乎病之重困矣又王宗正曰診脈之法當從心肺俱浮肝腎俱沉脾在中州則與叔和之守寸關尺奇位以候五臟六腑之脈者大相徑庭不知宗正亦從經文諸浮脈無根者皆死之句悟入遂謂本乎天者親上本乎地者親下心肺居於至高之分故應乎寸腎肝處乎至陰之位故應乎尺脾胃在中故應乎關然能與叔和之法參而用之正有相成之妙淺工俗學信此則疑彼者皆不肯深思古人之推本立說所以除一二師家授受之外盡屬礙膺許學士之不肯著書以示後來乃深鑑於此弊也夫調息已定然後診脈論經曰常以不病調病人蓋以醫者無病氣靜息勻用自己之呼吸合病人之至數則太過不及之形見矣斯時也如對敵之將操舟之工心如走珠形似木雞不得多語調笑妄論工拙珍玩滿前切勿顧盼絲竹湊耳恍若無聞凡此豈欲矯衆以邀譽哉夫君子之遊藝與據德依仁皆為實學診雖流為賤技非可苟且圖功者也故經又曰診無治數之道從容之葆坐持寸口診不中五脈百病所起始以自怨遺師其咎其諄切垂訓無非欲診者收攝心體忙中習定使彼我之神交而心手之用應也在吾黨學有淵源路無岐惑三指之下自可十得其五但求診者多紛紜酬應酷暑嚴寒舟輿困頓醫者之氣息先已不調則與病者之至數焉能准合又況富貴之家一人抱病親戚填門或粗曉方脈而鼓舌搖唇或偏執己見而黨同伐異或素有不合而傲睨唐突使高潔之士即欲拂衣或故為關切而叮嚀煩絮令通脫之性輒將掩耳或陽與陰擠旁敲暗擊或執流忘源稱寒道熱或但求穩當欲帶消而帶補或反覆不常乃忽是而忽非或小利小害一日而喜懼多端或且疑且信每事而逡巡不決或醫者陳說病機援引經典務欲詳明則指為江湖之口訣或處投藥餌本屬尋常彼實未知則誚為詭異之家風或玄心靜氣不妄問答則謂之簡傲或坦衷直腸無所逢迎則笑其粗疏嗟乎昔人懼病而求醫故尊之過於師保今之醫呈身而售技故賤之下於輿儓所以一進病家除拱揖寒溫之外即好惡是非之中九候未明方寸已亂孰標孰本斷不能行指下之巧矣若夫大雅之彥本期博濟一時而肯苟悅取容貽笑識者哉庸衆人之情固有所不暇盡亦有所不能盡而並有所不屑盡也身當其際一以先聖之道為重誰毀誰譽不屈不昂去留之心灑然得失之念不起意思從容布指安穩呼吸定息至數分明則脈雖幽微可以直窮二豎之情技矣問情論經曰閉戶塞牖系之病者數問其情以從其意蓋欲病人靜而無擾然後從容詢其情委曲順其氣使不厭煩悉其本末之因而治始無誤也乃近世醫者自附於知脈而病家亦欲試其本領遂絶口不言惟伸手就診醫者強為揣摩揣摩偶合則信為神奇揣摩不合則薄為愚昧致兩者相失而訖無成功良足嘆也故仲景曰觀今之醫省疾問病務在口給相對斯須便處湯藥按寸不及尺握手不及足人迎跗陽三部不參動數發息不滿五十短期未至決診九候曾無倣佛明堂闕庭盡不見察所謂管窺而已望聞問切猶人有四肢也一肢廢不成其為人一診缺不成其為醫然必先望次聞次問而後切者所重有甚於切也王海藏云病人拱默惟令切脈試其知否夫熱則脈數寒則脈遲實則有力虛則無力可以脈知也若得病之由及所傷之物豈能以脈知乎其如病家不知此理者衆往往祕其所患以俟醫之先言豈知病固有證似脈同而所患大相剌謬若不先言明白猝持氣口其何能中又如其人或先貴後賤或先貧後富暴樂暴苦始樂始苦及所思所喜所惡所欲所疑所懼之云何其始病所傷所感所起所在之云何以至病體日逐轉移之情形病後所服藥餌之違合必詳言之則切脈自無疑惑今人多偏執己見逆之則拂其意順之則加其病莫如之何然苟設誠致問明告以如此則善如彼則敗誰甘死亡而不降心以從耶夫受病情形百端難盡如初病口大渴久病口中和若不問而概以常法治之寧不傷人乎如未病素脾約才病忽便利若不問而計日以施治寧不傷人乎如未病先有錮疾已病重添新患如不問而概守成法治之寧不傷人乎如疑難證著意根究遽不得情他事閒言反呈真面若不細問而倉卒妄投寧不傷人乎病形篇謂問其病知其處命曰工今之稱為工者問非所問諛佞其間病者欣然樂從及病增更醫亦復如是倣徨醫藥終於不救者多矣故留心濟世者須委曲開導以全仁術未可任意而飄然事外也豫每見縉紳之家凡診內室皆重帷密幄以帛纏手使醫者三指不能盡按而醫亦潦草診視此又不能行望聞問之神妙並切而且失之度其視醫不啻如盜賊然東坡海藏之言豈能家喻而戶說哉惟願病家以病為重不循故習使醫者得盡其長醫者以道自處不蹈陋規使病家誠告以故庶病無遁形而醫者之與病者有相成之功矣
