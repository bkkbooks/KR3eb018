body:
  text: 卷八小序運氣之說微矣得其指歸者不數見焉是編撮其大綱為初學者階梯云耳第曰某年為某政執某藥以治之是守株而待兔也嗚呼麒麟鳳凰不常有世治則見日月薄蝕有常度德盛則免通於其說者可以論運氣矣運氣之教先立其年干分五運支立司天五運者金木水火土也六氣者風寒暑濕燥火也南北二政運有不同上下陰陽脈有不應先立其年者如甲子乙丑之類左右應見乃可以言死生之逆順也其法合十干為五運對十二支為六氣六氣者有主有客天以六氣動而不息上應乎客地以五行靜而守位下應乎主經曰先立其年以明其氣是知司天在泉上見下臨為之始也天干甲乙丙丁戊己庚辛壬癸地支子醜寅卯辰巳午未申酉戌亥土運甲己金運乙庚水運丙辛木運丁壬火運戊癸土君余臣太古占天之始察五氣紀五天而所以立五運也謂望氣之時見黅天之土氣經於心尾角軫四宿之上下臨甲己之方此甲己之所以合為土運也素天之金氣經於亢氐昴畢四宿之上下臨乙庚之方此乙庚之所以合為金運也見玄天之水氣經於張翼婁胃四宿之上下臨丙辛之方此丙辛之所以合為水運也見丹天之火氣經於牛女壁奎四宿之上下臨戊癸之方此戊癸之所以合為火運也惟土運為南政蓋土位居中面南行令故也金木水火四運皆以臣事之北面受令故為北政土之與金木水火猶之有君臣之分耳風寒暑濕燥火者天之陰陽三陰三陽上奉之木火土金水者地之陰陽生長化收藏下應之戊己土也然化氣必以五故甲己化土而居其首土生金故乙庚次之金生水故丙辛次之水生木故丁壬次之木生火故戊癸次之此化氣之序也素問天元紀大論曰甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之素問五運行大論義亦同五天歌木蒼危室柳鬼宿火丹牛女壁奎邊土黅心尾軫角度金素亢氐昴畢前水玄張翼婁胃是下為運氣上經天司天分例六化圖推少陽之右陽明治之陽明之右太陽治之太陽之右厥陰治之厥陰之右少陰治之少陰之右太陰治之太陰之右少陽治之此言客氣陰陽之次序也如上乃少陽司天則下乃厥陰在泉自南面而觀之則太陰在左而陽明在右余仿此司天在泉迭為遷轉故上下異而左右殊也素問天元紀大論曰夫五運陰陽者天地之道也又曰在天為氣在地成形形氣相感而化生萬物矣又曰神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水夫六氣之合於三陰三陽者分而言之則天地之化有氣有形合而言之則陰陽之理標由乎本所謂標本者六氣為本三陰三陽為標有本標中氣圖如主氣之交司於四時者春屬木為風化夏初君火為熱化盛夏相火為暑化長夏屬土為濕化秋屬金為燥化冬屬水為寒化此六化之常不失其序即所謂當其位則正也如客氣之有盛衰逆順者則司天主上在泉主下左右四間各相專王不時相加以為交合此六化之變變有不測即所謂非其位則邪也故正則為德化政令邪則為災變𤯝傷大者之至徐而常少者之至暴而亡而凡為淫勝邪勝相勝相復等變亦何莫非天地六化之氣所致歟子午之上少陰君火丑未之上太陰濕土寅申之上少陽相火卯酉之上陽明燥金辰戌之上太陽寒水巳亥之上厥陰風木如子與午對俱為君火醜與未對俱為濕土寅與申對俱為相火卯與酉對俱為燥金辰與戌對俱為寒水巳與亥對俱為風木是也運則五年一周氣則六期環會六氣分上下左右而行天令十二支分節令時日而司地化然以六氣而加於十二支則有正化對化之不同如厥陰之所以司於巳亥者以厥陰屬木木生於亥故正化於亥對化於巳也少陰所以司於子午者以少陰為君火當正南離位故正化於午對化於子也太陰所以司於醜未者以太陰屬土居中王於西南故正化於未對化於醜也少陽所以司於寅申者以少陽屬相火位卑於君火生於寅故正化於寅對化於申也陽明所以司於卯酉者以陽明屬金酉為西方金位故正化於酉對化於卯也太陽所以司於辰戌者太陽為水辰戌屬土然水行土中而戌居西北為水漸王鄉是以洪範五行以戌屬水故正化於戌對化於辰也一曰正司化令之實對司化令之虛一曰正化從本生數對化從標成數皆以言陰陽之衰盛合於十二辰以為動靜消息者也此說詳具玄珠今錄之以備參考少陰正化午對化子太陰正化未對化醜少陽正化寅對化申陽明正化酉對化卯太陽正化戌對化辰厥陰正化亥對化巳素問天元紀大論云子午之歲上見少陰丑未之歲上見太陰寅申之歲上見少陽卯酉之歲上見陽明辰戌之歲上見太陽巳亥之歲上見厥陰少陰所謂標也厥陰所謂終也標者猶所謂上首也素問天元紀大論曰厥陰之上風氣主之少陰之上熱氣主之太陰之上濕氣主之少陽之上相火主之陽明之上燥氣主之太陽之上寒氣主之所謂本也是謂六元南北二政其面不同司天在泉移位相從甲己之歲是為南政三陰司天則寸不應三陰在泉則尺不應乙庚丙辛丁壬戊癸斯八歲者皆曰北政三陰司天則尺不應三陰在泉則寸不應南北政者即甲己為南政余為北政是也素問至真要大論曰陰之所在寸口何如岐伯曰視歲南北可知之矣謂南政之年南面行令其氣在南所以南為上而北為下司天在上在泉在下人氣應之故寸為上而尺為下左右俱同北面受令其氣在北所以北為上而南為下在泉應上司天應下人氣亦應之故尺應上而寸應下司天應兩尺在泉應兩寸地之左間為右寸右間為左寸天之左間為左尺右間為右尺正與男子面南受氣女子面北受氣之理同也南政之歲厥陰司天則右不應太陰司天則左不應脈有不應者謂陰之所在脈乃沉細不應本脈也天地之間五行金木水火土而已經所謂二火者君相二火也君火以名相火以位君火不用事相火代君行令者也故南政厥陰司天則君火在右故右寸不應太陰司天則君火在左故左寸不應北政之歲厥陰在泉則右不應太陰在泉則左不應厥陰在泉則君火在右故右寸不應太陰在泉則君火在左故左尺不應甲己年為南政乙丁辛癸丙戊庚壬年為北政其法以南政子年起中指端北政子年起中指根俱逆行輪之凡年辰所值之處即其不應之位如南政子起中指端即兩寸不應丑年左寸寅年左尺右數到底皆南政不應之位北政子年起中指根如前右數到底皆北政不應之位司天為上其位在南則面必北其分左右左西右東司天在上故位南面北而命其左右之見左西也右東也在泉為下其位在北則面必南其分左右左東右西下者即言在泉故位北面南而命其左右之見是為在泉之左右間也左東也右西也司天在泉上下異而左右殊也按右二節陰陽六氣迭為遷轉如巳亥年厥陰司天明年子午則左間少陰來司天矣又如初氣厥陰用事則二氣少陰來相待矣六氣循環無已此所以上下左右陰陽逆順有異而見氣候之變遷也司天歌子午少陰為君火丑未太陰臨濕土寅申少陽相火王卯酉陽明燥金所辰戌太陽寒水邊巳亥厥陰風木主初氣起地之左間司天在泉對面數不應之位皆少陰也諸部不應反診較之脈來不應者沉細而幾於不可見也不應之脈皆在兩寸兩尺一為手少陰心經一為足少陰腎經也凡南政之應在寸者則北政應在尺北政之應在寸者則南政應在尺反其診者謂南北相反而診之則或尺或寸之不應者皆可見矣或為覆病者之手而診之則脈見未盡其解也值此不應之脈乃歲運合宜命曰天和之脈不必求治若誤治之反伐天和矣陰之所在其脈不應諸家之注按謂六氣以少陰為君君象無為故少陰所至其脈不應此說殊謬夫少陰既為六氣之一又安有不主氣乎蓋因素問至真要大論言少陰不司氣化殊不知所言不司氣化者言君火不主五運之化非言六氣也如子午之歲上見少陰則六氣分主天地各有所司何謂不立歲氣乎且君為大主豈寄空名於上者乎夫三陰三陽者天地之氣也如素問太陰陽明論曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛自然之道也第以日月證之則日為陽其氣常盈月為陰其光常缺是以潮汐之盛衰隨月消長此陰道當然之義為可知矣人之經脈即天地之潮汐也故三陽所在者脈無不應氣之盈也三陰所在脈有不應者以陽氣有不及氣之虛也而三陰之中又惟少陰獨居乎中又陰中之陰也所以少陰所在為不應蓋亦應天地之虛耳南政少陰司天甲子甲午二年兩寸脈不應少陰在泉己卯己酉二年兩寸脈不應太陰司天己丑己未二年左寸脈不應太陰在泉甲辰甲戌二年左尺脈不應厥陰司天己巳己亥二年右寸脈不應厥陰在泉甲寅甲申二年右尺脈不應北政太陰司天乙丁辛癸丑未八年左尺脈不應太陰在泉丙戊庚壬辰戌八年左寸脈不應厥陰司天乙丁辛癸巳亥八年右尺脈不應厥陰在泉丙戊庚壬寅申八年右寸脈不應少陰司天丙戊庚壬子午八年兩尺脈不應少陰在泉乙丁辛癸卯酉八年兩寸脈不應靈樞禁服篇曰寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人夫曰微大則脈之和可知矣素問至真要大論曰帝曰陰之所在寸口何如夫使陰脈來現沉而不應則與大小齊等之義拂矣五運以甲己土運為尊六氣以少陰君火為尊凡脈之司天在泉不應者皆以少陰而論之故北政之歲人氣面北而寸北尺南地左間之氣在右寸右間之氣在左寸天左間之氣在右尺右間之氣在左尺故乙卯乙酉丁卯丁酉辛卯辛酉癸卯癸酉乃少陰在泉也則兩寸之脈俱不應而北政少陰在泉亦兩寸不應者乃從君不從臣也故不以尺為主而以寸為主耳運氣全書所謂依南政而診尺寸者是也北政之歲丙寅丙申戊寅戊申庚寅庚申壬寅壬申乃厥陰在泉其左間則少陰右間則太陽也宜右寸之脈不應北政厥陰在泉亦右寸之脈不應者亦從君而不從臣也故不以尺為主而以寸為主耳北政之歲丙辰丙戌戊辰戊戌庚辰庚戌壬辰壬戌太陰在泉其左間則少陽右間則少陰也宜左寸之脈不應南政太陰司天則左寸不應北政太陰在泉而亦左寸不應者從君而不從臣也若使北政三陰司天而不在泉則其不應者不在寸而在尺矣故曰北政之歲三陰在下則寸不應若三陰在上則尺不應者此也南政之歲如甲子甲午乃少陰司天則兩寸之脈俱不應如前所云者是也南政之歲如己巳己亥乃厥陰司天其左間則少陰右間則太陽宜右寸之脈不應如前所云者是也南政之歲如己丑己未乃太陰司天其左間則少陽右間則少陰宜左寸之脈不應如前所云者是也若使南政三陰在泉而不司天則其不應者不在寸而在尺矣故曰南政之歲三陰在天則寸不應若三陰在泉則尺不應者此也所謂諸不應者即南北二政而相反以診之則南政主在寸者北政主在尺而南政主在尺者北政主在寸則其脈自明矣素問五運行大論曰不當其位者病迭移其位者病止南政少陰司天在泉北政少陰司天在泉曰失守其位者危論南北二政內行運法甲己為南政餘四運為北政南政司天在泉皆行土運其餘北政皆以在泉行運如北政巳亥厥陰司天則行在泉少陽火運又如寅申少陽司天則行在泉厥陰木運余仿此惟有北政辰戌年太陽司天當行在泉土運緣北政以臣不敢行君之令故行金運是土之子以足木火金水之四運焉尺寸反死陰陽交危謂之反者不應而應應而不應尺寸反也謂之交者隅位相交陰當在左交之於右陽當在右交之左也如尺當不應而反浮大寸當浮大而反沉細寸當不應而反浮大尺當浮大而反沉細是謂尺寸反素問五運行大論曰尺寸反者死如右當不應而反浮大左當浮大而反沉細左當不應而反浮大右當浮大而反沉細經曰左右交者死如其年少陰在左當左脈不應而反見於右陽脈本在右而反互移於左是少陰所易之位非少陽則太陽脈也故曰陰陽交交者死惟辰戌丑未寅申巳亥八年有之如其年少陰在尺當尺不應而反見於寸陽本在寸而反移於尺故曰尺寸反反者死惟子午卯酉年有之然必也尺寸俱反陰陽俱交始為危殆若但本位當應而不應者乃陰氣之不應也止疾而已不在陰陽交尺寸反之例不可膠柱鼓瑟也素問天元紀大論曰尺寸反者死止以南北二政少陰司天在泉論素問五運行大論曰陰陽交者死除少陰司天在泉止以厥陰太陰司天在泉論詳按後世諸圖悉宗仲景然多不合經旨未知果出仲景否也若他書有圖無說其義益晦餘一以經旨為主而補之太過有餘之歲土運甲歲水運丙歲火運戊歲金運庚歲木運壬歲不及不足之紀水連辛歲火運癸歲土運己歲金運乙歲木運丁歲天符說天符者假如丙戌歲丙辛水運歲之本位辰戌太陽寒水司天司天是水又合水運故曰天符歲會說歲會者中運與年支同其氣化也如木運臨卯木火運臨午火之類共八年按八年之外有四年壬寅皆木庚申皆金是二陽年癸巳皆火辛亥皆水是二陰年亦是運與年辰相會而不為歲會者謂不當四年正中之會故也除二陽年則癸巳辛亥二陰年雖不名歲會亦上下五行相佐皆為平氣之歲物在脈應皆必合期無先後也歲會者謂運與歲相會假如甲己化土運而遇辰戌丑未歲是也余仿此推之同天符同大符同歲會者中運與在泉合其氣化也陽年曰同天符陰年曰同歲會如甲辰年陽土運而太陰在泉則為同天符癸卯年陰火運而少陰在泉則為同歲會共十二年太過之運加地氣曰同天符假如庚子庚午年運同陽明燥金同歲會不及之運加地氣曰同歲會假如辛丑辛未年運同太陽寒水順化訣天氣生運曰順化假如甲子年甲己化土子午少陰君火火下生土運余仿此推之天刑訣天氣克運曰天刑假如庚子年乙庚化金子午少陰君火火下剋金運余仿此推之小逆訣運生天氣曰小逆假如壬子壬午年丁壬化木子午少陰君火木上生下火余仿此推之不和訣運克天氣曰不和假如丙子丙午丙丁俱是三江水子午君火水上克下火余仿此推之太乙天符天符者中運與司天相符也如丁年木運上見厥陰風木司天即丁巳之類共十二年太乙天符者如戊午年以火運火支又見少陰君火司天三合為治也共四年天符歲會相合曰太乙天符戊午乙酉己未己丑六十年有此四年太乙天符支德符運與四孟月同曰支德符假如寅屬木春孟月也壬寅歲水運臨之巳屬火夏孟月也癸巳年火運臨之六十年有此四年余仿此六十年中紀運歌運克氣者為不和氣如生運名順化運被氣克天刑多小逆見之運生氣氣運合則天符過干德符運與交司日相合曰干德符甲與己乙與庚之類一年遇此二干天地德合亦為平氣之歲也六氣加臨上下五運六氣相摩相蕩上加下臨六十年之紀不能齊太過之紀有五木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍不及之紀有五木曰委和火曰伏明土曰卑監金曰從革水曰涸流平氣之紀有五木曰敷和火曰升明土曰備化金曰審平水曰靜順太過則乘己所勝而侮所不勝侮反受邪寡於畏也不及則勝己者來欺之子必為母復仇也太過之紀木曰發生之紀生氣宣發謂壬子壬午壬寅壬申壬辰壬戌六年也歲木太過風氣流行脾土受邪偃木飛砂草木早生歲星明見民病腹痛濡泄飲食上走兩脅膈噎不通胃脘當心而痛甚則忽忽眩冒巔疾火曰赫曦之紀陽光盛明謂戊子戊午戊寅戊申四年也歲火太過熱氣流行肺氣受邪陽焰沸騰山川赤地熒惑星明見民病咳逆喘嗽肺痿寒熱血溢血泄甚則身熱膚痛土曰敦阜之紀土余高厚謂甲子甲午甲寅甲申甲辰甲戌六年也歲土太過濕氣流行腎水受邪淫雨水潦田蚊土駒鎮星明見民病七疝驚溏甚則腹大腫滿金曰堅成之紀氣爽成物謂庚辰庚戌二年也歲金太過燥氣流行肝木受邪草木晚生不時霜降太白星明見民病脅痛善恐如人將捕之狀甚則皮膚皴揭水曰流衍之紀流行洋溢謂丙子丙午丙寅丙申丙辰丙戌六年也歲水太過寒邪流行心火受邪雪霜凜冽水澤冰堅辰星明見民病心懸如病飢堅痞甚痛甚則厥逆禁固不及之紀木曰委和之紀委屈少用謂丁丑丁未丁卯丁酉四年也歲木不及燥氣妄行肝反受邪草木晚生黃落凋隕太白光芒民病肋痛支滿復則火令大舉肺氣受制民病咳逆唾血火曰伏明之紀陽氣潛藏謂癸丑癸未癸卯癸酉四年也歲火不及寒氣妄行心反受邪雪霜時降寒氣凜冽辰星光芒民病吐痢腥穢食已不飢復則溫令大舉腎水受制民病膝痛脛腫土曰卑監之紀監化權弱謂己卯己酉己巳己亥四年也歲土不及風氣妄行脾反受邪雨水愆期大風數舉肝木受制民病脅痛金曰從革之紀從順革易謂乙巳乙亥二年也歲金不及熱氣妄行肺反受邪草木焦黃天暑地熱熒惑光芒民病肺痿寒熱咳血復則寒令大舉心火受制民病厥心痛水曰涸流之紀流注乾涸謂辛丑辛未辛巳辛亥四年也歲水不及濕氣妄行腎反受邪陰雨淋潰雪霜晚降鎮星光芒民病膝痛脛腫復則風令大舉脾土受制腹痛濡泄平氣之紀木曰敷和之紀布和榮物謂丁巳丁亥二年也木本不及上逢天符助之得其平也氣化均民病少火曰升明之紀火氣高明謂戊辰戊戌二年也火本太過上逢天刑剋之而得其平也癸巳癸亥二年火本不及上逢順化天氣生之助而得其平也氣化均民病少土曰備化之紀廣被化氣謂己丑己未二年也上逢太乙天符助之得其平也氣化均民病少金曰審平之紀氣清平定謂庚子庚午二年也上逢君火庚寅庚申二年上逢相火天刑剋之減而得其平也乙丑乙未二年上逢順化生之乙卯年逢天符乙酉年逢太乙天符助之得其平也氣化均民病少水曰靜順之紀體清順物謂辛卯辛酉二年也上逢順化生之得其平也氣化均民病少發生委和敷和角赫曦伏明升明徵敦阜卑監備化宮流衍涸流靜順羽堅成從革審平商太過不及平氣紀此圖上者右行下者左行自初至終乃為地之主氣靜而守位者也此逐年主氣之位次也六氣分主四時歲歲如常故曰主氣此逐年客氣也如子午年則太陽為初氣厥陰為二氣少陰為司天為三氣太陰為四氣少陽為五氣陽明為在泉為六氣丑未則厥陰為初氣以次而轉余可仿此類推也此六氣分合六部時日診候之圖家先生所自定者也實具六氣至理乃古今未發之秘須精思而熟玩之以平治之紀為例若太過之紀其氣未至而至從節前十三日為度不及之紀其氣至而未至從節後十三日為度太過之歲從左尺浮分起立春不及之歲從左關中分起立春依次而推之清心調息逐部細究則時令之病可以前知診得六部俱平則已若有獨大獨小獨浮獨沉獨長獨短與各部不同依圖斷之無不驗者假如左關中候脈獨弦大已知雨水後驚蟄邊有風熱之病蓋弦主風而大主熱也且左關又為風木之令故也如右尺沉分脈獨緩滯而實大已知芒種後夏至邊有濕熱之病蓋緩滯主濕而實大主熱若緩滯而虛大乃濕熱相火為患蓋緩滯為濕而虛大為相火也且在沉分沉亦主濕又在相火之位故也久病之人六脈俱見濁滯惟右寸中候脈來從容和緩清淨無滯已知霜降後冬至邊必愈蓋中候而從容和緩為胃氣之佳脈且右寸為肺金之位土來生金故也余仿此而精推之百不失一矣
