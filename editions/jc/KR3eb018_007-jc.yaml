body:
  text: 卷七小序望聞問切古所謂四診也知切矣而略於三者猶欲入戶而闔門其可得哉扁鵲稱聖醫見齊桓而卻步先得於望也予本於經而條晰之附以仲景之說四診之法始全學者尤當熟玩而深味焉望診善診察色變化相移得失在望斷之不疑素問陰陽應象大論曰善診者察色按脈素問移精變氣論曰理色脈而通神明變化相移以觀其妙素問玉機真藏論曰凡治病察其形氣色澤形氣相得謂之可治色澤已浮謂之易已形氣相失謂之難治色夭不澤謂之難已大都氣盛形盛氣虛形虛是相得也故可治氣色明潤血氣相營故易已若形與氣兩不相得色夭枯而不明潤何以圖存乎視色之道積神屬意往今新故可以自必靈樞五色篇曰積神於心以知往今故相氣不微不知是非屬意勿去乃知新故凡已往來今新病故疾先本乎視色不過凝靜精一扁鵲豈有他技乎合色脈之法聖神所最重治病之權輿也色者目之所見脈者手之所持而兩合之下合五行休旺上副四時往來要未可與中人以下者道也合之維何五臟之色在王時見者春蒼夏赤長夏黃秋白冬黑五臟所主外榮之常白當肺當皮赤當心當脈黃當脾當肉青當肝當筋黑當腎當骨五臟之脈春弦夏鉤秋毛冬石強則為太過弱則為不及四時有胃曰平胃少曰病無胃曰死有胃而反見所勝之脈甚者今病微者至其所勝之時而病此非顯明易推者乎五臟六腑各有部分額至闕庭上屬咽喉闕循鼻端五臟之應內眥挾鼻下至承漿屬於六腑表裡各別自顴下頰肩背所主手之部分牙車下頤屬股膝脛部分在足靈樞五色篇曰自額而下闕庭上屬咽喉之部分也自闕中循鼻而下鼻端屬五臟之部分也自內眥挾鼻而下至承漿屬六腑之部分也自顴而下頰屬肩背手之部分也自牙車以下頤屬股膝足之部分也臟腑色見一一可徵庭者首面闕上咽喉闕中者肺下極為心直下者肝肝左為膽肝下屬脾方上者胃中央大腸挾大腸者北方之腎當腎者臍面王以上則為小腸面王以下膀胱子處靈樞五色篇曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也庭者顏也額也天庭也位最高危見於此者上應首面之疾闕在眉心眉心之上其位亦高故應咽喉眉心中部之最高者故應肺下極者在兩目之間心居肺之下故下極應心下極之下為鼻柱肝在心之下故直下應肝膽附於肝之短葉故肝左應膽在鼻柱左右鼻柱之下即準頭也是為面王亦曰明堂準頭屬土居面之中央故以應脾準頭兩旁迎香之上鼻隧是也脾與胃為表裡脾居中而胃居外故方上應胃面肉之中央迎香之外顴骨之下大腸之應也挾大腸頰之上也四藏皆一惟腎有兩四藏居腹惟腎附脊故四藏次於中央而腎獨應於兩頰腎與臍對故當腎之下應臍而主鼻準也小腸為府應挾兩顴故面王之上兩顴之內小腸之應也面王以下者人中也是為膀胱子處之應更有肢節還須詳察顴應乎肩顴後為臂臂下者手目內眥上屬於膺乳挾繩而上為應乎背循牙車下為股之應中央者膝膝下為脛當脛下者應在於足巨分者股巨屈膝臏靈樞五色篇曰顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也部分已精須合色脈五色外見為氣之華如帛裹朱赤色所尚若使如赭其凶難治白如鵝羽不欲如鹽青如蒼璧藍色可憎羅裹雄黃中央正色設如黃土敗絕之應黑如重漆所慮地蒼五色吉凶求之勿失夫氣由髒髮色隨氣華如青黃赤白黑者色也如帛裹朱如鵝羽如蒼璧如羅裹雄黃如重漆或有鮮明外露或有光潤內含者皆氣也氣至而色彰故曰欲曰生若赤如赭白如鹽青如藍黃如土黑如地蒼甚則青如草茲黃如枳實黑如炲赤如衃血白如枯骨或晦黯不澤或悴槁不榮敗色雜呈氣於何有故曰不欲且曰死由此觀之則色與氣固不可須臾離也然而外露者不如內含內含則氣藏外露則氣泄亦猶脈之弦鉤毛石欲其微不欲其甚故如上文所云正取五色之微見方是五臟之外榮否則過於彰露與弦鉤毛石之獨見而無胃氣名曰真藏者何以異乎白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸白則當皮赤則當脈青則當筋黃則當肉黑則當骨此五臟生成篇所載以五色分配五臟及皮脈筋肉骨也白則當皮者以肺色屬白肺主皮毛余仿此五臟之色皆須端滿如有別鄉非時之過靈樞五色篇曰青黑赤黃白皆端滿有別鄉別鄉赤者其色赤大如榆莢在面王為不日此言五色之正端滿合時日者是謂無邪有別鄉者猶言王色之外別部又見一色也如赤見於面王則非其部不當見而見又非其時矣其色上銳首空上向下銳下向左右如法靈樞論從色觀向凡邪隨色見各有所向而尖銳之處即其乘虛所進之方故上銳者以首面正氣之空虛而邪則乘之上向也下銳亦然其在左在右皆同此法五臟五色皆見於面相應於脈寸尺是踐難經十三難曰色之與脈當參相應為之奈何然五臟有五色皆見於面亦當與寸口尺內相應假令色青脈當弦急如色見赤浮大而散色黃緩大色白之徵浮澀而短其色黑者沉濡而滑十三難曰假令色青其脈當弦而急色赤其脈浮大而散色黃其脈中緩而大色白其脈浮澀而短色黑其脈沉澀而滑此言見其色而知其脈也臟位於內色見於面脈見於寸口尺內夫醫者之言診視也視者視其色診者診其脈二者當參相應色青浮澀或大而緩名為相勝浮大而散若小而滑名為相生青者肝色也浮澀而短者肺之脈也大而緩者脾之脈也浮大而散者心之脈也小而滑者腎之脈也假令肝之色而得肺之脈脈勝色矣得脾之脈色勝脈矣得心之脈色生脈矣得腎之脈脈生色矣一臟之色其相勝相生有如是夫余仿此沉濁為內浮澤為外內為臟外為腑以沉浮別之然在色上看非心領不能得察其浮沉以知淺深察其澤夭以觀成敗察其散摶以知遠近視色上下以知病處浮則病淺沉則病深澤則成全夭則敗亡散解者新近摶聚者久遠上則在上下則在下皆以色形知病也色明不顯沉夭為甚若無沉夭其病不甚明澤不粗顯而但見沉夭病必甚也若無沉夭雖不明澤病亦不甚黃赤為風青黑為痛白則為寒黃則為膏潤則為膿赤甚為血此以五色合病也然靈樞五色篇曰其色散駒駒然未有聚其病散而氣痛聚未成也蓋言駒為小馬奔逸不定其色散無定所氣雖聚而痛未成形故凡診視者病之淺深或殊則色之聚散靡定萬不可輕視妄言也面部面上白點腹中蟲積如蟹爪路一黃一白食積何疑兩顴時赤虛火上炎面無血色又無寒熱脈見沉弦將必衄血病人黃色時現光澤為有胃氣自必不死干黃少潤凶災立應赤現兩顴大如拇指病雖小愈必將卒死黑色出庭拇指相似不病卒亡冬月面慘傷寒已至紫濁時病色白而肥氣虛多痰黑而且瘦陰虛火旺目部目赤色者其病在心白病在肺青病在肝黃病在脾黑病在腎黃而難名病在胸中白睛黃淡脾傷泄痢黃而且濁或似煙燻濕盛黃疸黃如橘明則為熱多黃兼青紫脈來必芤血瘀胸中眼黑頰赤乃系熱痰眼胞上下有如姻煤亦為痰病眼黑步艱呻吟不已痰已入骨遍體痠痛眼黑麵黃四肢痿痹聚沫風痰隨在皆有目黃心煩脈大病進目黃心煩脈和病愈目睛暈黃衄則未止目睛黃者酒疸已成黃白及面眼胞上下皆覺腫者指為谷疸心下必脹明堂眼下青色多欲精神勞傷不爾未睡面黃目青必為傷酒面無精光齒黑者危瘰癧赤脈貫瞳者凶一脈一歲死期已終目間青脈膽滯掣痛瞳子高大太陽不足病人面目俱等無疴面黃目青面黃目赤面黃目白面黃目黑此有胃氣理皆不死面赤目白面青目黑面黑目白面赤目青此無胃氣皆死何辭眼下青色傷寒挾陰目正圓者太陽經絕痓病不治色青為痛色黑為勞色赤為風色黃溺難鮮明留飲鮮明者俗言水汪汪也俱指白珠目睛皆鈍不能了了鼻呼不出吸而不入氣促而冷則為陰病目睛了了呼吸出入能往能來息長而熱則為陽病鼻部鼻頭微黑為有水氣色見黃者胸上有寒色白亡血微赤非時見之者死察色精微莫先於目下之精明鼻間之明堂經謂精明五色者氣之華也是五臟之精華上見為五色變化於精明之間某色為善某色為惡可先知也仲景更出精微尤要在中央鼻準毋亦以鼻準在天為鎮星在地為中獄木金水火四藏氣必歸併於中土耶其謂鼻頭色青腹中苦冷者死此一語獨創千古後人每恨卒病論亡莫由仰溯淵源不知此語正其大者蓋厥陰肝木之青色挾腎水之寒威上徵於鼻下徵於腹是為暴病頃之亡陽而卒死耳其謂鼻頭色微黑者有水氣又亙上句之意見黑雖為腎陰之色微黑且無腹病但主水氣而非暴病也謂色黃者胸上有寒寒字傷寒論中多指為痰言胸有積痰也謂色白者亡血白者肺之色肺主上焦以行營衛營不充則鼻色白故知亡血也謂設微赤非時者死火之色歸於土何遽主死然非其時而有其氣則火非生土之火乃剋金之火又主臟燥而死矣鼻頭色黃小便必難鼻頭黃色又主胸中有寒寒則水穀不運故小便難余處無恙鼻尖青黃其人必淋鼻青腹痛舌冷者死鼻孔忽仰可決短期鼻色枯槁死亡將及鼻冷連頤十無一生鼻者屬土而為肺氣之所出入肺胃之神機已絕故枯槁而冷顧其能活乎血脈診血脈者多亦多熱多青多痛多黑久痹赤黑青色皆見寒熱血脈即絡脈肌皮嫩薄者視之可見臂多青脈則曰脫血絡中血脫故不紅而多青毛髮發枯生穗血少火盛毛髮墮落衛疏有風若還眉墮風證難愈頭毛上逆久病必凶血枯不榮如枯草不柔順而勁直小兒疳病多此亦主有蟲形體大體為形形充者氣形勝氣者必主夭亡肥白而氣不充氣勝形者壽考之徵修長黑色有神氣實形實氣虛形虛形盛脈細氣難布息已瀕於危形瘦脈大胸中多氣可斷其死肥人中風形厚氣虛痰壅氣塞火沖暴厥瘦人陰虛血液衰少相火易亢故多勞嗽病人形脫氣盛者死正虛則形脫邪實則氣盛形體充大皮膚寬緩定臻耄耋形體充大皮膚緊急當為夭折形盛氣虛氣盛形虛形澀脈滑形大脈小形小脈大形長脈短形短脈長形滑脈澀肥人脈細羸人脈躁俱為凶候言反常也血實氣虛則體易肥氣實血虛則體易瘦肥者能寒能讀耐瘦者能熱美髯及胸陽明有餘髯少而短陽明不足坐垂一腳因有腰痛行遲者痹或表素強或腰腳痛或有麻木漸成風疾裡實護腹如懷卵物心痛之證持脈而欠知其無病經云陽引而上陰引而下則欠陰陽相引故云無病病亦即愈息搖肩者心中堅急息引胸中上氣者咳息而張口必乃短氣肺痿吐沫掌寒腹寒掌熱陰虛診時病人叉手捫心閉目不言心虛怔忡倉廩不藏門戶不要水泉不止膀胱不藏頭傾視深精神將奪背曲肩隨府將壞矣腰難轉搖腎將憊矣膝為筋府屈伸不能行則僂俯筋將憊矣骨為髓府不能久立行則振掉骨將憊矣眼胞十指腫必久咳死證屍臭舌卷囊縮肝絕口閉脾絕肌肉不滑唇反胃絕髮直齒枯遺尿腎絕毛焦面黑直視目瞑陰氣已絕眶陷系傾汗出如珠陽氣已絕病後喘瀉脾脈將絕目若正圓手撒戴眼太陽已絕聲如鼾睡吐沫面赤面黑唇青人中腫滿唇反出外發眉衝起爪甲肉黑手掌無紋臍凸跗腫面青欲眠目視不見汗出如油肝絕之期在於八日眉傾膽死手足甲青或漸脫落呼罵不休筋絕之期亦如於肝肩息直視心絕立死髮直如麻不得屈伸自汗不止小腸絕也六日而死口冷足腫腹熱臚脹泄利無時乃為脾絕五日而死脊痛身重不可反覆乃為胃絕五日而死耳干背腫溺血屎赤乃為肉絕九日而死口張氣出不能復返乃為肺絕三日而死泄利無度為大腸絕齒枯面黑目黃腰折自汗不休乃為腎絕四日而死齒黃枯落乃為骨絕五臟絕證五臟已奪神明不守故作聲嘶循衣摸床譫語不休陽明已絕妄語錯亂不語失音則為熱病猶或可生脈浮而洪身汗如油喘而不休乃為肺絕汗膩不流脈洪而喘不休真氣外散陽反獨留形如煙燻直視搖頭乃為心絕心為火藏故陽熱獨存煙燻火極焦灼之象唇吻反青漐漐汗出乃為肝絕唇吻屬脾而青色屬木木乘土故曰反環口黎黑柔汗發黃乃為脾絕水色凌土冷汗身黃脾真散越溲便遺失狂言直視乃為腎絕溲便二陰腎臟所司遺失則門戶不閉水精敗絕目背瞳人陰氣先絕陽氣後竭臨死之時身面必赤腋溫心熱陰先脫陰絕於後故赤色見余陽未即盡故腋溫心熱水漿不下形體不仁乍靜乍亂乃為胃絕胃納水穀合肌肉故六腑氣絕足冷腳縮五臟氣絕便利不禁手足不仁手太陰絕則皮毛焦太陰者肺也行氣溫於皮毛者也故氣不榮則皮毛焦而津液去津液去則皮節傷皮節傷則皮枯毛折毛折者則毛先死丙日篤丁日死手少陰絕則脈不通手少陰心也心主脈故手少陰氣絕則脈不通脈不通則血不流血不流則色澤去故面色黑如黧此血先死壬日篤癸日死足太陰絕口唇不榮口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死足少陰絕則骨髓枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫則肉不著骨骨肉不相親則肉濡而卻肉濡而卻故齒長而垢發無潤澤無潤澤者則骨先死戊日篤己日死足厥陰絕筋縮引卵漸及於舌厥陰者肝也肝者筋之合也筋者聚於陰器而絡於舌本故脈不榮則筋縮急筋縮急則引卵與舌故舌卷囊縮此筋先死庚日篤辛日死三陰俱絕眩轉蒙目蒙者為失志失志則志先死死則目蒙也六陽俱絕陰陽相離腠理泄絕汗出如珠旦占夕死夕占旦死診病新久診其脈小色不奪者乃為新病其脈不奪其色奪者乃為久病脈色俱奪乃為久病俱不奪者乃為新病詐病向壁而臥聞醫驚起而目盻視三言三止脈之嚥唾此為詐病若脈和平當言此病須針灸數處服吐下藥然後可愈欲以嚇其詐使彼畏懼不敢言病耳聲診肝呼應角心言應徵脾歌應宮肺哭應商腎呻應羽五臟五聲以合五音素問陰陽應象大論曰視喘息聽音聲而知所苦蓋病苦於中聲發於外有不可誣者也故難經六十一難曰聞其五音以別其病此之謂也大笑不止乃為心病喘氣太息乃為肺病怒而罵詈乃為肝病氣不足息乃為脾病欲言不言語輕多畏乃為腎病前輕後重壯厲有力乃為外感倦不欲言聲怯而低內傷不足攢眉呻吟必苦頭痛叫喊呻吟以手捫心為中脘痛呻吟身重轉即作楚乃為腰痛呻吟搖頭攢眉捫腮乃為齒痛呻吟不起為腰腳痛診時吁氣為屬鬱結凡人籲則氣鬱得以少伸也搖頭而言乃為里痛喉中有聲謂之肺鳴火來乘金不得其平形羸聲啞咽中有瘡肺被火囚肺主聲故耳聲音暴啞風痰伏火曾系喊傷不可斷病聲嘶色敗久病不治氣促喉聲痰火哮喘中年聲濁痰火之殃獨言獨語言談無緒思神他寄思慮傷神傷寒壞證啞為狐惑上唇有瘡蟲食其臟下唇有瘡蟲食其肛風滯於氣機關不利出言蹇澀乃為風病氣短不續言止復言乃為奪氣衣被不斂罵詈親疏神明之亂風狂之類若在熱病又不必論欲言復寂忽又驚呼病深入骨語聲寂寂然者不欲語而欲默也則病本緘默而何以忽又驚呼知其專系厥陰所主何也靜默統屬之陰而厥陰在志為驚在聲為呼況骨節中屬大筋筋為肝合非深入骨節之病不如此也聲音低渺聽不明徹必心膈間有所阻礙空能傳聲氣無阻礙礙則聲出不揚必其胸中大氣不轉出入升降之機艱而且遲可知病在胸膈間矣細心靜聽其情乃得啾然細長頭中之病啾啾然細而長者謂其聲自下焦陰分而上緣足太陽主氣與足少陰為表裡所以腎邪不劑頸而還得從太陽部分達於巔頂腎之本病為呻吟腎氣從太陽經脈直攻於上則腎之呻並從太陽變動而啾唧細長為頭中病也大都濕氣混其清陽之氣所致耳仲景只此三段而上中下三焦受病之處妙義可徹蓋聲者氣之從喉舌而宣於口者也新病之人聲不變小病之人聲不變惟久病苛病其聲乃變古人間隔垣之呻吟而知其病覺無法乎息桑榆子曰精化為氣氣化而神集焉故曰神能御氣則鼻不失息譚紫霄曰神猶母也氣猶子也以神召氣如以母召子凡呼吸有聲者風也非息也守風則散雖無聲而鼻中澀滯者喘也非息也守喘則結不聲不滯而往來有跡者氣也非息也守氣則勞所謂息者不出不入之義綿綿密密若存若亡心不著境無我無人更有何息可調至此則神自返息自定心息相依水火相媾息息歸根金丹之母丘長春云息有一毫之未定命非己有以此言之息之所關於人大矣哉故較之於聲尤所當辨也氣來短促不足以息呼吸難應乃為虛甚素無寒熱短氣難續知其為實無寒熱則陰陽和平而亦短氣不能布息此中焦有礙或痰火為害吸而微數病在中焦中實吸不得入還出復入故脈來微數亦系實證非痰即食可以攻下實則可生虛者不治實則可下中虛吸不盡入而微數者肝腎欲絕焉能救乎上焦吸促下焦吸遠上下暌違何以施療病在上焦氣宜通下病在下焦氣宜達上上下交通病斯愈矣今上焦者吸促而不能通下下焦者吸遠而不能達上上下不交通病豈易治乎至於呼吸動搖振振而氣不載形者必死之證矣天積氣耳地積形耳人氣以成形耳惟氣以成形氣聚則形存氣散則形亡氣之關於形也豈不巨哉然而身形之中有營氣有衛氣有宗氣有臟腑之氣有經絡之氣各為區分其所以統攝營衛臟腑經絡而令充周無間環流不息通體皆靈者全賴胸中大氣主持夫臟腑大經小絡晝夜循環不息必賴胸中大氣斡旋其間大氣一衰則出入廢升降息神機化滅氣立孤危矣若夫息出於鼻其氣布於膻中膻中宗氣主上焦息道恆與肺胃關通或清而徐或短而促足以占宗氣之盛衰所以素問平人氣象論曰乳之下其動應衣宗氣泄也人顧可奔迫無度令宗氣盛喘數急有餘反成不足耶此指呼出為息之一端也其謂起居如故而息有音此肺之絡脈逆也不得臥而息有音者是陽明之逆也蓋見布息之氣關通肺胃又指呼出為息之一端也呼出心肺主之吸入腎肝主之呼吸之中脾胃主之故惟脾胃所主中焦為呼吸之總持設氣積賁門不散兩阻其出入則危急存亡非常之候善養生者使賁門之氣傳入幽門幽門之氣傳二陰之竅而出乃不為害其上焦下焦各分呼出吸入未可以息之一字統言其病矣此義惟仲景知之謂息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿唾沫分其息專主乎呼而不與吸並言似乎創說不知仲景以述為作無不本之內經即前所擬呼出為息二端不足盡之蓋心火乘肺呼氣奔促勢有必至呼出為心肺之陽自不得以肝腎之陰混之耳息搖肩者肩隨息動惟火故動也息引胸中上氣咳者肺金收降之令不行上逆而咳惟火故咳也張口短氣肺痿唾沫又金受火刑不治之證均以出氣之粗名為息耳然則曷不徑以呼名之耶曰呼中有吸吸中有呼剖而中分聖神所不出也但以息之出者主呼之病而息之入者主吸之病不待言矣素問通評虛實論謂乳子中風熱喘鳴肩息以及息有音者不一而足惟其不與吸並言而吸之病轉易辨識然尚恐後人未悉復補其義云吸而微數其病在中焦實也當下之即愈虛者不治在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治見吸微且數吸氣之往返於中焦者速此必實者下之通其中焦之壅而即愈若虛則肝腎之本不固其氣輕浮脫之於陽不可治矣前所指賁門幽門不下通為危急存亡非常之候者此也在上焦者其吸促以心肺之道近其真陰之虛者則從陽火而升不入於下故吸促是上焦未嘗不可候其吸也下焦者其吸遠肝腎之道遠其元陽之衰者則因於陰邪所伏卒難升上故吸遠此真陰元陽受病故皆難治若呼吸往來振振動搖則營衛往返之氣已索所存呼吸一線耳尚可為哉學者先分息之出入以求病情既得其情合之不爽若但統論呼吸其何以分上中下三焦所主乎意微矣問診入國問俗何況治病本末之因瞭然胸臆然後投劑百無一失醫仁術也仁人篤於情則視人猶己問其所苦自無不到之處靈樞師傳篇曰入國問俗入家問諱上堂問禮臨病人問所便使其受病本末胸中洞然而後或攻或補何愁不中乎人品起居凡診病者先問何人或男或女男女有陰陽之殊脈色有逆順之別故必辨男女而察其所合也或老或幼年長則求之於腑年少則求之於經年壯則求之於臟或為僕妾在人下者動靜不能自由寡婦師尼遭逢不偶情多鬱滯形之肥瘦肥人多濕瘦人多火之類此宜在望條然富貴之家多處重幃故須詳問若不以衣帛覆手則醫者見其手亦可得其形之大略矣次問得病起於何日病之新者可攻病之久者可補飲食胃氣肝病好酸心病好苦脾病好甘肺病好辛腎病好鹹內熱好冷內寒好溫安穀則昌絕谷則亡夢寐有無陰盛則夢大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢予甚飢則夢取肝氣盛則夢怒肺氣盛則夢哭短蟲多則夢聚眾長蟲多則夢自擊毀傷嗜欲苦藥問其嗜欲以知其病物性不齊各有嗜欲聲色臭味各有相宜好食某味病在某歲當分順逆以辨吉凶清陽化氣出乎天故天以五氣食人者臊氣入肝焦氣入心香氣入脾腥氣入肺腐氣入腎也濁陰成味出乎地故地以五味食人者酸先入肝苦先入心甘先入脾辛先入肺咸先入腎也凡臟虛必求助於味如肝虛者欲食酸是也此謂之順應者易治若心病而受咸肺病而欲苦脾弱而喜酸肝病而好辣腎病而嗜甘此謂之逆候病輕必危重者必死心喜熱者知其為寒心喜冷者知其為熱好靜惡動知其為虛煩躁不寧知其為實傷食惡食傷風惡風傷寒惡寒此顯然可證者尤須詳問惟煩躁不寧者亦有屬虛然必脈來無神再以他證參之或常縱酒縱酒者不惟內有濕熱而且防其乘醉入房或久齋素清虛固保壽之道然亦有太枯槁而致病者或齋素而偏嗜一物如麵筋熟慄之類最為難化故須詳察始終境遇須辨三常素問疏五過論曰診有三常謂常貴賤常貧富常苦樂也封君敗傷及欲侯王封君敗傷者追悔已往及欲侯王者妄想將來皆致病之因也常貴後賤雖不中邪病從內生名曰脫營常貴後賤者其心屈辱神氣不伸雖不中邪而病生於內營者陰氣也營行脈中心之所主心志不舒則血無以生脈日以竭故為脫營常富後貧名曰失精五氣流連病有所並常富後貧者憂煎日切奉養日廉故其五臟之精日加消敗是謂失精精失則氣衰氣衰則不運故為留聚而病有所並矣常富大傷斬筋絕脈身體復行令澤不息大傷謂甚勞甚苦也故其筋如斬脈如絕以耗傷之故也雖身體猶能復舊而行然令澤不息矣澤精液也息生長也故傷敗結留薄歸陽膿積寒炅故舊也言舊之所傷有所敗結血氣留薄不散則鬱而成熟歸於陽分故膿血蓄積令人寒熱交作也暴樂暴苦始樂後苦皆傷精氣精氣竭絕形亦尋敗樂則喜喜則氣緩苦則悲悲則氣消故苦樂失常皆失精氣甚至竭絕而形體毀阻矣暴怒傷陰暴喜傷陽怒傷肝肝藏血故傷陰喜傷心心藏神故傷陽厥氣上行滿脈去形厥氣逆氣也凡喜怒過度而傷其精氣者皆能令人氣厥逆而上行氣逆於脈故滿脈精脫於中故去形形樂志苦病生於脈治以灸刺形樂者身無勞志苦者心多慮心主脈深思過慮則脈病矣脈病者當治結絡故當隨其宜而灸刺之形樂志樂病生於肉治以針石形樂者逸志樂者閒飽食終日無所運動多傷於脾脾主肌肉故病生焉肉病者或為衛氣留或為膿血聚故當用針石取之形苦志樂病生於筋治以熨引形苦者身多勞志樂者心無慮勞則傷筋故病生於筋熨以藥熨引謂導引形苦志苦病生咽嗌調以甘藥形苦志苦必多憂思憂則傷肺思則傷脾脾肺氣傷則虛而不行氣必滯矣脾肺之脈上循咽嗌故病生焉如人之悲憂過度則喉嚨咽哽食飲難進思慮過度則上焦否隔咽中核塞即其徵也靈樞邪氣臟腑病形篇有調以甘藥終始篇曰將以甘藥不可飲以至劑若素問血氣形志篇則曰治之以甘藥者誤也形數驚恐經絡不通病生不仁按摩醪藥形體勞苦數受驚恐則亦不樂其經絡不通而不仁之病生如𤸆重不知寒熱痛癢也當治以按摩及飲之酒藥使血氣宣暢起居何似起居凡一切房室之燥濕坐臥之動靜所包者廣如肺病好曲脾病好歌腎病好吟肝病好叫心病好妄言之類當一一審之曾問損傷或飲食不當或勞欲不時或為庸醫攻補失宜便利何如熱則小便黃赤大便硬塞寒則小便澄白下利清穀之類曾服何藥如服寒不驗服熱不靈察證與脈思當變計有無脹悶胸腹脹悶或氣或血或食或寒或虛皆當以脈合之性情常變一一詳明病者大都喜怒改常病證問病不答必系耳聾即當詢之是素聾否不則病久或經汗下過傷元氣問而懶答唯點頭者是中氣虛昏憒不知問是暴厥抑是久病婦女僵厥多是中氣須問怒否婦人凡病當問月水或前或後師尼寡婦氣血凝滯兩尺多滑不可言胎室女亦同心腹脹痛須問舊新產後須問坐草難易惡露多少飲食遲早生子存亡飲食失節若問病處按之而痛止者為虛按之而痛甚者為實痛而不易知為死血痛無定者知其為氣凡問百病晝則增劇夜則安靜氣病血否夜則增劇晝則安靜血病氣否晝熱夜靜陽氣獨旺入於陽分晝靜夜熱陽氣下陷入於陰中晝夜俱熱重陽無陰亟瀉其陽而補其陰晝夜俱寒重陰無陽亟瀉其陰而補其陽四肢作痛天陰轉甚必問以前患黴瘡否附辨舌張三錫曰金鏡錄載三十六舌辨傷寒之深淺吉凶可稱詳備然細討究不過陰陽表裡寒熱虛實而已陶節庵曰傷寒邪在表則舌無胎熱邪在表則胎漸生自白而黃黃而黑甚則黑裂矣黑胎多凶若根黑或中黑或尖黑或屬裡熱全黑則熱極而難治常見白胎燥渴虛而微熱或不得汗或胃中少有飲而不行宜溫解白滑胎虛寒冒寒陽氣不振宜溫白胎起芒刺津液不足胃中有物宜運動黃胎微熱熱漸入里或燥渴之象宜清解灰色胎胃中有物中氣虛熱渴而不能消飲者宜溫解黑色胎熱入裡實燥厚者宜下滑潤者水困火宜溫雖黑而潤所謂水極似火也不燥為異凡傷寒辨舌者以舌屬心而主火寒為水也水寒凌火外感挾內傷宿食重而結於心下者五六日舌漸黃或中干而邊潤名中焙舌此則裡熱尚淺若全乾無論黃黑皆屬裡證分輕重下之若曾經下或屢下不減乃宿滯結於中宮也詢其脈之虛實及中氣何如實者潤而下之虛人神氣不足當生津固中氣有用生脈散對解毒湯而愈者有用附子理中湯冷服而愈者一則陰極似陽一則陽極似陰不可不辨白胎屬寒外證煩躁欲坐臥於泥水中乃陰寒逼其無根失守之火而然脈大不鼓當從陰證治若不大躁嘔吐者從食陰治之產後辨舌者以心主血也經云少陰氣絕則血不行故舌紫黑者為血先死凡見黑舌要問曾食酸甜咸物否能染成黑色凡視舌色雖有成見亦必細審兼證及脈之虛實不爾恐有毫釐千里之謬
