body:
  text: 劉敘云間期叔李先生無所不通醫特其緒餘也醫中之著述甚富匯辨特其一斑也憶數年前匯辨將脫稿先子節欲付梓先生曰請姑俟之以後先生客湘江客天中客濟上如冥鴻絕影慕者無從凡習岐黃家言者以僕父子與先生交契索匯辨者踵相接不得而去則誤以為有所秘惜至庚戌春先生始南還僕聞之大喜迎至敝廬邀諸騷人酒徒酣飲徹晝夜見先生之貌益腴氣益斂退然如不能出言詞僕外父仲謀彭先生語人曰吾見期叔者數矣每一引滿慷慨而談信心沖口一歸於行誼之正雖老生宿儒無不斂手而聽他若十洲洞冥杜陽諾皋之書又於見聞之表自闢天地乃今何以遂懸絕也是蓋必有所進矣暇日先生偶出其詩文若干卷外父字字稱賞既為序而藏之最後得其匯辨稿十卷而愈見仁人用心之勤也蓋自高陽之偽訣興中材之士不知有叔和更何知有靈素而脈始不可問矣先生乃為詮次古今辨駁之語類成是編折衷一理彌淪萬言讀之不啻千門萬戶五花八陣初見者不無心怵目眩至徐察焉次第秩然剪除謬種俾天下後世復見先聖之旨其功詎不大哉嗟乎輸般之巧孫吳之奇實非徑庭要在習與不習耳先生家有賜書手不釋卷兼之姿悟非常其遊屐幾遍海內需以歲月之久得成專書然後問世其耽玩道真承接聖緒誠非淺人所能喻者寧惟收撮漂零隨世裒掇而已哉是書也先子每贊成之至光夏遂睹厥成敢不慫恿流布公諸同好行見子云藻翰獨留千金聊復識數言於簡端一以慰曏者索書諸君子之誠亦以成先子未竟之志云耳康熙丙午竹醉日武原劉光夏頓首拜題於岩綠居自敘余浪遊者三十年托刀圭以餬口而無以辭負笈者顧其中胡能不自愧也所慨俗醫稱津筏者則先難經脈訣難經出自秦越人其純駁固未易論尤怪脈者所以定吉凶決死生至淵微也苟阡陌之不存又何有於源季宋之高陽生一妄庸人假晉太醫令王叔和之名著成脈訣其鄙俚紕繆取資捧腹而陰操入室之戈於是先聖之旨一旦晦蝕世之裒然傳業承訛襲舛不復有所取裁譬渴者飲於濁涇之流呶呶而號於眾曰天下之水味在是豈其然乎余不敏思有以拯之乃匯古今之論脈者若干人參以家學片言隻字有當先聖而結妄庸之舌則拈之紙星霜十易積成徑寸門人輩請釐剔成編乃區為十卷名曰脈訣匯辨命收之敝簏客曰固矣哉子也凡書之有作不藏諸名山必傳之通邑大都將以救斯世詔來者君之所結集何難羽翼經傳而馳海內僅僅衣缽於及門似乎靳於問世者何居余起而謝曰足下之沾沾於吾者不虞人之睊睊耶余嘗皈依古先生竊聞其教矣錯下一轉語墮野狐身五百世使余所綴集果醍醐也往乞一玄晏而懸之國門誰曰不宜或猶未也淹博者笑其摭拾通達者笑其割裂抱匱守殘之徒更笑其迂而無當將見習高陽生之言者不必樹旗鼓而實逼處此即以一丸泥自封余復奈之何哉雖然謹聞命矣姑付之剞劂氏以就正長者徐俟大國之賦左提右挈廓清邪說願以是編為前驅之殳凡例一茲編第欲剪除偽訣故援引群書專主辨駁以洞筋擢髓之談為考同伐異之事一出一入良具苦心不敢杜撰一字獲罪古今也一李瀕湖先生脈法辨晰最精家先生取而推廣之所著正眼一書自當並垂不朽惜其原刻未及校訂不惟魯魚亥豕已也今刻中二十八脈一遵正眼而沐浴所聞細加簡閱並附先生晚年未盡之秘故卷帙倍之一家先生高材碩德為海內賢士大夫迫而成醫雖生徒滿宇內誓不傳之子弟慮為趙括之續也余客海虞盡得繆慕臺先生遺稿並周梅屋先生之獨得編朝夕研窮乃於脈理頗窺涯略更參以會稽張景岳先生之類經遂洞若觀火西江喻嘉言武林張卿子盧子繇皆稱莫逆教益弘多潘鄧林之醫燈續焰良備採掇所謂聚腋成裘博雅者自知之也一叔和脈經間有奧句初學苦其難入乃仿宋崔紫虛真人四言脈訣以便記誦不過藉此以為綱領而已後之引釋條分縷晰或有少裨焉一脈中所列主病寒熱虛實止能標其大綱余者要須意及之當為通敏者所諒也一所引證悉本靈素未免有以經釋傳之嫌然此欲為初學津梁務從明白知我罪我其在斯乎一余在癸巳歲始留意診法槎溪里中晤諸同門程子公來顧子則思戴子交庶一見投契余有不逮盡力指示皆謂余必能超乘而上三十年來家先生之著述屢經兵燹散佚者過半至有邑中同姓鏟去姓氏冒以己名行世者余雖不肖今得漸與補訂皆已輯成全書次第剞劂則余之能傳其家學者三子相成之功居多不敢忘也一引用諸書皆標出所自便於稽考至近代群賢筆之所至未遑一一註明淹博者自知之余非敢掠美也甲辰秋日期叔氏識於湘江之旅泊庵
