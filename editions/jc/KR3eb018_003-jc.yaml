body:
  text: 卷三小序叔和脈經似無遺用乃長短二脈缺而不載牢革二脈混而不分未盡厥旨也王常闢偽訣七表八里之陋是矣而復增長數二脈為九表短細二脈為十里又何說哉脈之動靜固陰陽所生其變化不皆為名數所限也是編二十八脈悉皆即義辨形衷極理要至於主病略同者則不加詮釋引而申之在於達者浮脈陽體象浮在皮毛如水漂木舉之有餘按之不足浮之為義如木之浮水面也其脈應於皮毛故輕手可得如水中漂木雖按之使沉亦將隨手而起主病浮脈為陽其病在表左寸浮者頭痛目眩浮在左關腹脹不寧左尺得浮膀胱風熱右寸浮者風邪喘嗽浮在右關中滿不食右尺得浮大便難出六腑屬陽其應在表故浮主表病也高巔之上惟風可到雜亂其清陽之氣痛眩之自來肝為風木之藏風勝則木張而肋脹膀胱受風風勝熱淫津液自燥故令小便秘澀肺受風邪清肅之令不行氣高而喘嗽風木乘脾中氣憊而食減腎家通主二便風客下焦大府燥而不快兼脈無力表虛有力表實浮緊風寒浮緩風濕浮數風熱浮遲風虛浮虛暑憊浮芤失血浮洪虛熱浮濡陰虛浮澀血傷浮短氣病浮弦痰飲浮滑痰熱浮數不熱瘡疽之兆脈非一端必有兼見之象或外而偏於六淫或內而偏於七情則脈將雜至然後揆其輕重以別病情如浮脈當即見於皮毛而取之無力此氣不能應表虛之象如力來太過表實何疑緊則緊斂寒之性也風中有寒緩則緩惰濕之性也風中有濕數乃過於鼓動為風熱相搏遲乃徐徐而至為風虛無力暑傷乎氣氣泄則脈虛營行脈中血失則脈芤一則浮取之而如無氣外泄也一則浮取之而則有血中脫也炎炎上蒸火之象也但浮則有表無里故曰虛熱衰薄之甚若無其下故曰陰虛脈浮而澀乃肺脈之應於秋者若加以身熱則火盛金衰血日以損浮澀而短乃肺家之本脈其象過短是真氣不能會於寸口以成權衡氣將竭矣水飲應沉而言浮者上焦陽不能運隨著停留若浮而滑者則非弦斂不鼓之象寒當化熱飲當成痰浮數理應發熱其不發熱而反惡寒者若有一定不移之痛處瘡疽之兆矣按浮脈法天輕清在上之象在卦為乾在時為秋在人為肺素問玉機真藏論曰其氣來毛而中央堅兩旁虛此謂太過病在外其氣來毛而微此謂不及病在中又曰太過則氣逆而背痛不及則喘少氣而咳上氣見血素問平人氣象論曰平肺脈來厭厭聶聶如落榆莢曰肺平病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死然肺掌秋金天地之氣至秋而降況金性重而下沉何以與浮脈相應耶不知肺金雖沉而所主者實陽氣也乃自清濁肇分天以氣運於外而攝水地以形居中而浮於水者也是氣也即天之謂也人形象天故肺主氣外應皮毛陽為外衛非皮毛乎此天之象也其包裹骨肉腑臟於中此地之象也血行於皮里肉腠晝夜周流無端此水之象也合三者而觀非水浮地天攝水地懸於中乎所以聖人作易取金為氣之象蓋大氣至清至剛至健屬乎金者也非至剛不能攝此水非至健不能運行無息以舉地之重故以氣屬金厥有旨哉王叔和云舉之有餘按之不足最合浮脈象天之義黎氏以為如捻蔥葉則混於芤脈矣崔氏云有表無里有上無下則脫然無根又混於散脈矣偽訣云尋之如太過是中候盛滿與浮之名義有何干涉乎須知浮而盛大為洪浮而軟大為虛浮而柔細為濡浮弦芤為革浮而無根為散浮而中空為芤毫釐疑似相去千里矣沉脈陰體象沉行筋骨如水投石按之有餘舉之不足沉之為義如石之沉水底也其脈近在筋骨非重按不可得有深深下沉之勢主病沉脈為陰其病在裡左寸沉者心寒作痛沉在左關氣不得申左尺得沉精寒血結右寸沉者痰停水蓄沉在右關胃寒中滿右尺得沉腰痛病水五臟屬陰其應在裡故沉主裡病也心失煦燠之權為寒所制則痛木失條達之性為寒所遏則結腎主精血若有陰而無陽譬之水寒則凝肺位高脈浮布一身之陰陽者也倘使倒置則真氣不運而或痰或水為害脾胃喜溫不浮不沉是其候也脈形偏於近下則土位無母何以運行三焦熟腐五穀中滿吞酸之證至矣腰臍以下皆腎主之右腎真火所寓而元陽痼冷則精血衰敗腰腳因之不利病水者腎居下焦統攝陰液右為相火火既衰熄則陰寒之水不得宣泄兼脈無力裡虛有力裡實沉遲痼冷沉數內熱沉滑痰飲沉澀血結沉弱虛衰沉牢堅積沉緊冷疼沉緩寒濕無力里原非實但氣不申有力有物在裡沉為在裡而復遲虛寒可必沉為在裡而加數伏熱何疑滑則陰凝之象也見於沉分宜有痰飲澀則血少之徵也按而後得應為積血沉為陰弱為虛沉弱必主陰虛沉為里牢為積沉牢定為痼冷沉而緊則寒為斂實故冷痛也沉而緩則陽不健行故濕成焉按沉脈法地重濁在下之象在卦為坎在時為冬在人為腎素問玉機真藏論曰黃帝曰冬脈如營何如而營岐伯對曰冬脈腎也北方之水也萬物所以合藏其氣來沉以軟故曰營其氣如彈石者此為太過病在外令人解㑊脊脈痛而少氣不欲言其虛如數者此謂不及病在中令人心懸如飢脛中清脊中痛小腹痛小便黃赤素問平人氣象論曰平腎脈來喘喘累累如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死楊氏曰如綿裹砂內剛外柔審度名義頗不相戾偽訣云緩度三關狀如爛綿則是弱脈而非沉脈矣若緩度三關尤不可曉須知沉而細軟為弱脈沉而弦勁為牢脈沉而著骨為伏脈剛柔淺深之間宜熟玩而深思也腎之為藏配坎應冬萬物蟄藏陽氣下陷冽為雪霜故脈主沉陰而居里若誤與之汗則如飛蛾出而見湯矣此叔和入理之微言後世之司南也遲脈陰體象遲脈屬陰象為不及往來遲慢三至一息遲之為義遲滯而不能中和也脈以一息四至為和平遲則一息三至氣不振發行不如度故曰屬陰主病遲脈主藏其病為寒左寸遲者心痛停凝遲在左關癥結攣筋左尺得遲腎虛便濁女子不月右寸遲者肺寒痰積遲在右關胃傷冷物右尺得遲藏寒泄瀉小腹冷痛五臟為陰遲亦為陰是以主藏陰性多滯故陰寒之證脈必見遲也正如太陽隸於南陸則火度而行數隸於北陸則水度而行遲即此可以徵陰陽遲速之故矣難經九難曰遲者藏也又曰遲則為寒傷寒論亦曰遲為在藏以陽氣伏潛不能健行故至數遲耳其所主病與沉脈大約相同但沉脈之病為陰逆而陽郁遲脈之病為陰盛而陽虧沉則或須攻散遲則未有不大行溫補者也兼脈有力冷痛無力虛寒浮遲表冷沉遲裡寒遲澀血少遲緩濕寒遲而有力有壅實不通利之意痛可想見遲雲陽伏而又無力豈非虛寒浮則表之候也沉則里之候也兼遲而為寒可必血得熱則行濕得熱則散遲乃寒象何以養營而燥濕乎按遲脈之象上中下候皆至數緩慢偽訣云重手乃得是沉脈而非遲脈矣又云狀且難是澀脈而非遲脈矣一息三至甚為分明而云隱隱是微脈而非遲脈矣遲而不流利則為澀脈遲而有歇止則為結脈遲而浮大且緩則為虛脈至於緩脈絕不相類夫緩以寬縱得名遲以至數不及為義故緩脈四至寬緩和平遲脈三至遲滯不前然則二脈迥別又安可溷哉以李瀕湖之通達亦云小駛於遲作緩持以至數論緩脈是千慮之一失也叔和曰一呼一至曰離經二呼一至曰奪精三呼一至曰死四呼一至曰命絕此損之脈也一損損於皮毛二損損於血脈三損損於肌肉四損損於筋五損損於骨是知脈之至數愈遲此時正氣已無陰寒益甚不過燼燈之餘焰有不轉眼銷亡者乎數脈陽體象數脈屬陽象為太過一息六至往來越度數之為義躁急而不能中和也一呼脈再動氣行三寸一吸脈再動氣行三寸呼吸定息氣行六寸一晝一夜凡一萬三千五百息當五十周於身脈行八百一十丈此經脈周流恆常之揆度若一息六至豈非越其常度耶氣行速疾故曰屬陽主病數脈主府其病為熱左寸數者頭痛上熱舌瘡煩渴數在左關目淚耳鳴左顴發赤左尺得數消渴不止小便黃赤右寸數者咳嗽吐血喉腥嗌痛數在右關脾熱口臭胃反嘔逆右尺得數大便秘澀遺濁淋癃火性急速故陽盛之證脈來必數六腑為陽數亦為陽是以主府難經九難曰數者府也又曰數則為熱傷寒論亦曰數為在府此以遲數分陰陽故即以配臟腑亦不過言其大概耳至若錯綜互見在腑有遲在臟有數在表有遲在裡有數又安可以臟腑二字拘定耶火亢上焦清陽擾亂而頭痛舌乃心之苗熱則生瘡而煩渴肝開竅於目熱甚而淚迫於外耳鳴者火逞其炎上之虐耳左顴肝之應也熱乃赤色見焉天一之原陰水用事熱則陰不勝陽華池之水不能直達於舌底故渴而善飲溲如膏油便赤又其小者矣肺屬金而為嬌臟火其仇讎火來乘金咳嗽之媒也肺火獨熾則咽喉時覺血腥咽津則痛乃失血之漸脾胃性雖喜燥若太過則有燥烈之虞胃為水穀之海熱甚而釀成穢氣食入則吐是有火也腎主五液飢飽勞役及辛熱厚味使火邪伏於血中津液少而大便結矣兼脈有力實火無力虛火浮數表熱沉數里熱數而有力聚熱所致數而無力熱中兼虛浮脈主表沉脈主裡兼數則熱可知按數脈與遲脈為一陰一陽諸脈之綱領偽訣立七表八里而獨遺數脈止歌於心臟其過非淺數而弦急則為緊脈數而流利則為滑脈數而有止則為促脈數而過極則為疾脈數如豆粒則為動脈非深思不能辨別也叔和云一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命盡乃知脈形愈數則受證愈熱肺部見之為金家賊脈秋月逢之為克令凶徵脈之為道博而言之其象多端約而言之似不外乎浮沉遲數而已浮為病在表沉為病在裡數則為病熱遲則為病寒而又參之以有力無力定其虛實則可以盡脈之變矣然有一脈而兼見數證有一證而相兼數脈又有陽證似陰陰證似陽與夫至虛有盛候大實有羸狀其毫釐疑似之間淆之甚微在發汗吐下之際所繫甚大苟偏執四見則隘焉勿詳必須二十八字字字窮研則心貫萬象始而由粗及精終乃從博反約稱曰善診其無愧乎滑脈陽中之陰體象滑脈替替往來流利盤珠之形荷露之義滑者往來流利而不澀滯也故如盤中之走珠荷葉之承露形容其旋轉輕脫之狀主病左寸滑者心經痰熱滑在左關頭目為患左尺得滑莖痛尿赤右寸滑者痰飲嘔逆滑在右關宿食不化右尺得滑溺血經郁滑脈勢不安定鼓盪流利似近於陽故曰陽中之陰不腐不化之物象亦如之故主痰液有物之類為多心主高拱百邪莫犯如使痰入包絡未免震鄰東風生於春病在肝目者肝之竅肝風內鼓則熱生邪害空竅腎氣通於前陰膀胱火迫故莖痛尿赤肺有客邪積為痰飲則氣不宣揚而成嘔逆食滯於胃脈必緊盛滑則相近於緊故脾胃見之知其宿食右尺火部滑為太過血受火迫而隨溺出經郁者非停痰則氣滯血壅相與為病耳兼脈浮滑風痰沉滑痰食滑數痰火滑短氣塞滑而浮大尿則陰痛滑而浮散中風癱緩滑而沖和娠孕可決鼓動浮越風之象也故滑而浮者兼風沉下結滯食之徵也故滑而沉者兼食熱則生痰故流利之間而至數加以急疾鬱則氣滯故圓轉之際還呈短縮浮大者膀胱火熾尿乃作疼浮散者風淫氣虛行坐不遂滑伯仁曰三部脈浮沉正等無他病而不月者為有妊也故滑而沖和此血來養胎之兆夫脈者血之府也血盛則脈滑故妊孕宜之凡痰飲嘔逆傷食等證皆上中二焦之病以滑為水物兼有之象也設所吐之物非痰與食是為嘔逆脈必見澀也溺血經閉或主淋痢者咸內有所蓄血積類液瘀凝類痰須以意求耳按素問診要經終篇曰滑者陰氣有餘陰氣有餘故多汗身寒偽訣云胃家有寒下焦蓄血臍下如冰與經旨未全違背第不知變通禪家所謂死於句下仲景以翕奄沉三字狀滑脈者翕者合也奄者忽也當脈氣合聚而盛之時奄忽之間即以沉去摩寫往來流利之狀極為曲至又曰沉為純陰翕為正陽陰陽和合故令脈滑關尺自平此言無病之滑脈也若云陽明脈微沉者當陽部見陰脈則陰偏勝而陽不足也少陰脈微滑者當陰部見陽脈則陽偏勝而陰不足也三部九候各自不同偽訣云按之即伏不進不退是不分浮滑沉滑尺寸之滑矣仲景恐人誤認滑脈為沉下文又曰滑者緊之浮名也則知沉為翕奄之沉非重取乃得一定之沉也而偽訣云按之即伏與翕奄之沉何啻千里云不進不退與滑之象尤為不合夫血盛則脈滑故腎脈宜之氣盛則脈滑故肺脈宜之此皆滑中之平脈叔和言關滑胃熱乃指與數相似正內經所云諸過者切之之滑也要之兼浮者毗於陽兼沉者毗於陰是以或寒或熱從無定稱惟衡之以浮沉辨之以尺寸始無誤耳故善於讀書則如偽訣胃家有寒諸說亦可通之於經不善讀書內經陰氣有餘一語適足以成刻舟求劍之弊脈豈易言也哉澀脈陰體象澀脈蹇滯如刀刮竹遲細而短三象俱足澀者不流利之義素問三部九候篇曰參伍不調者病謂其凝滯而至數不和勻也脈訣以輕刀刮竹為喻者刀刮竹則阻滯而不滑也通真子以如雨沾沙為喻者謂雨沾金石則滑而流利雨沾沙土則澀而不流也時珍以病蠶食葉為喻者謂其遲慢而艱難也主病澀為血少亦主精傷左寸澀者心痛怔忡澀在左關血虛肋脹左尺得澀精傷胎漏右寸澀者痞氣自汗澀在右關不食而嘔右尺得澀大便艱秘腹寒脛冷中焦取汁變化而赤是謂血壅遏營氣令無所避是謂脈兩者同質異名況血為陰液多則滑利少則枯澀勢所然也精也血也皆屬於陰故共主之藉以供神明之用者血也血少則不能養心而痛作積久而加以驚疑則怔忡至矣肝為血海血少則不能自榮而所部作痛腎傷則精無餘蓄男子溲淋婦人血敗胎漏真陽喪矣肺家真氣既虧胸中不能運行則為痞塞不能衛外而為固則汗時自出出則液耗謂之脫液漏而不止衛氣散失四肢厥寒謂之亡陽陽亡液脫故亦主澀血少則脾陰弱而食減嘔作甚而朝食暮吐暮食朝吐或隨食隨吐胃無餘液血少則津液枯無由下致而大便艱腹寒脛冷皆緣血少不獲隨真陽之氣以運行耳兼脈澀而堅大為有實熱澀而虛軟虛大炎灼澀本血少而再得堅大之形乃邪火熾甚陰不勝陽若僅見虛軟此屬無根之火熏灼耳或因憂鬱或因厚味或因無汗或因妄補氣騰血沸清化為濁老痰宿飲膠固雜糅脈道阻澀不能自至亦見澀狀若重取至骨似有力而帶數以意參之於證驗之形氣但有熱證當作痼熱可也按一切世間之物濡潤者則必滑枯槁者則必澀故滑為痰飲澀主陰衰理有固然無足辨者肺之為臟氣多血少故右寸見之為合度之診腎之為臟專司精血故右尺見之為虛殘之候不問男婦凡尺中沉澀者必艱於嗣正血少精傷之確證也故女人懷子而得澀脈則血不足養胎如無孕而得澀脈將有陰衰髓竭之憂偽訣云指下尋之似有舉之全無則是微脈而非澀脈矣叔和謂其一止復來亦有疵病蓋澀脈往來遲難有類乎止而實非止也又曰細而遲往來難且散者乃浮分多而沉分少有類乎散而實非散也須知極細極軟似有若無為微脈浮而且細且軟為濡脈沉而且細且軟為弱脈三者之脈皆指下模糊有似乎澀而實有分別也然一脈澀也更有外邪相襲使氣分不利而成滯澀衛氣散失使陽衰不守而成虛澀腸胃燥渴津液亦亡使血分欲盡而成枯澀在診之者自為靈通耳虛脈陰體象虛合四形浮大遲軟及乎尋按幾不可見虛之為義中空不足之象專以軟而無力得名者也主病虛主血虛又主傷暑左寸虛者心虧驚悸虛在左關血不營筋左尺得虛腰膝痿痹右寸虛者自汗喘促虛在右關脾寒食滯右尺得虛寒證蜂起脈經曰血虛脈虛而獨不言氣虛者何也氣為陽主浮分血為陰主沉分今浮分大而沉分空故獨主血虛耳若夫肺脈見之又主氣怯者肺與乾天合德不浮而沉氣分欲竭之兆也血少則不足以濟心主高拱之權而動見章皇肝為血海而主筋虛則筋失其養腰者腎之府也膝者骨之屈申開闔處也虛則不為我用陽氣虛則不能衛外而自汗真氣虛而喘促者蓋由機緘不相接續食滯者脾胃虛寒乾健坤順兩失其職真火衰而諸證畢集非轉陽和之令事何克濟乎虛脈又主傷暑者蓋暑為陽邪其勢足以爍石流金干於脾則吐利干於心則煩心並於上則頭重並於下則便秘其見於脈也不洪數而反見虛者因暑性炎熱使人表氣易泄故脈必虛耳按脈經曰遲大而軟按之豁豁然空此言最為合義雖不言浮字而曰按之豁然空則浮字之義已包含矣崔紫虛以為形大力薄其虛可知但欠遲字之義耳偽訣云尋之不足舉之有餘是浮脈而非虛脈矣浮以有力得名虛以無力取象有餘二字安可施之虛脈乎楊仁齋曰狀為柳絮散漫而遲滑伯仁曰散大而軟二家之言俱是散脈而非虛脈矣夫虛脈按之雖軟猶可見也散脈按之絕無不可見也虛之異於濡者虛則遲大而無力濡則細小而無力也虛之異於芤者虛則愈按而愈軟芤則重按而仍見也夫虛脈兼遲遲為寒象大凡證之虛極者必挾寒理勢然也故虛脈行於指下則益火之原以消陰翳更有浮取之而且大且數重按之而豁然如無此名內真寒而外假熱古人以附子理中湯冰冷與服治以內真熱而外假寒之劑也實脈陽體象實脈有力長大而堅應指愊愊三候皆然實為邪盛有餘之象既大而且兼長既長大而且有力既長大有力而且浮中沉三候皆然則諸陽之象莫不畢備主病血實脈實火熱壅結左寸實者舌強氣壅口瘡咽痛實在左關肝火脅痛左尺得實便秘腹疼右寸實者嘔逆咽痛喘嗽氣壅實在右關伏陽蒸內中滿氣滯右尺得實臍痛便難相火亢逆脈實必有大邪大熱大積大聚故脈經云血實脈實又曰氣來實強是謂太過由是測之皆主實熱其所主病大約與數脈相類而實則過之以其蘊蓄之深也按素問大奇論曰肝滿腎滿肺滿皆實即為腫如肝雍兩胠滿臥則驚不得小便腎雍胠下至少腹滿脛有大小髀胻大跛易偏枯肺之雍喘而兩胠滿之類皆實脈也實主邪氣有餘易於體象所以叔和有尺實則小便難之說乃偽訣謬以尺實為小便不禁何適相反又妄謂如繩應指來則是緊脈之形而非實脈之象矣夫緊脈之與實脈雖相類而實相懸但緊脈弦急如切繩而左右彈人手實脈則且大且長三候皆有力也緊脈者熱為寒束故其象繃急而不寬舒實脈者邪為火迫故其象堅滿而不和柔以證合之以理察之便昭昭於心目之間又按張潔古惑於偽訣實主虛寒之說而遂以姜附施治此甚不可為訓或實脈而兼緊者庶乎相當苟非緊象而大溫之劑施於大熱之人其不立斃者幾希以潔古之智當必是兼緊之治法無疑耳夫陰陽對偶不可稍偏陽氣過旺不戢有自焚之虞今世宗丹溪者以為陽常有餘喜用寒涼乃致殺人如麻恬不之怪又有有激之論為劉朱之言不息則軒岐之澤不彰三吳兩浙翕然成風以姜附為茶飯其流毒更不可言執一舍一禍害相尋可勝嘆哉長脈陽體象長脈迢迢首尾俱端直上直下如循長竿首尾相稱往來端直也主病長主有餘氣逆火盛左寸長者君火為病長在左關木實之殃左尺見長奔豚沖競右寸長者滿逆為定長在右關土鬱脹悶右尺見長相火專冷長脈與數脈實脈皆相類而長脈應肝肝屬木而生火如上諸證莫非東方熾甚助南離之焰為中州之仇須以平木為急耳按素問平人氣象論曰肝脈來軟弱招招如揭長竿末梢曰肝平肝脈來盈實而滑如循長竿曰肝病故知長而和緩即合春生之氣而為健旺之徵長而硬滿即屬火亢之形而為疾病之應長脈在時為春在卦為震在人為肝肝主春生之令天地之氣至此而發舒素問脈要精微論曰長則氣治李月池曰心脈長者神強氣壯腎脈長者蒂固根深皆言平脈也如上文主病云云皆言病脈也舊說過於本位名為長脈久久審度而知其必不然也寸而上過則為溢脈寸而下過即為關脈關而上過即屬寸脈關而下過即屬尺脈尺而上過即屬關脈尺而下過即為覆脈由是察之然則過於本位理之所必無而義之所不合也惟其狀如長竿則直上直下首尾相應非若他脈之上下參差首尾不勻者也凡實牢弦緊四脈皆兼長脈故古人稱長主有餘之疾非無本之說也短脈陰體象短脈澀小首尾俱俯中間突起不能滿部短之為象兩頭沉下而中間獨浮也主病短主不及為氣虛證左寸短者心神不定短在左關肝氣有傷左尺得短少腹必疼右寸短者肺虛頭痛短在右關膈間為殃右尺得短真火不隆素問脈要精微論曰短則氣病蓋以氣屬陽主乎充沛若短脈獨見氣衰之確兆也然肺為主氣之藏偏與短脈相應則又何以說也素問玉機真藏論謂肺之平脈厭厭聶聶如落榆莢則短中自有和緩之象氣仍治也若短而沉且澀而謂氣不病可乎按一息不運則機緘窮一毫不續則穹壤判偽訣以短脈為中間有兩頭無為不及本位據其說則斷絕不通矣夫脈以貫通為義若使上不貫通則為陽絕下不貫通則為陰絕俱為必死之脈豈有一見短脈遂致危亡之理乎戴同父亦悟及於此而云短脈只當見於尺寸若關中見短是上不通寸下不通尺為陰陽絕脈而必死同父之說極為有見然尺與寸可短依然落於陰絕陽絕矣殊不知短脈非兩頭斷絕也特兩頭俯而沉下中間突而浮起仍目貫通者也叔和云應指而回不能滿部亦非短脈之合論也時珍曰長脈屬肝宜於春短脈屬肺宜於秋但診肺肝則長短自見故知非其時非其部即為病脈也凡得短脈必主氣血虛損偽訣指為氣壅者何也潔古至欲以巴豆神藥治之良不可解洪脈陽體象洪脈極大狀如洪水來盛去衰滔滔滿指洪脈即大脈也如洪水之洪喻其盛滿之象也主病洪為盛滿氣壅火亢左寸洪者心煩舌破洪在左關肝脈太過左尺得洪水枯便難右寸洪者胸滿氣逆洪在右關脾土脹熱右尺得洪龍火燔灼按洪脈在卦為離在時為夏在人為心時當朱夏天地之氣酣滿暢遂脈者得氣之先故應之以洪洪者大也以水喻也又曰鉤者以木喻也夏木繁滋枝葉敷布重而下垂故如鉤也鉤即是洪名異實同素問玉機真藏論以洪脈為來盛去衰頗有微旨大抵洪脈只是根腳闊大卻非堅硬若使大而堅硬則為實脈而非洪脈矣素問脈要精微論曰大則病進亦以其氣方張也玉機真藏論曰夏脈如鉤何如而鉤岐伯曰夏脈心也南方火也萬物所以盛長也其氣來盛去衰故曰鉤反此者病黃帝曰何如而反岐伯曰其氣來盛去亦盛此謂太過病在外其氣來不盛去反盛此謂不及病在中太過則令人身熱而膚痛為浸淫不及則令人煩心上見咳唾下為氣泄叔和云夏脈洪大而散名曰平若反得沉濡而滑者是腎之乘心水之剋火為賊邪死不治反得大而緩者是脾之乘心子之扶母為實邪雖病自愈反得弦細而長者是肝之乘心母之歸子為虛邪雖病易治反得浮澀而短者是肺之乘心金之陵火為微邪雖病即瘥凡失血下利久嗽久病之人俱忌洪脈素問三部九候論曰形瘦脈大多氣者死可見形證不與脈相合者均非吉兆微脈陰體象微脈極細而又極軟似有若無欲絕非絕微之為言近於無也仲景曰瞥瞥如羹上肥狀其軟而無力也縈縈如蠶絲狀其細而難見也古人似有若無欲絕非絕八字真為微脈傳神主病微脈模糊氣血大衰左寸微者心虛憂惕微在左關寒攣氣乏左尺得微髓竭精枯右寸微者中寒少氣微在右關胃寒氣脹右尺得微陽衰寒極按算數者以十微為一忽十忽為一絲十絲為一毫十毫為一釐由是推之則一釐之少分而為萬方始名微則微之渺小難見可知世俗未察微脈之義每見脈之細者輒以微細二字並稱是何其言之不審耶輕取之而如無故曰陽氣衰重按之而欲絕故曰陰氣竭若細脈則稍稍較大顯明而易見非如微脈之模糊而難見也雖其證所患略同而其形亦不可不辨時珍云微主久虛血弱之病陽微則惡寒陰微則發熱自非峻補難可回春而偽訣所云漩之敗血小腸虛何以置之微脈乎若不兼他象雖微而來去未亂猶可圖存於百一卒病得之猶或可生者謂邪氣不至深重也長病得之多不可救者正氣將次絕滅草木之味難藉以支持耳在傷寒證惟少陰有微脈他經則無其太陽膀胱為少陰之府才見脈微惡寒仲景早從少陰施治而用附子乾薑矣蓋脈微惡寒正陽氣衰微所至詩云彼月而微此日而微今此下民亦孔之哀在天象之陽且不可微然則人身之陽顧可微哉腎中既已陰盛陽微寒自內生復加外寒斬關直入其人頃刻云亡故仲景以為卒病而用辛熱以回一線真陽於重泉之下也卒中寒者陽微陰盛最為危急素問調經論篇曰陰盛生內寒因厥氣上逆寒氣積於胸中而不泄則溫氣去寒獨留留則血凝血凝則脈不通其脈盛大以澀故中寒夫既言陰盛生內寒矣又言故中寒者豈非內寒先生外寒內中之耶經既言血脈不通矣又言其脈盛大以澀者豈非以外寒中故脈盛大血脈閉故脈澀耶此中深有所疑請申明之一者人身衛外之陽最固太陽衛身之背陽明衛身之前少陽衛身之兩側今不由三陽而直中少陰豈真從天而下蓋厥氣上逆積於胸中則胃寒胃寒則口食寒物鼻吸寒氣皆得入胃腎者胃之關也外寒斬關直入少陰腎臟故曰中寒也此經隱而未言者也一者其脈盛大以澀雖曰中寒尚非卒病卒病中寒其脈必微蓋經統言傷寒中寒之脈故曰盛大以澀仲景以傷寒為熱病中寒為寒病分別言之傷寒之脈大都以大浮數動滑為陽沉澀弱弦微為陰陽病而見陰脈且主死況陰病卒病必無反見陽脈盛大之脈若只盛大以澀二陽一陰亦何卒急之有哉此亦經所隱而難窺者也
