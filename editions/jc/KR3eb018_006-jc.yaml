body:
  text: 卷六小序奇經為十二經之總持故云醫不知此罔探病機誠重之也誠難之也茲編洞若觀火學者能精求之進乎技矣倘曰吾問病而發藥稱良工焉毋暇論脈又何有於奇經則非予所知者予知有其道而已別有奇經常脈之外無與配偶所當細察奇經者在十二經脈之外無臟腑與之配偶故曰奇夫臟腑之脈寸關尺有定位浮中沉有定體弦鉤毛石有定形此則另為一脈形狀固異而隧道亦殊病證不同而診治自別奇經之數共得其八陰維陽維陰蹺陽蹺沖任督帶諸脈所決時珍云人身二十七氣相隨上下如泉之流不得休息終而復始其流溢之氣入於奇經轉相灌溉而奇經八脈陰維也陽維也陰蹺也陽蹺也沖也任也督也帶也不拘制於十二經正經之脈隆盛則溢於奇經故秦越人比之天雨降下溝渠溢滿霶沛妄行流於湖澤醫而知乎八脈則十二經十五絡之大旨得矣仙而知乎八脈則虎龍升降玄牝幽微之竅妙得矣陰維起於諸陰之交由內踝而上行於營分陽維起於諸陽之會由外踝而上行於衛分所以為一身之綱維也陰蹺起於跟中循內踝上行於身之左右陽蹺起於跟中循外踝上行於身之左右所以使機關之蹺捷也衝脈起於會陰夾臍而行直衝於上為諸脈之衝要故曰十二經脈之海任脈起於會陰循腹而行於身之前為陰脈之承任故曰陰脈之海督脈起於會陰循背而行於身之後為陽脈之總督帶脈則橫圍於腰狀如束帶所以總約諸脈是故陽維主一身之表陰維主一身之裡以乾坤言也陽蹺主一身左右之陽陰蹺主一身左右之陰以東西言也督主身後之陽任沖主身前之陰以南北言也帶脈橫束諸脈以六合言也尺外斜上至寸陰維尺內斜上至寸陽維胸脅刺痛寒熱眩僕從右手手少陽三焦斜至寸上手厥陰心包絡之位是陰維脈也從左手足少陰腎經斜至寸上手太陽小腸之位是陽維脈也斜上者不由正位而上斜向大指名為尺外斜向小指名為尺內陰維為病心痛胸腹刺築者以陰維維絡一身之陰陰主營主裡不能維陰則陰無約束而營氣因之不和故在裡則心痛又營主血血合心故心痛也其脈氣所發陰維之郄名曰築賓足少陰內踝上與足太陰會於腹哀足太陰乳下又與足太陰厥陰會於府舍足太陰少腹下期門足厥陰乳下與任脈會於天突任脈喉下廉泉觀此則知本脈之維於胸腹諸陰無一不到其脈不榮則不能維在胸脅失所維則動築而刺痛矣陽維維絡一身之陽陽主衛主氣主表病則不能維陽是陽無護持而衛氣亦因之不固故在表則生寒熱其脈氣所發別於金門在足太陽外踝下以陽交為郄足少陽外踝上與手足太陽及蹺脈會於臑俞手太陽肩後與手足少陽會於陽白足少陽眉上上於本神及臨泣俱在足少陽眉上上至正營足少陽目窗上及腦空足少陽枕骨下下至風池足少陽顳顬後與督脈會於風府督脈項後髮際啞門督脈風府後觀此則知本脈之維於頭目手足頸項肩背諸陽無一不到其脈不榮則不能維在頭目無維則眩在頸項肩背無維則僵在手足無維則僕矣尺左右彈陰蹺可別陽緩陰急寸左右彈陽蹺可決陰緩陽急二蹺同源病亦互見癲癇瘛瘲寒熱恍惚難經二十八難曰陽蹺脈起於跟中陰蹺亦起於跟中而又同終於目靈樞脈度篇曰蹺脈者少陰之別起於然骨之下上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目濡潤營養於目又曰男子數其陽女子數其陰當數者為經不當數者為絡觀此則知二蹺之脈雖以男女分陰陽而實則迭為經絡是一本也故其為病亦不似他經逐經分屬本文以癲癇瘛瘲寒熱恍惚總系二經之下以二經均可病此證雖云四而病機可分為八陰陽緩急之義自是顯然夫人之身背為陽腹為陰開為陽闔為陰外為陽內為陰熱為陽寒為陰癲則目閉俯首陽緩而陰急也癇則目直僵仆陰緩而陽急也筋脈掣向里拘陽緩而陰急也筋脈縱從外弛陰緩而陽急也寒則氣收斂從里從陰陽緩而陰急也熱則氣散漫從表從陽陰緩而陽急也素問謬刺論曰邪客於足陽蹺之脈令人目痛從內眥始且合太陽上行而並濡於目病屬目而從外陽蹺之病陰緩而陽急也惚者胸中悾惚若有所失靈樞脈度篇曰蹺脈者少陰之別起於然骨之後循陰股入陰上循胸裡入缺益二十八難曰陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈病屬胸腹而從內陰蹺之病陽緩而陰急也二脈一為經一為絡病在經則經急絡緩病在絡則經緩絡急總之皆可言經皆可言絡但以男女分陰陽之所屬緩急證病邪之所在則得其義矣直上直下尺寸俱牢中央堅實衝脈昭昭胸中有寒逆氣裡急疝氣攻心支滿溺失衝脈起於胞中後行於背前行於腹上行於頭下行於足以至溪谷肌肉無處不到誠十二經內外上下之要衝也為經絡之海亦名血海其浮而外者亦循腹上行會於咽喉別而絡唇口強半與任脈同素問骨空論曰衝脈者起於氣衝並足少陰之經挾臍上行至胸中而散難經二十八難則曰起於氣衝並足陽明之經挾臍上行至胸中而散痿論亦曰衝脈者經脈之海主滲灌溪谷與陽明合於宗筋二論所並雖有少陰陽明之不同要知自臍至胸與陽明則並於前與少陰則並於後也故與陽明皆得稱五臟大腑之海脈來直上直下弦長相似尺寸俱牢亦兼弦長氣不順血不和則胸腹之氣循經壅逆而裡急矣疝氣攻心正逆急也支滿者脹也溺失者衝脈之邪於腎也按督任沖三脈直行上下發源最中故見於脈亦皆直上直下也直上直下者即三部俱長透之義若直上下而浮則氣張揚陽象也故屬督若直上下而緊則勢斂束陰象也故屬任若直上下而牢則體堅實有餘之象也故屬沖寸口丸丸緊細實長男疝女瘕任脈可詳任脈總諸陰之位其脈起於胞中循腹裡為經絡之海其浮而外者循腹裡上行於咽喉別而絡唇口難經亦云起於中極之下以上毛際循腹裡上關元至咽喉蓋七疝之發多起於前陰少腹之間任脈所經之地即或屬他經未有不以任脈為原者瘕乃女子之病發亦在任脈界分此云寸口者統寸關尺三部言也丸丸動貌緊細實長寒邪盛而實也男疝女瘕則苦少腹繞臍下引陰中切痛等證直上直下尺寸俱浮中央浮起督脈可求腰背疆痛風癇為憂潔古云督者都也為陽脈之都綱其脈起於少腹以下骨中央女子入系庭孔之端絡陰器繞篡繞臀至少陰其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央其脈之別名曰長強挾脊上項散上頭下當肩脊抵腰中入循膂絡腎自目內眥上額下循膂絡腎皆合太陽而並行者也與太陽少陰合入股內貫脊屬腎與太陽起目內眥上額交巔上入絡腦還出別下項循肩膊內夾髀左右別走太陽入貫臀二十八難亦曰督脈者起於下極之俞並於脊裡上至風府入屬於腦由是觀之則督亦與太陽合行者十九故邪客則脊強以其實脊也督與太陽皆主表而督為諸陽之總太陽為諸陽之長又曰巨陽風邪從類傷陽表必先受故留則為癲癇疾也癲癇時發時止或筋脈牽引或項背反張雖云風傷督脈亦太陽主筋故耳脈來直上直下則弦長矣尺寸俱浮中央亦浮則六部皆浮又兼弦長故其見證皆屬風家大抵衝脈主裡督脈主表也帶脈周迴關左右彈帶下臍痛精失不安帶脈起於季脅回身如帶在人腰間故應於關臟腑十二經絡皆過於此或濕熱下流或風入胞宮帶脈不任與邪俱陷則赤白之證見素問痿論曰帶脈起於季脅章門前則當臍上故或為臍痛靈樞經別篇曰腎足少陰當十四椎出屬帶脈蓋腎主藏精帶固腰膂虛則一不能藏一不能固而精有自失者矣喻嘉言曰人身有經脈絡脈直行曰經旁支曰絡絡者兜絡之義即十二經之外城也經凡十二手之三陰三陽足之三陰三陽是也絡乃有十五者因十二經各有一別絡難經以陽蹺陰蹺及脾之大絡足成之後世遂為定名反遺內經胃之大絡名曰虛里貫膈絡肺吃緊一段人知之而不敢翻越人之案遂曰宜增為十六絡是十二經有四大絡矣嘗謂難經以二蹺為絡之名原誤當是胃之一大絡脾之一大絡共指奇經八者為一大絡配為十五絡始為確耳如十二經既各有一絡共十二絡矣此外有胃之一大絡繇胃下直貫膈肓統絡諸絡脈於上復有脾之一大絡繇脾外橫貫脅腹統絡諸絡脈於中復有奇經之一大絡繇奇經環貫諸經之絡於周身上下總之十二絡以絡其經三大絡以絡其絡也何以知陽蹺陰蹺之不當言絡也蓋嘗推奇經之義督脈督諸陽而行於背任脈任諸陰而行於前不相絡也衝脈直衝於胸中帶脈橫束於腰際不相絡也陽維陰維一起於諸陽之會一起於諸陰之交名雖曰維乃是陽自維其陽陰自維其陰非交相維絡也至於陽蹺陰蹺同起於足跟一循外踝一循內踝並行而鬥其捷全無相絡之意設陽蹺陰蹺可言二絡則陽維陰維何不可言二絡乎推廣之而督任沖帶何不可言八絡乎況難經有云奇經之脈如溝渠滿溢流於深湖故聖人不能圖細推其意乃則以奇經明等之一大絡不然夫豈有大經如江如湖之水而反擬之溝渠者哉又云人脈隆盛入於八脈而不環周故十二經亦不能拘此全是經盛入絡而其溢蓄者止在於絡不能環溉諸經也合兩說而通會其意奇經乃自共為一大絡更復何疑若時珍以任督二絡為據者恐亦未當張紫陽云衝脈在風府穴下督脈在臍後任脈在臍前帶脈在腰陰蹺脈在尾閭前陰囊下陽蹺脈在尾閭後二節陰維脈在頂前一寸三分陽維脈在頂後一寸三分凡人有此八脈俱屬陰神閉而不開惟神仙以陽氣衝開故能得道八脈者先天大道之根一氣之祖採之惟在陰蹺為先此脈才動諸脈皆通陰蹺一脈散在丹經其名頗多曰天根曰死戶曰覆命關曰生死根有神主之名曰桃康上通泥丸下徹湧泉倘能知此使真氣聚散皆從此關竅則天門常開地戶永閉尻脈周流於一身和氣自然上朝陽長陰消水中火發雪裡花開身體輕健容衰返壯昏昏嘿嘿如醉如癡要知西南之鄉在坤地尾閭之前膀胱之後小腸之下靈龜之上乃天地逐日所生氣根產鉛之地也醫家不知有此按丹書論陽精河車皆以任沖督脈命門三焦為說未有專指陰蹺者而紫陽八脈經所載經脈稍與醫家不同然內景惟返觀者能知或不謬也脈有反關動在臂後別由列缺移於外絡兄乘弟位反關者非無脈也謂寸口脈不應指而反從尺傍過肺之列缺大腸之陽谿刺斜出於外絡其三部定位九候淺深俱與平常應見於寸口者無異若兄固有之位弟竊而乘之以其不行於關上故曰反關在十萬中僅見一二人令人覆手診之方可見耳一說男左女右得之者貴試之勿驗也病脈既明吉凶當別常脈之外又有真脈真象若見短期可決以上正文之論脈首先源派次及流行次則左右男女定位次則五臟陰陽合時寒熱則屬之遲數內外則別之浮沉以至虛實異形正邪各狀因脈知病因病識脈病則該於瘡瘍女幼脈則窮於奇經反關可謂明且詳矣然而諸脈之外更有所謂真脈者大關生死故又審別於卷末焉夫人稟五行而生則五行原吾身之固有外與天地通內與穀神合得以默運潛行而不顯然彰露設五臟之元真敗絕穀神不將則五行之死形各隨藏而見矣死亡之期可計日而斷心絕之脈如操帶鉤轉豆躁疾一日可憂素問平人氣象論曰死心脈來前曲後居如操帶鉤曰心死前曲者謂輕取則堅強而不柔後居者謂重取則牢實而不動如持革帶之鉤全失沖和之氣但鉤無胃故曰心死轉豆者即素問玉機真藏論所謂如循薏苡子累累然狀其短實堅強真藏脈也又曰心絕一日死又曰壬日篤癸日死死於亥子時水能剋火也肝絕之脈循刀責責新張弓弦死在八日素問玉機真藏論曰真肝脈至中外急如循刀刃素問平人氣象論曰脈來急益勁如新張弓弦曰肝死又曰肝絕八日死又曰庚日篤辛日死死於申酉時金能剋木也脾絕雀啄又同屋漏一似水流又同杯覆素問平人氣象論曰死脾脈來銳堅如烏之喙如屋之漏如水之流謂歇歇而再至如烏喙之啄狀其硬也或良久一至有如屋漏狀其不能相接至如水流杯覆則精氣已脫往而不返傾而不扶其可生乎又曰脾絕四日死又曰甲日篤乙日死死於寅卯時木能剋土也肺絕維何如風吹毛毛羽中膚三日而號素問平人氣象論曰死肺脈來如風吹毛曰肺死素問玉機真藏論曰真肺脈至如以毛羽中人膚皆狀其散亂無緒但毛而無胃氣也又曰肺絕三日死又曰丙日篤丁日死死於午未時火能剋金也腎絕伊何發如奪索辟辟彈石四日而作素問平人氣象論曰死腎脈來發如奪索辟辟如彈石曰腎死索如相奪其勁必甚辟辟彈石其堅必甚又曰腎絕四日死又曰戊日篤己日死死於辰戌丑未時土能剋水也命脈將絕魚翔蝦游至如湧泉莫可挽留浮時忽一沉譬魚翔之似有似無沉時忽一浮譬蝦游之靜中一躍狀類如泉之湧浮數於肌肉之上而乖違其就下之常神已欲脫何恃而能生乎統而論之使其在心則前曲後居柔滑全無如轉豆躁疾則所謂累累如連珠如循琅玕者無有也使其在肝則強勁弦急按之切手如循刀責責則所謂軟弱輕虛而滑端直以長者無有也使其在脾則堅銳連屬如雀啄粒許久一滴二脈乍數乍疏如屋之漏去而不返如水之流止而不揚如杯之覆所謂和柔相離如雞踐地者無有也使其在肺上則微茫下則斷絕無根蕭索所謂厭厭聶聶如落榆莢者無有也使其在腎解散而去欲藏無入去如解索彈搏而來所藏盡出來如彈石則所謂喘喘累累如鉤按之而堅者無有也在命門右腎與左腎同但內涵相火故其絕也忽爾靜中一躍如蝦之遊如魚之翔火欲絕而忽焰之象也在膀胱氾濫不收至如湧泉以其藏津液而為州都之官故絕形如此蓋脈之和柔得體者胃氣與之俱耳胃氣若少即已成病何況於無則生生之根本先絕而五臟其能持久哉再察色證以決之理當不爽也見真藏之脈可決短期者是矣而素問玉機真藏論曰急虛身中卒至五臟絕閉脈道不通氣不往來譬於墮溺不可為期其脈絕不來若人一息五六至其形肉不脫真藏雖不見猶死也乃知有急病不必真藏脈見而卜其死者可拘於時日哉按難經十五難所載平脈死脈與本經互有異同如以厭厭聶聶如循榆葉為春平如雞舉足為夏病藹藹如車蓋按之而益大曰秋平按之蕭索如風吹毛曰秋死上大下兌濡滑如雀之啄曰冬平啄啄連屬其中微曲曰冬病來如解索去如彈石曰冬死此皆與本經之不同者也至於如引葛如奪索如烏之喙如鳥之距軟弱招招如揭長竿末梢喘喘累累如鉤而堅之類又皆不載難經之義原出本論而異同若此意者必有誤歟醫之診脈將決死生展轉思維務欲其精窮搜博採靜氣凝神得心應手澤及後昆勉哉同志相與有成熟讀深思如見古人夫人命至重故醫者非仁愛不可托也非聰明不可任也非淳良不可信也古之為醫必上通天道使五運六氣變化郁復之理無一不精中察人身使十四經絡內而五臟六腑之淵涵外而四肢百骸之貫串無一不徹下明物理使昆蟲草木之性情氣味無一不暢及乎診視之際滌除嗜欲虛明活潑貫微達幽不失細小其智能宣暢曲解既如此其德能仁恕博愛又如彼而猶不敢以為是諦察深思務期協中造次之際罔敢或肆者也學者肯虛衷求益則承蜩運斤許入岐黃之室矣當共勉其志以克底於大成也
