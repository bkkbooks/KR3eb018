body:
  text: 卷十小序經絡藏象稍關診法者靡不疏解於前矣又恐初學記誦為難乃悉摹其形於右使一覽無遺亦古人左圖右史之意也若臟腑之輕重悉准之經文至人之大小不齊未可執一而論要不過示其大略耳折衷前賢之說以釋焉間附臆見惟識者鑑之經絡十二經歌附十二經臟腑圖太陽小腸足膀胱陽明大腸足胃當少陽三焦足膽配太陰手肺足脾鄉少陰心經足為腎厥陰包絡足肝方此歌上者為手十二經臟腑表裡圖十二經納甲歌此歌諸腑配陽諸臟配陰甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎臟三焦陽府須歸丙包絡從陰丁火旁舊云三焦亦向壬中寄包絡同歸入癸方雖三焦為決瀆猶可言壬而包絡附心主安得云癸且二臟表裡皆相火也今改正之十二經氣血多少歌多氣多血惟陽明少氣太陽同厥陰二少太陰常少血六經氣血須分明經絡周流解人身正脈十有二經每於平旦寅時營氣始於中焦上注手太陰肺經自胸中而出於中府至於少商以次行於手陽明大腸等十二經終於足厥陰肝經而復始於太陰之肺也凡手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹周流不息如環無端前三圖者誦後十二經營行次序逆順歌則其首尾一貫按圖可悉矣十二經營行次序逆順歌肺大胃脾心小腸膀腎包焦膽肝續手陰臟手陽手頭足陰足腹陽頭足此臟腑相傳之序及上下所行之次也經絡次序出十四經發揮經絡十二經臟腑表裡圖十二經納甲歌十二經氣血多少歌經絡周流解十二經營行次序逆順歌經絡次序十二經絡始於手太陰其支者從腕後出次指端而交於手陽明手陽明之支者從缺盆上挾口鼻而交於足陽明足陽明之支者從跗上出大指端而交於足太陰足太陰之支者從胃別上膈注心中而交於手少陰手少陰無支者直自本經少衝穴而交於手太陽手太陽之支者別頰上至目內眥而交於足太陽足太陽之支者從膊內左右別下合膕中下至小指外側端而交於足少陰足少陰之支者從肺出注胸中而交於手厥陰手厥陰之支者從掌中循小指次指出其端而交於手少陽手少陽之支者從耳後出至目銳眥而交於足少陽足少陽之支者從跗上入大指爪甲出三毛而交於足厥陰足厥陰之支者從肝別貫膈上注肺入喉嚨之後上額循巔行督脈絡陰器過毛中行任脈入缺盆下注肺中而復交於手太陰也十二經脈起止歌附十二經脈起止圖經始太陰而厥陰最後穴先中府而終則期門原夫肺脈胸中始生出腋下而行於少商絡食指而接乎陽明大腸起自商陽終迎香於鼻外胃歷承泣而降尋厲兌於足經脾自足之隱白趨大包於腋下心由極泉而出注小指之少衝小腸兮起端於少澤維肩後上絡乎聽宮膀胱穴自睛明出至陰於足外腎以湧泉發脈通俞府於前胸心包起乳後之天池絡中衝於手中指三焦始名指之外側從關衝而絲竹空膽從瞳子髎穴連竅陰於足之四指肝因大敦而上至期門而復於太陰肺經周身經絡部位歌脈絡周身十四經六經表裡督和任陰陽手足經皆六督總諸陽任總陰諸陽行外陰行里四肢腹背皆如此督由脊骨過齦交臍腹中行任脈是足太陽經小指藏從跟入膕會尻旁上行夾脊行分四前系睛明脈最長少陽四指端前起外踝陽關環跳里從脅貫肩行曲鬢耳前耳後連眥尾大指次指足陽明三里天樞貫乳行腹第三行通上齒環唇俠鼻目顴迎足有三陰行內廉厥中少後太交前腎出足心從內踝俠任胸腹上廉泉太厥兩陰皆足拇內側外側非相聯太陰內側衝門去腹四行兮挨次編厥陰毛際循陰器斜絡期門乳肋間手外三陽誰在上陽明食指肩髃向頰中鑽入下牙床相逢鼻外迎香傍三焦名指陽明後貼耳周迴眉竹湊太陽小指下行低肩後盤旋耳顴遘還有三陰行臂內太陰大指肩前配厥從中指腋連胸極泉小內心經位手足三陽俱上頭三陰穴止乳胸遊唯有厥陰由顙後上巔會督下任流經脈從來皆直行絡從本部絡他經經凡十四絡十六請君切記須分明十六絡者自十五絡之外復有胃之大絡名曰虛里也十二經流注時序歌肺寅大卯胃辰宮脾巳心午小未中膀申腎酉心包戌亥三膽子醜肝通此歌出子午流注等書及張世賢等註釋其以十二時分配十二經似乎近理然而經之長短穴之多寡大相懸絕又安能按時分配且失五十周於身之義今亦錄之以俟辨正手太陰肺經左右共二十二穴以下十四經共六百七十穴中府雲門天府俠白尺澤孔最列缺經渠太淵魚際少商肺者相傅之官治節出焉其形四垂附著於脊之第三椎中有二十四空行列分布以行諸藏之氣為藏之長為心之蓋是經常多氣少血其合皮也其榮毛也開竅於鼻難經曰肺重三斤三兩六葉兩耳凡八藥主藏魄華元化曰肺者生氣之原乃五臟之華蓋肺葉白瑩謂為華蓋以覆諸臟虛如蜂窠下無透竅吸之則滿呼之則虛一呼一吸消息自然司清濁之運化為人身之橐籥肺者市也百脈朝會之處所也凡飲食入胃不敢自專地道卑而上行上朝於肺肺乃天道下濟而光明水精四布五經並行下輸膀胱小便自利豈以肺如都市聚他處之物而仍散之他處故字從肉從市手陽明大腸經左右共四十穴南陽二間三間合谷陽谿偏歷溫溜下廉上廉三里曲池肘髎五里臂臑肩髃巨骨天鼎扶突禾髎迎香大腸者傳道之官變化出焉迴腸當臍左回十六曲大四寸徑一寸寸之少半長二尺一寸受谷一斗水七升半廣腸傅脊以受迴腸乃出滓穢之路大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一是經多氣多血難經曰大腸重二斤十二兩肛門重十二兩按回腸者以其回疊也廣腸者即迴腸之更大者直腸者又廣腸之末節也下連肛門是為穀道後陰一名魄門總皆大腸也大腸為傳道之官有變易之義上受胃家之糟粕下輸於廣腸舊谷出而新谷可進故字從肉從易又暢也通暢水穀之道也大腸上口即小腸下口足陽明胃經左右共九十穴承泣四白巨髎地倉大迎頰車下關頭維人迎水突氣舍缺盆氣戶庫房屋翳膺窗乳中乳根不容承滿梁門關門太乙滑肉門天樞外陵大巨水道歸來氣衝髀關伏兔陰市梁丘犢鼻三里上巨虛條口下巨虛豐隆解谿衝陽陷谷內庭厲兌脾胃者倉廩之官五味出焉胃者水穀氣血之海也胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿是經多氣多血難經曰胃重二斤一兩胃者匯也飲食匯聚於此而為谷之府也胃之上口名曰賁門飲食之精氣從此上輸於脾肺宣播於諸脈胃之下口即小腸上口名幽門足太陰脾經左右共四十二穴隱白大都太白公孫商丘三陰交漏谷地機陰陵泉血海箕門衝門府舍腹結大橫腹哀食竇天谿胸鄉周榮大包脾者倉廩之官五味出焉形如刀鐮與胃同膜而附其上之左俞當十一椎下聞聲則動動則磨胃而主運化其合肉也其滎唇也開竅於口是經常多氣少血難經曰脾重二斤三兩廣扁三寸長五寸有散膏半斤主裹血溫五臟主藏意與智滑氏曰掩乎太倉華元化曰脾主消磨五穀養於四傍脾者卑也在胃之下裨助胃氣以化谷也遺篇刺法論曰脾為諫議之官知周出焉手少陰心經左右共十八穴極泉青靈少海靈道通里陰郄神門少府少衝心者君主之官神明出焉心居肺管之下膈膜之上附著脊之第五椎是經常少血多氣其合脈也其榮色也開竅於耳又曰舌難經曰心重十二兩中有七孔三毛盛精汁三合主藏神心象尖圓形如蓮蕊其中有竅多寡不同以導引天真之氣下無透竅上通乎舌共有四系以通四臟心外有赤黃裹脂是為心包絡心下有膈膜與脊脅周迴相著遮蔽濁氣使不得上熏心肺所謂膻中也心字移右之一點於下之左即火字也心主火四臟皆繫於心心者惺也言心氣旺則能惺惺而運其神明也手太陽小腸經左右共三十八穴少澤前谷後谿腕骨陽谷養老支正小海肩貞臑俞天宗秉風曲垣肩外俞肩中俞天窗天容顴髎聽宮小腸者受盛之官化物出焉小腸後附於脊前附於臍上左回疊積十六曲大二寸半徑八分分之少半長二丈二尺受谷二斗四升水六升三合合之大半小腸上口在臍上二寸近脊水穀由此而入復下一寸外附於臍為水分穴當小腸下口至是而泌別清濁水液滲入膀胱滓穢流入大腸是經多血少氣難經曰小腸重二斤十四兩小腸上口即胃之下口小腸下口即大腸上口名闌門足太陽膀胱經左右共一百三十四穴睛明攢竹眉沖曲差五處承光通天絡卻玉枕天柱大杼風門肺俞厥陰俞心俞督俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞氣海俞大腸俞關元俞小腸俞膀胱俞中膂俞白環俞上髎次髎中髎下髎會陽附分魄戶膏肓神堂噫嘻膈關魂門陽綱意舍胃倉肓門志室胞肓秩邊承扶殷門浮郄委陽委中合陽承筋承山飛揚跗陽崑崙僕參申脈金門京骨束骨通谷至陰膀胱者州都之官津液藏焉氣化則能出矣膀胱當十九椎居腎之下大腸之前有下口無上口當臍上一寸水分穴處為小腸下口乃膀胱上際水液出此別迴腸隨氣泌滲而入其出其入皆由氣化入氣不化則水歸大腸而為泄瀉出氣不化則閉塞下竅而為癃腫後世諸書有言其有上口無下口有言上下俱有口者皆非是經多血少氣難經曰膀胱重九兩二銖縱廣九寸盛溺九升九合口廣二寸半膀者言其橫於前陰之旁以通水也胱者言其質之薄而明也合而言之以其由虛而實旁通水道也下聯前陰溺之所出足少陰腎經左右共五十四穴湧泉然谷太谿大鐘水泉照海復溜交信築賓陰谷橫骨大赫氣穴四滿中注肓俞商曲石關陰都通谷幽門步廊神封靈墟神藏彧中俞府腎者作強之官伎巧出焉腎附於脊之十四椎下是經常少血多氣其合骨也其榮發也開竅於二陰難經曰腎有兩枚重一斤二兩主藏精與志華元化曰腎者精神之舍性命之根腎有兩枚形如豇豆相併而曲附於脊之兩傍相去合一寸五分外有黃脂包裹各有帶二條上條繫於心下條趨脊下大骨在脊骨之端如半手許中有兩穴是腎帶經過處上行脊髓至腦中連於髓海腎任也主骨而任周身之事故強弱系之手厥陰心包絡經左右共一十八穴天池天泉曲澤郄門間使內關大陵勞宮中衝心包一藏難經言其無形滑伯仁曰心包一名手心主以藏象稜之在心下橫膜之上豎膜之下其與橫膜相黏而黃脂裹者心也脂漫之外有細筋膜如絲與心肺相連者心包也此說為是凡言無形者非又按靈蘭秘典論有十二官獨少心包一官而多膻中者臣使之官喜樂出焉一節今考心包藏居膈上經始胸中正值膻中之所位居相火代君行事實臣使也此一官者其即此經之謂歟包絡者護衛心主不使濁氣干之正由君主云有宮城也手少陽三焦經左右共四十六穴關衝液門中渚陽池外關支溝會宗三陽絡四瀆天井清冷淵消濼臑會肩髎天髎天牖翳風瘈脈顱息角孫耳門和髎絲竹空三焦者決瀆之官水道出焉是經少血多氣中藏經曰三焦者人之三元之氣也總領五臟六腑營衛經絡內外左右上下之氣三焦通則內外左右上下皆通其於周身灌溉和內調外營左養右導上宣下莫大於此三焦者統上中下而言故曰三切近於臟腑故曰焦上焦出於胃上口主內而不出中焦當胃之中脘主腐熟水穀蒸津液化精微上注於肺化而為血以奉生身下焦起闌門之下主出而不內足少陽膽經左右共八十八穴瞳子髎聽會上關頷厭懸顱懸釐曲鬢率角天衝浮白竅陰完骨本神陽白臨泣目窗正營承靈腦空風池肩井淵液輒筋日月京門帶脈五樞維道居髎環跳風市中瀆陽關陽陵泉陽交外丘光明陽輔懸鐘丘墟臨泣地五會俠谿竅陰膽者中正之官決斷出焉難經曰膽在肝之短葉間重三兩三銖長三寸盛精汁三合是經多血少氣華元化曰膽者中清之府號曰將軍主藏而不寫膽者擔也言其有力量善擔當者也六節藏象論曰凡十一藏皆取決於膽也足厥陰肝經左右共二十八穴大敦行間太衝中封蠡溝中都膝關曲泉陰包五里陰廉急脈章門期門肝者將軍之官謀慮出焉肝居膈下上著脊之九椎下是經常多血少氣其合筋也其滎爪也主藏魂開竅於目其繫上絡心肺下亦無竅難經曰肝重二斤四兩左三葉右四葉凡七葉刺禁論曰肝生於左滑氏曰肝之為臟其治在左其臟在右脅右腎之前並胃著脊之第九椎肝者干也其性多動而少靜好乾犯他臟者也任脈二十四穴會陰曲骨中極關元石門氣海陰交神闕水分下脘建里中脘上脘巨闕鳩尾中庭膻中玉堂紫宮華蓋璇璣天突廉泉承漿督脈二十八穴長強腰俞陽關命門懸樞脊中中樞筋縮至陽靈臺神道身柱陶道大椎啞門風府腦戶強間後頂百會前頂囟會上星神庭素髎水溝兌端齦交任督解任督二脈為人身陰陽之綱領任行於腹總諸陰之會故為陰脈之海督行於背統諸陽之綱故為陽脈之海二脈皆起於會陰啟玄子曰甲乙經圖經以任脈循背者謂之督脈自少腹上者謂之任脈亦謂之督脈則是以背腹陰陽別為名目耳然衝脈亦起於胞中並足少陰而上行是任脈督脈衝脈乃一源而三岐者故人身之有腹背猶天地之有子午任督之有前後猶二陸之分陰陽也十六絡穴圖經脈篇止十五絡平人氣象論曰胃之大絡名曰虛里是共十六絡也然足太陰絡曰公孫而復有脾之大絡曰大包足陽明絡曰豐隆而復有胃之大絡曰虛里故諸經之絡皆一而惟脾胃之絡皆二宗營衛三氣解宗氣積於胸中出於喉嚨以貫心脈而行呼吸決氣篇曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉者是謂宗氣宗之為言大也營氣者陰氣也水穀之精氣也其精氣之行於經者為營氣營氣出於中焦並胃中出上焦之後上注於肺受氣取汁化而為血以奉生身莫貴於此其行始於太陰肺經漸降而下而終於厥陰肝經隨宗氣而行於十二經隧之中故曰清者為營營行脈中衛氣者陽氣也水穀之悍氣也其浮氣之慓疾滑利而不循於經者為衛氣衛氣出於下焦漸升而上每日平旦陰盡陽氣出於目之睛明穴上行於頭晝自足太陽始行於六陽經以下陰分夜自足少陰始行於六陰經復注於腎晝夜各二十五周不隨宗氣而自行於各經皮膚分肉之間故曰濁者為衛衛行脈外面部分位五色篇曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲明堂骨高以起平以直五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極五臟安於胸中真色以致病色不見明堂潤澤以清五官惡得無辨乎臟腑色見面部庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也男子色在於面王為小腹痛下為卵痛其圓直為莖痛在女子為膀胱子處之病散為痛摶為聚肢節色見面部顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也脈案圖式脈案者竊公案之義凡醫者治病察脈譬諸老吏斷獄一字莫移使病家洞然信從始可以接從上之道塞紛紜之口吳鶴皋向有此式余為訂定以質之同志焉
