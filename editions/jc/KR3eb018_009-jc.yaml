body:
  text: 卷九小序醫之有案如奕者之譜可按而覆也然使失之晦與冗則胡取乎家先生之醫案等身矣語簡而意明洵足以盡脈之變謹取數十則殿之由此以窺軒岐之診法焉千百世猶旦暮也新安吳文邃眩暈者三載戰慄惡寒居幃帳之內數妾擁之當五月而向火薑桂屢投病勢日劇千里延余為診其脈浮之細小沉之搏堅是鬱火內伏不得宣越也以山梔三錢黃連二錢黃柏一錢五分柴胡一錢甘草五分生薑五片乘熱亟飲之移時而惡寒少減再劑而輟去火爐逾月而起更以六味丸加知蘗人參湯送兩月全安所以知文邃病者雖惡寒而喜飲熱湯雖脈細而按之搏指灼然為內真熱而外假寒熱極反兼勝己之化以涼藥熱飲者內真寒而外假熱之劑也制臺張石林脛膝腫痛赤如塗丹用檳榔木通牛膝苡仁等藥繼用蒼朮黃柏毫末無功余診之曰尺大而軟責在少陰遂用人參地黃各三錢麥冬二錢丹皮牛膝枸杞各三錢沉香一錢連服四劑瘥減二月而康復蘇松道尊高玄圃神氣不充兩足痠軟或與安神壯骨或與補腎養陰或與清熱去濕卒不效也召余診之六脈衝和獨有中州澀而無力是土虛不能制水濕氣注於下焦以補中益氣湯加蒼朮旬日即愈夫脈虛下陷之證誤服牛膝苡仁黃柏等下行之劑則愈陷此前藥所以無功也車駕郎趙諱昌期兩臂痛甚兩手灼熱諸醫皆謂脾主四肢與之清胃健脾至三日而溺色如泔余曰六脈俱澀喉有喘呼內經云肺所生病者上氣喘滿臂痛掌中熱溺色變今諸證咸顯若合符節遂與枳殼桔梗各三錢茯苓知母各二錢甘草一錢一劑而痛減再劑而溺清三劑且霍然矣太常卿胡慕東形神俱勞十晝夜目不得瞑自服歸脾湯數劑中夜見鬼更服蘇合丸無功余曰脈大而滑痰氣膠固也二陳湯加枳實蘇子兩日進四劑未獲痊可更以人參湯送滾痰丸下痰積甚多因而瞑眩大劑六君子湯服一月乃安內臣趙榮庵忽然昏僕胸腹硬滿氣口獨強此食厥也以枳實橘紅二兩煎湯四碗加食鹽少許探吐頗多更用香砂平胃散數劑始安沔陽州學憲錢長玉夫人腹痛腸鳴或以怒傷肝氣治或以蟲積血積治余往視之身傴僂而氣喘呼脈弦而細此女子之疝也青木香廣木香各一錢五分川楝子木通肉桂茴香各一錢當歸甘草各八分一劑知四劑已新安吳聲宏荒於酒色起立輒眩僕余診之兩尺如爛綿左關弦且急病得之立而使內筋與骨並傷也聲宏鼓掌曰先生胸中有鏡指下有神古之扁倉勿是過也幸善以救吾與萆薢蠲痹湯加龜版虎骨鹿茸服兩旬而痛若失維揚孝廉王偉然喜讀書不以寒暑廢忽嘔血碗許不藥而愈偶坐談次乞余診視余曰尊恙雖愈元本日虧須兢兢保任過長夏乃安耳偉然不以余言為意余謂其弟張甫曰今長公神門欲脫水不勝火炎赫之令將不祿矣張甫曰尚可圖否余曰陽躁而不鼓陰衰而欲絕雖有智者靡所適從果至六月十九日嘔血而絕丹陽邑尊王維凝染患傷寒汗下後邪已解矣時時灼熱或曰汗後不為汗衰邪氣深重禁其飲食且與清劑困倦已極求治於余診其脈小按其腹濡此邪氣已盡正氣未復穀氣不加陽明失養非病也飢也病者不能言但首肯不已以糜粥徐徐進之日進五六次居五日弗藥而愈吳門僉憲郭履臺春秋已高少妾入房昏倦不食醫者咸知其虛投補中湯加薑桂不效遣使迎余兼夜而往視之目不能瞬口不能言肌體如烙或謂此人參薑桂之毒也余捧腹曰脈大而鼓按之如無真氣欲絕正嫌病重而藥輕耳遂以人參三兩熟附三錢煎液半日飲盡目乃大開再作劑如前至旦日飲盡口能言矣數日而神氣漸復更以大劑補中兼服八味丸計五十日而起相國方禹修足瘡浸淫綿延三載若解毒若燥濕若清熱祛風靡不遍嘗而勢不少衰余曰脈大無力氣虛之候也氣虛則下陷日與疏利有愈趨而愈下矣以補中益氣加萆薢蒼朮服外以當歸白朮膏和二妙散塗之膿水漸干更以六味丸加蒼朮黃柏間服一載而愈新安吳修予令侄煩躁發熱肌體骨立沉困著床目不得瞑者已三年矣大江以南迎醫幾遍求一刻安臥竟不可得也余診其肝脈沉而堅此怒火久伏木鬱宜達也以柴胡五錢白芍藥丹皮梔子各三錢甘草桂枝各五分日晡方進劑未抵暮而熟寐至旦日午後未寤伊兄衷伯大為憂懼余曰臥則魂歸於肝三歲不歸疲勞已極譬如久熱得涼樂而忘返無庸慮也至夜分方醒喜不自禁遺書致謝曰積患沉深揣無生理三年之疾一劑而起之人非木石刻骨感衷當與江河俱永耳相國方禹修夫人觸於驚恐身靄靄如在車船開目則眩起立欲僕眾議補虛化痰屢投弗效余為察脈左獨沉牢是驚氣入心蓄血為祟用大黃穿山甲歸尾桃仁降真蘇木鬱金一劑而血下再劑而復下數升尋愈邵武邑宰何金陽令郎久耽書癖昕夕窮神而不自節氣暴陰傷形瘁於勞精搖於夢汗出乎寐而柴柵其中餌藥歷歲毫末無功不遠數千里以乞刀圭余比至而病益進矣診其脈大而數按之極軟此中氣積虛反為涼劑所苦乃以歸脾湯入桂一錢人參五錢當晚得熟寐居二十日而汗斂精藏更以還少丹與補中益氣間服數月而康南都許輪所孫女十八歲患痰喘羸弱四月初診之手太陰脈搏指足少陰脈如爛綿水衰而火乘金也余曰金以火為讎今不浮澀而反洪大賊脈見矣腎水不能救秋令可憂至八月初五日診之肺之洪者變而為細腎之軟者變而為大歲在戊午君火司天法當兩尺不應今尺當不應而反大寸當浮大而反細經曰尺寸反者死況肺脈如絲懸懸欲絕經云脈至懸絕十二日死予之短期當在十六日然安穀者逾期不安穀者不及期以食不斷故當逾期況十六十七二日皆金助其一線之氣安得遽絕十八日交寒露節又值火日經曰手太陰氣絕丙日篤丁日死寅時乃氣血注肺之時不能注則絕必死於十八日寅時矣輪所聞之潸然淚下以為能食猶不肯信果至十八日未曉而終閩中周東志形羸善飯忽脹滿眾皆泥其食太多不能運化治以檳枳楂芽神麯厚朴脹勢轉增余以其右手洪滑知為胃火用石膏黃連山梔木香陳皮酒蒸大黃二劑而脹止閩中太學張仲輝縱飲無度兼嗜瓜果忽患泄瀉自中夜至黎明洞下二十餘次先與分利不應繼與燥劑轉見沉劇余以其六脈俱浮因思經云春傷於風夏生飧泄非大汗之不能解也麻黃升麻乾葛甘草生薑煎服原醫者笑云書生好奇妄行險峻麻黃為重劑雖在傷寒且勿輕用斯何證也而以殺之耶仲輝惑之已而困甚嘆曰吾命將盡姑服此劑以冀萬一遂服而取汗泄瀉頓止白下姚越甫乙卯秋二子俱以癆瘵斃悲痛不已蒸熱咳嗽兩目不明腰肢無力口吐清涎唇有白點或與滋陰或與開鬱或與補中或與清火藥無遺用病日益深夜夢亡父語之曰汝病已深時醫束手非士材先生不能療也醒時漏下四鼓張燈扣門乞治余診視之左脈數大無倫右脈沉緩無力此為傳屍有惡蟲蝕藏若不取去決無生理為治加味芎歸血餘散加甘遂天靈蓋共為末以東引桃枝煎湯於八月初二天未明時空心調服至辰巳時下蟲如小鼠者三枚兩頭尖者數枚以病者困頓亟與人參一兩煎服薄暮又服參一兩明日四鼓更以末藥減半服又下兩頭尖蟲數枚所下之蟲烈火煅過雄黃末研勻入瓶封固埋於僻地絕人行處另用峻補半載漸瘥江右給諫晏懷泉如夫人盛暑腹痛自汗淋漓治之以清火行氣俱無當也余診其左脈澀右脈濡此氣弱不能運行血因以阻耳與參耆薑桂桃仁歸尾蘇木玄胡索鬱金二劑而痊當盛暑而行薑桂舍時從證也吏部少宰蔣恬庵目中岐視手足麻痹或滋陰或補土或化痰湯液屢更迄無功驗余診其寸口獨大兩尺獨清是心腎不交也以六味地黃丸料配補心丹作煎液計進六劑而岐視收一月而麻痹釋然更以十全大補丸服數斤遂不復發給諫章魯齋肌體癢且麻逾三日乃發黑塊如博棋子大便痛楚嘔惡一歲之中必四五發醫者以熱毒治之絕不取效余診其脈舉之則大按之則緩濕與風俱也荊芥防風羌活獨活蒼朮白朮茯苓木通川芎當歸黃耆桔梗甘草十劑旋效更以酒糊為丸人參湯送以杜其根蒂襄陽郡侯於鑑如酒後腹痛久而痛處漸堅余曰脈大而長且搏指矣必有堅積然兩尺濡軟不敢峻攻先以四君子湯補完胃氣然後與攻積丸下十數行皆黑而韌者腹中之痛猶未盡也經曰大積大聚其可犯也衰其半而止但以補中益氣加蓬朮為丸服兩月而霍然休邑吳文哉傷寒發躁面赤足冷時時索水卻不能飲伊弟日休問余決短期手揚足擲難以候脈五六人制之方得就診脈大而無倫按之如無餘曰浮大沉小陰證似陽謂之陰躁與附子理中湯當有生理日休駭曰醫者十輩至不曰柴胡承氣則曰三黃石膏今反用熱劑烏乎敢哉余曰內真寒而外假熱服溫補猶救十中之七若用寒涼立見敗壞矣日休卜之吉遂用人參四錢熟附一錢白朮二錢乾薑一錢甘草八分煎成冰冷與飲甫一時許而狂躁稍定數劑而神清氣爽京卿須日華暴怒傷陰吐血甚多余思內經云大怒則血菀於上令人薄厥今血厥而嘔數升金氣大虛而木寡於畏也以人參一兩培養金宮且木欲實金當平之又況血脫益氣治其母也以沉香三錢制肝木更以炮姜少許為嚮導之兵再進而血始定然脈法則已違度矣經云至如頹土按之不得是肌氣予不足白虆發而死言木剋土也及期果驗江右袁啟莘居恆勞心遇事沉滯時當仲夏溲便不通五苓六一累進無功診其兩寸洪大知為心火刑金故氣化不及州都也黃連知蘗麥冬牛膝茯苓人參兩劑而小便如泉金陵朱修之八年痿廢更醫殆遍卒無中病者千里招余診其六脈有力按之搏指猶是強飯此心陽獨亢壯火炎蒸古稱脈痿者是也以承氣下數行右足展舒再下之手中可以持物更以芩連山梔酒蒸大黃蜜丸以參湯送一月之內積滯盡去四肢皆能屈伸余曰今積滯既祛真元虛憊與三才膏十斤盡劑而康復如是元氣之實如是治法之峻如是相信之專皆得未曾有不可以為訓也文學顧六吉胸中有奇痛不吐則不安者已歷兩載偶為怒觸四十日不進漿粥三十日不下溲便面赤如緋神昏如醉終事畢備以為旦夕死矣余視其脈舉之則濡接之則滑是胃中有火膈上有痰浸淫不已侵犯膻中壅遏心竅故迷昧乃爾以沉香海石膽星瓦楞子牛黃雄黃天竺黃硃砂冰麝為細末薑汁竹瀝和沸湯調送初進猶吐其半繼進乃全納矣隨服六君子加星香薑瀝兩日而溲便通三日而糜飲進調攝百餘日遂復其常徵君陳眉公患三日瘧浹氣未瘥素畏藥餌尤不喜人參余診其脈浮之則濡沉之則弱營衛俱窮故綿延不已因固請曰素不服參者天畀之豐也今不可缺者病魔之久也正氣虛憊脈如懸絲而可拘以常乎變通趨時不得失也先服錢許口有津生腹無煩滿乃色喜云素所膠而不化者今日發吾覆矣敢以性命委重惟兄所命耳遂以人參一兩何首烏一兩煎成入生薑汁一鍾甫一劑而勢減七八再進而瘧遂截給諫許霞城悲鬱之餘陡發寒熱腹中滿悶醫者謂為外感風而內挾食也余獨以為不然舉之無浮盛之象按之無堅搏之形安在其內傷外感乎不過郁傷中氣耳以補中益氣加木香白蔻十劑而復其居處之常別駕施笠澤兩足腫重痛若虎齧叫號徹於戶外自用四物湯加檳榔木通牛膝苡仁數飲之病不少殺余曰陰脈細矣按之至骨則堅未可竟以虛責也況兩膝如緋拊之烙手當以黃柏五錢為君木通四錢為佐檳榔一錢為使日進兩劑可使遄已笠澤頷余言遂遵服之十餘劑後竟安適如常矣文學朱文哉遍體如蟲螫口舌糜爛寅卯時必見二鬼執盤餐以獻向余慟哭曰餘年未滿三十高堂有垂白之親膝下無承歡之子一旦抱疴二鬼來侵決無生理倘邀如天之賜得以不死即今日之秦越人矣遂叩頭流血診其寸脈乍大乍小亦意其為祟矣細察兩關弦滑且大遂斷定為痰飲之疴投滾痰丸一服微有所下而病患如故更以小胃丹下痰及積身痛減半至明日而鬼亦不見矣更以參術煎湯送小胃丹復下數行病若失矣內侄陸文蔚之內自上脘抵少腹奇痛欲絕有以山梔枳樸為治者痛反彌甚余曰脈誠數矣獨不察其沉則軟乎不第土憊抑且火衰六君子加薑桂大劑飲之痛且應手減矣而原醫者猶曰是火證也復以火助之痛得劫而暫伏未幾將不可知已文蔚鄙其言竟信余勿疑調治一月而康復如常門人薜曇孚之內十五歲腹痛異甚面黃體瘦幼科與之清熱女科與之通經疏氣大方與之補血養氣越一月而腹痛轉劇余察其皮膚甲錯左尺獨數是小腸有癰今脈數知膿已成當以藥潰之與葵根一兩皂角刺二錢陳皮三錢兩劑而膿血大下更以太乙膏為丸參耆湯送一月而愈光祿卿吳玄水夫人腹滿而痛喘急不能食或以中滿治之無效余診其脈右尺偏大皮膚甲錯余曰此大腸癰也先與黃耆白朮陳皮當歸白芷托裡三日而脈始數數則膿已熟矣用黃耆皂刺白芷穿山甲加葵根五錢連投兩劑而膿潰如注昏暈不能支即飲獨參一兩更以八珍湯補養一月始康邑宰夏彝仲太夫人年屆八帙因彝仲還任閩中憂思成疾忽發熱頭疼諸醫誤作傷寒奪其飲食恣行發散才一劑而汗出如洗氣促而喘神昏而倦業已治凶具矣始問治於余診其脈大而無力余曰即令進食而投參耆猶懼或失之反奪其食而攻之未遽絕者幸耳用人參黃耆各五錢白朮三錢橘半各一錢五分甘草六分煨姜三錢諸醫皆曰喘為氣壅參耆入口即不可救余百口陳辨賴許霞城至力贊決之甫一劑而喘汗瘥減倍用參術至一兩證愈七八惟食未強耳此火衰不能生土加熟附二錢乾薑一錢服二月乃痊儒者吳君明傷寒六日譫狂笑語頭痛有汗大便不通小便自利眾議承氣下之余診其脈浮而大察其腹不硬不痛因思仲景云傷寒不大便六七日頭疼有熱小便清知不在裡仍在表也方今仲冬嚴寒宜與桂枝湯眾皆咋舌云譫狂為陽盛桂枝入口必死余笑曰汗多神昏故有妄語雖不大便腹無所苦和其營衛必自愈耳遂違眾用之及夜而笑語皆止明日大便自通故夫病變多端不可膠執既有譫語而能察為表證者百不得一也向使病家狐疑誤行下劑其不立斃者幾希醫者王月懷傷寒五六日以來下利日數十行懊憹目脹一時名醫共議以山藥苡仁補之且曰不服是藥瀉將脫矣余獨曰脈沉且數按其腹便攢眉作楚此協熱自利謂之旁流非正糞也當有燥屎飲以承氣湯果得結糞數枚利乃止懊憹乃定明經俞元濟背心一點痛久而漸大每用行氣和血絕不取效余問之曰遇天陰覺痛增否元濟曰天陰痛即甚余曰脈既滑而遇陰輒甚其為濕痰無疑以胃苓湯加半夏三錢數劑而不知痛所在矣刑部主政徐凌如勞與怒並遂汗出昏倦語言錯亂危篤殆甚迎余視之脈滑而軟為氣大虛而痰上湧以補中益氣湯加半夏附子四日而稍蘇更以六君子加薑汁熟附幾兩月而病乃卻文學張方之久憂暴驚遂發顛妄或補心神或逐痰涎均無裨也求治於余余曰六脈結而有力非大下其痰無由痊也先服寧志膏三日遂以小胃丹下之三月之內服小胃丹數次去痰積始盡更以歸脾妙香加牛黃龍骨為丸劑畢而康向使不與下之或雖下之未必屢屢下之以盡其痰遂成痼疾矣邑侯張孟端夫人憂憤交乘食下輒噎胸中隱隱痛余診曰陽脈滑而陰脈搏痰血互凝之象也以二陳湯加歸尾桃仁鬱金五靈脂連進四劑證猶未衰因思人參與五靈脂同劑善於浚血即以前劑入人參二錢倍用五靈脂再劑而血從大便出十劑而噎止彌月而竟安矣金元之之內患噎胸腹有奇痛以經阻故諸醫咸以瘀血處療余察其脈細為氣衰沉為寒痼反與攻血豈非加霜於雪乎況自上及下處處皆痛明徵非血矣參耆術各二錢木香薑桂各一錢煎成和醇酒進之甫入口便快半月而痛去如掃矣自是歲服理中湯數年弗輟顧淡之勞神之後躁熱異甚頭角掣痛時作時止醫者奪其食而與之解表越四日而熱不衰議將攻裡余細視之脈不浮緊安得表耶又不沉實安得里耶只有少陰大而無力為勞神太過乃虛煩類傷寒也若禁其食即益其疾耳便以糜粥與之且與大劑歸脾湯不十日安矣錢臺石年近六帙肢體不能轉側昏倦不能語言鼻竅不利二便俱秘是心肺俱虛為類中風也日伐其氣並攻其痰已瀕於危矣比余診之六脈洪盛按之搏指此至虛有盛候以形色驗之灼然也法當從證不從脈補中為主方可回生舉家惑於他言兩日不決余曰今日不進藥將為性命憂矣若補之而病進余獨任其咎乃以補中益氣加秦艽天麻竹瀝薑汁再劑而神清十日而轉側利便珍攝半載始獲全愈大宗伯董玄宰少妾吐血喘嗽蒸熱煩心先與清火繼進補中藥餌雜投竟無少效而後乞治於余余曰兩尺沉且堅小腹按之即痛此有下焦瘀血法當以峻劑行之若與平和之劑行血則堅血不得行也以四物湯加鬱金穿山甲䗪蟲大黃武火煎服一劑而黑血下二碗而痛猶未去更與一服又下三四碗而痛方止遂以十全大補丸四斤而康復如常文學顧明華十年哮喘遍治無功始向余叩首乞哀淚潸然下余診其兩寸俱澀餘部俱實澀者痰凝之象實者氣壅之徵非吐利交行則根深蒂固之痰何能去耶幸其恪遵余言半載之間吐者五次下者七次更以補中之劑加雞子秋石期年而永絕其根王邃初老於經商患哮喘者二十年矣偶值舟次談及問余尚可治否余曰年望六旬困頓日久恐不可治姑與診之喜其脈尚有神右寸浮滑是風痰膠固於太陰之經以杏仁防風甘桔白芥子麻黃連進三劑而病狀大減因以丹溪治哮丸與之仍日進六君子湯喜其不畏藥餌連服無間經歲而痊張遠公久嗽得藥如水委命待盡一日以他事晤談自謂必不可治姑乞診之余曰飢時胸中痛否遠公曰大痛視其上唇有白點痛發則口角流涎此蟲齧其肺故咳嗽耳用百部烏梅煎膏與服居十日而痛如失嗽竟止矣令其家人從淨桶中索之得寸白蟲數十條自是永不復發上舍宋敬夫心腹大痛傴僂不可以仰日與行氣和血無益也余診其左寸滑而急視其氣不能以息偶得一咳攢眉欲絕此為心疝無疑亟令其以醬姜進粥乃取小茴香川楝子青木香廣木香茱萸木通玄胡索歸身青皮一服而痛減五日而安先兄念山謫官浙江按察鬱怒之餘又當炎暑小便不通氣高而喘以自知醫頻服胃苓湯不效余曰六脈且大且結乃氣滯也但以鹽炒枳殼八錢木通三錢生薑五大片急火煎服一劑遂通四劑霍然矣邑宰章生公南都應試時八月初五日心脾痛甚食飲皆廢診其兩寸澀而無力與大劑歸脾湯加人參三錢官桂二錢生公曰嘗聞痛無補法驟補實所不敢得無礙場期乎余曰第能信而服之敢力保其無礙若誤投破氣與寒涼其礙也必矣遂煎服之不逾時而痛減續進一劑痛竟止而場事獲峻陳邃玄令郎年十六歲發盡脫落無一莖存者其脈數而大余曰腎之合骨也其榮發也多食甘則骨痛而發落此內經之言也揣其股髀間骨果覺大痛遂以還少丹加生地當歸作丸日服一兩兼進清胃湯半載之間發盡出矣孝廉俞彥直肌膚灼熱神氣昏悶聞食即嘔強進即吐困憊不能支醫者欲與溫補而眾論撓之彼告彥直云必延李士材商之比余至按之熱處在骨間脈亦沉而搏此伏火也不敢徇情面而違至理乃以黃連一錢五分山梔黃柏各一錢枳殼陳皮各二錢甘草五分煎成入薑汁三匙服之四劑而痊更以六味丸加生脈散調攝浹歲章仲輿令嬡未出閣時困於邪祟終日譫妄日與安神化痰祛邪辛香之劑已無遺用病不少間也余曰六脈忽大忽小忽浮忽沉確為祟象內服八毒赤丸外以帛緊拴兩臂復以二拇指相併扎定以小艾炷於兩介甲側肉處灼之甫十壯而乞哀願去更與四壯旦日復報七壯而祟遂絕矣鞠上舍有所抑鬱蒸熱如焚引飲不休奄奄床褥喃喃囈語每言戶外事歷歷如見始則指為傷寒繼則疑為鬼祟藥餌日投病且日進方來乞治於余診得肝脈浮濡肺脈沉數余曰木性雖浮肝則藏血藏魂而隸於下焦脈當沉長而弦金性雖沉肺則主氣藏魄而居乎至高脈當浮短而澀肺燥而失其相傅之權則肝為將軍之官無所畏制遂飛揚而上越不能自藏其魂耳嘗聞魄強者魂安今魄弱而魂不肯退藏乃逐虛陽而放蕩此名離魂魂既離矣則出入無時故戶外事皆能聞且見也當急救肺金之燥使金氣足而肝木有制則歸魂不難耳因以清燥湯加減人參黃耆天冬麥冬五味子當歸以潤肺養氣芍藥棗仁梔子甘草以攝肝歸魂橘紅沉香使九天之陽下降升麻柴胡使九地之陰上升兩劑而囈語頓止十劑而煩渴皆除攝治一月而病魔永遁燕都王湛六兄以脾泄求治神疲色瘁診得促脈或十四五至得一止或十七八至得一止余謂其原醫者曰法在不治而醫者爭之曰此非代脈不過促耳何先生之輕命耶余曰是真元敗壞陰陽交窮而促脈呈形與稽留凝泣而見促者不相侔也醫者唯唯居一月而果歿善化令黃桂岩心疼奪食脈三動一止良久不能自還原醫云五臟之氣不至法當旦夕死余曰古人謂痛甚者脈多代周梅屋云少得代脈者死老得代脈者生今桂岩春秋高矣而胸腹負痛雖有代脈安足慮乎果越兩旬而桂岩起矣故欲窮脈之變者非博學者不能也
