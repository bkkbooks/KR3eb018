body:
  text: 卷四緊脈陰中之陽體象緊脈有力左右彈人如絞轉索如切緊繩緊者繃急而兼絞轉之形也多梟動夭矯之勢素問曰往來有力左右彈人手則剛徑之概可掬主病緊主寒邪亦主諸痛左寸緊者目痛項強緊在左關脅肋痛脹左尺緊者腰臍作痛右寸緊者鼻塞膈壅緊在右關吐逆傷食右尺得緊奔豚疝疾緊為收斂之象猶天地之有秋冬故主寒邪陽困陰凝故主諸痛兼脈浮緊傷寒沉緊傷食急而緊者是謂遁尸數而緊者當主鬼擊浮緊有力無汗發熱惡寒頭項痛腰脊強拘急體痛骨節疼此為傷寒邪在表也獨右關緊盛為飲食內傷兩手脈俱緊盛即是夾食傷寒遁尸鬼擊者皆屬陰邪之氣卒中於人邪正交爭安得不急數乎中惡祟乘之脈而得浮緊謂邪方熾而脈無根也咳嗽虛損之脈而得浮緊謂正已虛而邪方痼也咸在不治按天地肅殺之氣陰凝收斂其見於脈也為緊較之於弦更加挺徑之異仲景曰如轉索無常叔和曰數如切繩丹溪曰如紉箄線譬如以二股三股糾合為繩必旋絞而轉始得緊而成繩可見緊之為義不獨縱有挺急抑且橫有轉側也不然左右彈手及轉索諸喻將何所取義乎古稱熱則筋縱寒則筋急此惟熱鬱於內而寒束其外崛強不平故作是狀緊之與遲雖同主乎寒遲則氣血有虧乃脈行遲緩而難前緊則寒邪凝襲乃脈行夭矯而搏擊須知數而流利則為滑脈數而有力則為實脈數而絞轉則為緊脈形狀畫一不可紊也崔氏但言如線亦窺見梗概第未言之透快耳緊之一字已經古人工於摹寫而僞訣妄曰寥寥入尺來思之幾同寐語夫緊脈猶之行路不惟足高氣揚履聲接踵抑且左右恣意而竟比之一龍鍾衰老舉步不前之態其比擬失倫肆口無忌何至於此庸工猶以為金針也籲可怪矣緩脈陰體象緩脈四至來往和勻微風輕颭初春楊柳緩脈以寬舒和緩為義與緊脈正相反也故曰緩而和勻不浮不沉不大不小不疾不徐意思欣欣悠悠揚揚難以名狀者此真胃氣脈也兼脈主病緩為胃氣不主於病取其兼見方可斷證浮緩傷風沉緩寒濕緩大風虛緩細濕痹緩澀脾薄緩弱氣虛左寸澀緩少陰血虛左關浮緩肝風內鼓左尺緩澀精宮不及右寸浮緩風邪所居右關沉緩土弱濕侵右尺緩細真陽衰極素問玉機真藏論岐伯曰脾者土也孤藏以灌四旁者也善者不可見惡者可見是故緩脈不主疾病惟考其兼見之脈乃可斷其為病浮而且緩風上乘也沉而且緩濕下侵也緩而且大風虛內盛緩而且細濕痹外乘緩而且澀脾不能統血也緩而且弱肺不能主氣也按緩脈在八卦為坤在五行為土在時為四季之末在人身為足太陰脾若陽寸陰尺上下同等浮大而軟無偏勝者和平之脈也故張太素又比之如絲在經不卷其軸應指和緩往來甚勻蓋土為萬物之母中氣調和則百疾不生緩之於脈大矣哉素問玉機真藏論曰其來如水之流者此為太過病在外如鳥之喙此謂不及病在中太過則令人四肢沉重不舉不及則令人九竅壅塞不通脈經云脾王之時其脈大阿阿而緩名曰平脈反得弦細而長者是肝之乘脾木之剋土為賊邪死不治反得浮澀而短者是肺之乘脾子之扶母為實邪雖病自愈反得洪大而散者是心之乘脾母之歸子為虛邪雖病易治反得沉濡而滑者是腎之乘脾水之陵土為微邪雖病即瘥僞訣以緩脈主脾熱口臭反胃齒痛夢鬼諸證似乎緩脈主實熱有餘之證杜撰如此芤脈陽中陰體象芤乃草名絶類慈蔥浮沉俱有中候獨空芤草狀與蔥無異假令以指候蔥浮候之著上面之蔥皮中候之正當蔥中空處沉候之又著下面之蔥皮主病芤狀中空故主失血左寸芤者心主喪血芤在左關肝血不藏左尺得芤便紅為咎右寸芤者相傅陰亡芤在右關脾血不攝右尺得芤精漏欲竭衛行脈外營行脈中凡失血之病脈中必空故主證如上按芤之為義兩邊俱有中央獨空之象劉三點云芤脈何似絶類慈蔥指下成窟有邊無中叔和云芤脈浮大而軟按之中央空兩邊實二家之言已無遺蘊戴同父云營行脈中脈以血為形芤脈中空脫血之象僞訣云兩頭有中間無以頭字易叔和之邊字則是上下之脈劃然中斷而成陰絶陽絶之診矣又云寸芤積血在胸中關內逢芤腸里癰是以芤為蓄血積聚之實脈非失血虛家之空脈矣時珍亦祖述其言豈曾未精思耶僞訣又云芤主淋瀝氣入小腸與失血之候有何干涉即叔和云三部脈芤長病得之生卒病得之死然暴失血者脈多芤而謂卒病得之死可乎其言亦不能無疵也至劉肖齊所引諸家論芤脈者多出附會不可盡信若周菊潭謂生平診脈未有芤象者抑何其言之不審耶虞德恆治一人潮熱微似瘧小腹右邊一塊大如雞卵作痛右腳不能申縮虞診其脈左寸芤而帶澀右寸芤而洪實兩尺兩關俱洪數曰此大小腸之間欲作癰耳虞說仍沿僞訣以寸尺相為表裡耳然芤者中空之象帶澀猶可並曰帶洪實實則不芤而芤則不實豈虞之辨證乃別有據姑托於脈以明其術耶否則於理亦不可解矣弦脈陽中之陰體象弦如琴絃輕虛而滑端直以長指下挺然弦之為義如琴絃之挺直而略帶長也弦脈與長脈皆主春令但弦為初春之象陽中之陰天氣猶寒故如琴絃之端直而挺然稍帶一分之緊急也長為暮春之象純屬於陽絶無寒意故如木干之迢直以長純是發生氣象也主病弦為肝風主痛主瘧主痰主飲左寸弦者頭痛心勞弦在左關痰瘧癥瘕左尺得弦飲在下焦右寸弦者胸及頭疼弦在右關胃寒膈痛右尺得弦足攣疝痛膽為甲木肝為乙木自北而東在肝為厥陰而陰盡在膽為少陽而陽微初春之象逗氣尚少升如一縷有弦義焉風屬木而應春弦是其本脈生於風則象風故脈自弦弦寒斂束氣不舒暢故又主痛瘧之作也邪正交爭或寒而熱熱而寒寒熱往來正邪出入樞主於中素問陰陽離合論曰少陽為樞故脈亦當弦飲者痰之類也弦直而斂無鼓蕩之力故飲留焉頭乃六陽所聚陽虛不能張大或致外邪所乘安得不痛瘧疾寒熱往來常在少陽經故曰瘧脈自弦又曰無痰不成瘧癥瘕處於其地則邪正不敵小腹沉陰之位受寒乃痛肺家陽氣衰微更受陰寒或右邊頭痛或胸次作疼木來乘土胃寒不化真火不足無以溫暖肝木攣痛之自來也兼脈浮弦支飲沉弦懸飲弦數多熱弦遲多寒陽弦頭疼陰弦腹痛單絃飲癖雙弦寒痼飲停在上不在胃而支留於心胸飲停在下不在胃而懸留於腹脅故一弦而浮一弦而沉也數則為熱弦而兼數者病亦兼熱遲則為寒弦而兼遲者病亦兼寒陽弦者寸弦也邪在三陽三陽走頭故頭疼陰弦者尺弦也邪在三陰三陰走腹故腹痛單絃則止為飲癖若脈見雙弦已具純陰之象若不能食為木來剋土必不可治按弦脈在八卦為震在五行為木在四時為春在五臟為肝素問玉機真藏論曰春脈肝也東方木也萬物之所以始生也故其氣來軟弱輕虛而滑端直以長故曰弦反此者病其氣來而實強此為太過病在外其氣來不實而微此為不及病在中太過則令人善怒忽忽眩冒而巔疾不及則令人胸脅痛引背兩脅胠滿素問平人氣象論曰平肝脈來軟弱招招如揭長竿末梢曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死戴同父云弦而軟其病輕弦而硬其病重深契內經之旨素問玉機真藏論云端直以長叔和云如張弓弦巢氏云按之不移察察如按琴瑟弦戴同父云從中直過挺然指下諸家之論弦脈可謂深切著明而僞訣乃言時時帶數又言脈緊狀繩牽則是緊脈之象安在其弦脈之義哉弦亦謂其主痰然以飲較痰尚未結聚所以弦不似滑之纍纍替替之有物形也革脈陽中之陰體象革大弦急浮取即得按之乃空渾如鼓革恰如鼓皮外則繃急內則空虛也故浮取於鼓面而已即得若按之則虛而無物矣主病革主表寒亦屬中虛左寸革者心血虛痛革在左關疝瘕為祟左尺得革精空可必右寸革者金衰氣壅革在右關土虛而疼右尺得革殞命為憂女人得之半産漏下脈如皮革表邪有餘而內則不足惟表有寒邪故弦急之象先焉惟中虧氣血故空虛之象顯焉男人諸病多由精血不足之故女人半産漏下者亦以血驟去故脈則空也按革者皮革之象也浮舉之而弦急非繃急之象乎沉按之而豁然非中空之象乎仲景曰脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革此節正革脈之注腳也革如皮革急滿指下今云脈弦而大只此四字可以盡革脈之形狀矣弦則為減以下又發明所以為革之義也叔和云三部脈革長病得之死新病得之生時珍云此芤弦二脈相合故為亡精失血之候諸家脈書皆以為即牢脈也故或有革無牢或有牢無革混淆莫辨不知革浮牢沉革虛牢實形與證皆異也甲乙經曰渾渾革革至如湧泉病進而色弊綿綿其去如弦絶者死謂脈來渾濁革變急如泉湧出而不返也觀其曰湧泉則浮取之不止於弦大而且數且搏且滑矣曰弦絶則重按之不止於豁然而且絶無根蒂矣故曰死也王貺以為溢脈者因甲乙經有湧泉之語而附會其說也不知溢脈者自寸而上貫於魚際直衝而上如水之沸而盈溢也與革脈奚涉乎丹溪曰如按鼓皮其於中空外急之義最為切喻伯仁以革為變革之義誤矣若曰變革是怪脈也而革果怪脈乎則變革之義何居耶牢脈陰中之陽體象牢在沉分大而弦實浮中二候了不可得深居在內之象也故樹本以根深為牢蓋深入於下者也監獄以禁囚為牢深藏於內者也仲景曰寒則牢固又有堅固之義也主病牢主堅積病在乎內左寸牢者伏梁為病牢在左關肝家血積左尺得牢奔豚為患右寸牢者息賁可定牢在右關陰寒痞癖右尺得牢疝瘕痛甚牢脈所主之證以其在沉分也故悉屬陰寒以其形弦實也故咸為堅積積之成也正氣不足而邪氣深入牢固心之積名曰伏梁肝之積名曰肥氣腎之積名曰奔豚肺之積名曰息賁脾之積名曰痞氣及一切按之應手者曰癥假物成形者曰瘕見於肌肉間者曰痃結於隱癖者曰癖經曰積之始生得寒乃生厥乃成積故牢脈咸主之若夫失血亡精之人則內虛而當得革脈乃為正象若反得牢脈是脈與證反可以卜短期矣按沈氏曰似沉似伏牢之位也實大弦長牢之體也牢脈不可混於沉脈伏脈須細辨耳沉脈如綿裹砂內剛外柔然不必兼大弦也伏脈非推筋至骨不見其形在於牢脈既實大才重按之便滿指有力以此為別耳叔和云似沉似伏猶不能作畫一之論也吳草廬曰牢為寒實革為虛寒安可混乎僞訣云尋之則無按之則有但依稀倣佛卻不言實大弦長之形象是沉脈而非牢脈矣又曰脈入皮膚辨息難更以牢為死亡之脈其謬可勝數哉濡脈陰中之陰體象濡脈細軟見於浮分舉之乃見按之即空濡者即軟之象也必在浮候見其細軟若中候沉候不可得而見也叔和比之帛浮水面時珍比之水上浮漚皆狀其隨手而沒之象也主病濡主陰虛髓竭精傷左寸濡者健忘驚悸濡在左關血不榮筋左尺得濡精血枯損右寸濡者腠虛自汗濡在右關脾虛濕侵右尺得濡火敗命傾按浮主氣分浮取之而可得氣猶未敗沉主血分沉按之而如無此精血衰敗在久病老年之人尚未至於必絶為其脈與證合也若平人及少壯及暴病見之名為無根之脈去死不遠叔和言輕手相得按之無有僞訣反言按之似有舉之無悖戾一至於此耶且按之則似有舉之則還無是弱脈而非濡脈矣濡脈之浮軟與虛脈相類但虛脈形大而濡脈形小也濡脈之細小與弱脈相類但弱在沉分而濡在浮分也濡脈之無根與散脈相類但散脈從浮大而漸至於沉濡脈從浮小而漸至於不見也從大而至沉者全凶從小而之無者為吉凶相半也又主四體骨蒸蓋因腎氣衰絶水不勝火耳弱脈陰體象弱脈細小見於沉分舉之則無按之乃得沉而且細且小體不充勢不鼓也主病弱為陽陷真氣衰弱左寸弱者驚悸健忘弱在左關木枯攣急左尺得弱涸流可徵右寸弱者自汗短氣弱在右關水穀之疴右尺得弱陽陷可驗夫浮以候陽陽主氣分浮取之而如無則陽氣衰微確然可據夫陽氣者所以衛外而為固者也亦以運行三焦熟腐五穀者也柳氏曰氣虛則脈弱寸弱陽虛尺弱陰虛關弱胃虛弱脈呈形而陰霾已極自非見睍而陽何以復耶素問玉機真藏論曰脈弱以滑是有胃氣脈弱以澀是為久病愚謂弱堪重按陰猶未絶若兼澀象則氣血交敗生理滅絶矣仲景云陽陷入陰當惡寒發熱久病及衰年見之猶可維援新病及少壯得之不死安待按脈經曰弱脈極軟而沉細按之乃得舉手無有何其彰明詳盡也僞訣謂輕手而得明與叔和相戾且是濡脈之形而非弱脈之象因知僞訣誤以濡脈為弱弱脈為濡其鹵莽特甚即黎氏浮漚之譬亦踵高陽之弊不可不詳加考據也散脈陰體象散脈浮亂有表無里中候漸空按則絶矣自有漸無之象亦散亂不整之象也當浮候之儼然大而成其為脈也及中候之頓覺無力而減其十之七八矣至沉候之杳然不可得而見矣主病散為本傷見則危殆左寸散者怔忡不臥散在左關當有溢飲左尺得散北方水竭右寸散者自汗淋漓散在右關脹滿蠱壞右尺得散陽消命絶按漸重漸無漸輕漸有明乎此八字而散字之象恍然矣故叔和云散脈大而散有表無里字字斟酌崔氏云渙漫不收蓋渙漫即浮大之義而不收即無根之義雖得其大意而未能言之鑿鑿也柳氏云無統紀無拘束至數不齊或來多去少或去多來少渙散不收如楊花散漫之象夫楊花散漫即輕飄而無根之說也其言至數不齊多少不一則散亂而不能整齊嚴肅之象也此又補叔和未備之旨深得散脈之神者也戴同父云心脈浮大而散肺脈短澀而散皆平脈也心脈軟散為怔忡肺脈軟散為汗出肝脈軟散為溢飲脾脈軟散為胻腫皆病脈也腎脈軟散諸病脈代散皆死脈也古人以代散為必死者蓋散為腎敗之徵代為脾絶之徵也腎脈本沉而散脈按之不可得見是先天資始之根本絶也脾脈主信而代脈歇至不愆其期是後天資生之根本絶也故二脈獨見均為危殆之候而二脈交見尤為必死之符細脈陰體象細直而軟纍纍縈縈狀如絲線較顯於微小也細也狀如絲也比之於微指下猶尚易見未至於舉按模糊也主病細主氣衰諸虛勞損左寸細者怔忡不寐細在左關肝血枯竭左尺得細泄痢遺精右寸細者嘔吐氣怯細在右關胃虛脹滿右尺得細下元冷憊細脈微脈俱為陽氣衰殘之候夫氣主昫之非行溫補何以復其散失之元乎常見虛損之人脈已細而身常熱醫者不究其元而以涼劑投之何異於惡醉而強酒遂使真陽散敗飲食不進上嘔下泄是速之使斃耳素問陰陽別論云壯火食氣少火生氣人非少火無以運行三焦熟腐五穀未徹乎此者安足以操司命之權哉然虛勞之脈細數不可並見並見者必死細則氣衰數則血敗氣血交窮短期將至叔和云細為血少亦主氣衰有此證則順無此證則逆故吐利失血得沉細者生憂勞過度之人脈亦多細為自戕其氣血也春夏之令少壯之人俱忌細脈謂其不與時合不與形合也秋冬之際老弱之人不在禁忌之例按絲之質最柔絲之形最細故以形容細脈王啓玄曰狀如莠蓬正於柔細之態善摩巧擬恍在目前僞訣失其柔軟之意而但云極細則可移於微脈而豈能獨標細脈之體象乎微細二脈或有單指陽衰或有單指陰竭或有兼陰陽而主病則非畫一之論矣大都浮而細者屬之陽分則見自汗氣急等證沉而細者屬之陰分則見下血血痢等證伏脈陰體象伏為隱伏更下於沉推筋著骨始得其形伏之為義隱伏而不見之謂也浮中二候絶無影響雖至沉候亦不可見必推筋至骨方始得見耳主病伏脈為陰受病入深左寸伏者血鬱之愆伏在左關肝血在腹左尺得伏疝瘕可驗右寸伏者氣鬱之殃伏在右關寒凝水穀右尺得伏少火消亡其主病多在沉陰之分隱深之地非輕淺之劑所能破其籓垣也諸證莫非氣血結滯惟右關右尺責其無火蓋火性炎上推筋至骨而形始見積衰可知更須以有力無力細為分辨則伏中之虛實燎然矣按傷寒論中以一手脈伏為單伏兩手脈伏曰雙伏不可以陽證見陰脈為例也火邪內郁不得發越乃陽極似陰故脈伏者必有大汗而解正如久旱將雨必先六合陰晦一回雨後庶物咸蘇也又有陰證傷寒先有伏陰在內而外復感冒寒邪陰氣壯盛陽氣衰微四肢厥逆六脈沉伏須投薑附及灸關元陽乃復回脈乃復出也若太溪衝陽皆無脈者則必死無疑劉玄賓云伏脈不可發汗為其非表脈也亦為其將自有汗也乃僞訣云徐徐發汗而潔古欲以附子細辛麻黃湯發之皆非伏脈所宜也僞訣論形象則妄曰尋之似有定息全無是於中候見形矣於伏之名義何居乎動脈陽體象動無頭尾其形如豆厥厥動搖必兼滑數動脈厥厥動搖急數有力兩頭俯下中間突起極與短脈相類但短脈為陰不數不硬不滑也動脈為陽且數且硬且滑也主病動脈主痛亦主於驚左寸動者驚悸可斷動在左關驚及拘攣左尺得動亡精失血右寸動者自汗無疑動在右關心脾疼痛右尺得動龍火奮迅陰陽不和氣搏擊則痛氣攛迸則驚動居左寸心主受侮驚悸至矣肝膽同居肝主筋而膽主震定動則皆病人之根蒂在尺動則陽不能衛陰不能守亡精失血可立而待肺家主氣動則外衛不密汗因之泄陰陽相搏心脾不安動乃痛作右尺真陽潛伏之所而亦見動象則陽氣不得蟄藏必有非時奮迅之患按關前為陽關後為陰故仲景云陽動則汗出分明指左寸之心汗為心之液右寸之肺肺主皮毛而司腠理故汗出也又曰陰動則發熱分明指左尺見動為腎水不足右尺見動謂相火虛炎故發熱也因是而知舊說言動脈只見於關上者非也且素問曰婦人手少陰心脈動甚者為妊子也然則手少陰明隸於左寸矣而謂獨見於關可乎成無己曰陰陽相搏而虛者動故陽虛則陽動陰虛則陰動以關前為陽主汗出關後為陰主發熱豈不精妥而龐安常強為之說云關前三分為陽關後二分為陰正當關位半陰半陽故動隨虛見是亦泥動脈只見於關之說也僞訣云尋之似有舉之還無是弱脈而非動脈矣又曰不離其處不往不來三關沉沉含糊謬妄無一字與動脈合義矣詹氏曰如鉤如毛則混於浮大之脈尤堪捧腹王宇泰曰陽生陰降二者交通上下往來於尺寸之內方且沖和安靜焉睹所謂動者哉惟夫陽欲降而陰逆之陰欲升而陽逆之兩者相搏不得上下擊鼓之勢隴然高起而動脈之形著矣此言不啻與動脈寫照促脈陽體象促為急促數時一止如趨而蹶進則必死促之為義於急促之中時見一歇止為陽盛之象也黎氏曰如蹶之趨徐疾不常深得其義叔和云促脈來去數時一止復來亦頗明快主病促因火亢亦因物停左寸促者心火炎炎促在左關血滯為殃左尺得促遺滑堪憂右寸促者肺鳴咯咯促在右關脾宮食滯右尺得促灼熱為定按人身之氣血貫注於經脈之間者刻刻流行綿綿不息凡一晝夜當五十營不應數者名曰狂生其應於脈之至數者如鼓應桴罔或有忒也藏氣乖違則稽留凝泣阻其運行之機因而歇止者其止為輕若真元衰憊則陽弛陰涸失其揆度之常因而歇止者其止為重然促脈之故得於藏氣乖違者十之六七得於真元衰憊者十之二三或因氣滯或因血凝或因痰停或因食壅或外因六氣或內因七情皆能阻遏其運行之機故雖當往來急數之時忽見一止耳如止數漸稀則為病瘥止數漸增則為病劇所見諸症不出血凝氣滯更當與他脈相參耳促脈隨病呈形僞訣但言並居寸口已非促脈之義且不言時止猶為瞶瞶矣結脈陰體象結為凝結緩時一止徐行而怠頗得其旨結而不散遲滯中時見一止也古人譬諸徐行而怠偶羈一步可為結脈傳神主病結屬陰寒亦由凝積左寸結者心寒疼痛結在左關疝瘕必現左尺得結痿躄之疴右寸結者肺虛氣寒結在右關痰滯食停右尺得結陰寒為楚熱則流行寒則停凝理勢然也夫陰寒之中且挾凝結喻如隆冬天氣嚴肅流水冰堅也少火衰弱中氣虛寒失其乾健之運則血氣痰食互相糾纏浮結者外有痛積伏結者內有積聚故知結而有力者方為積聚而無力者是真氣衰弱違其運化之常惟一味溫補為正治越人云結甚則積甚結微則氣微是知又當以止歇之多寡而斷病之重輕也按運行之機緘不利則脈應之而成結仲景云纍纍如循長竿曰陰結藹藹如車蓋曰陽結叔和云如麻子動搖旋引旋收聚散不常為結則結之體狀有非淺人所領會也夫是三者雖同名為結而義實有別浮分得之為陽結沉分得之為陰結止數頻多三五不調為不治之症由斯測之結之主症未可以一端盡也僞訣云或來或去聚而卻還律以緩時一止之義全無相涉豈欲倣佛叔和旋引旋收之狀而詞不達意乎此著述之所以不可易易也代脈陰體象代為禪代止有常數不能自還良久復動代亦歇止之脈但促結之止內有所礙雖止而不全斷中有還意代則止而不還良久復止如四時之禪代不愆其期也又促結之止止無常數代脈之止止有定期主病代主藏衰危惡之候脾土敗壞吐利為咎中寒不食腹疼難救止有定期者蓋脾主信也故內經以代脈一見為藏氣衰微脾氣脫絶之診按代脈之義自各不同如素問宣明五氣篇曰脾脈代靈樞邪氣臟腑病形篇曰黃者其脈代皆言藏氣之常候非謂代為止也素問平人氣象論曰長夏胃微軟弱曰平但代無胃曰死者蓋言無胃氣而死亦非以代為止也若脾王四季而隨時更代者乃氣候之代即宣明五氣等篇所云者是也若脈平勻而忽強忽弱者乃形體之代即宣明五氣等篇所云者是也脈無定候更變不常則均為之代須因變察情如雲五十動而不一代者是乃至數之代大抵脈來一息五至則肺心脾肝腎五臟之氣皆足故五十動而不一止合大衍之數謂之平脈反此則止乃見焉腎氣不能至則四十動一止肝氣不能至則三十動一止脾氣不能至則二十動一止心氣不能至則十動一止肺氣不能至則四五動一止至當自遠而近以次而短則由腎及肝由肝及脾由脾及心由心及肺故凡病將死者必氣促以喘僅呼於胸中數寸之間此時真陰絶於下孤陽浮於上氣短已極醫者猶欲平之散之未有不隨撲而滅者戴同父云三部九候候必滿五十動出自難經而僞訣五臟歌中皆以四十五動准乖於經旨又云四十一止一藏絶卻後四年多命沒荒疵尤甚夫人豈有一藏既絶尚活四年叔和亦曰脈來四十動而一止者一藏無氣卻後四歲春草生而死未知靈樞根結篇但言動止之數以診五臟無氣之候何嘗鑿言死期耶滑伯仁曰無病而羸瘦脈代者危候也有病而氣血乍損只為病脈此伯仁為暴病者言也若久病而得代脈冀其回春萬不得一矣傷寒心悸有中氣虛者停飲者汗下後者中氣虛則陽陷陽受氣於胸中陽氣陷則不能上充於胸中故悸停飲者飲水多而停於心下也水停心下水氣上凌心不自安故悸汗後則裡虛矣況汗乃心液心液耗則心虛心虛故悸諸悸者未必皆脈代若脈代者正指汗後之悸以汗為心液脈為心之合耳女胎十月而産腑臟各輸真氣資以培養若至期當養之經虛實不調則胎孕為之不安甚則下血而墮矣當三月之時心包絡養胎靈樞經脈篇云心包主脈若分氣及胎脈必虛代在靈樞五臟生成篇曰心合脈蓋心與心包雖分二經原屬一藏故耳代脈主病但標脾臟虛衰而不及他症故附列焉疾脈陽體象疾為疾急數之至極七至八至脈流薄疾六至以上脈有兩稱或名曰疾或名曰極總是急速之形數之甚者也主病疾為陽極陰氣欲竭脈號離經虛魂將絶漸進漸疾旦夕殞滅毋論寸尺短期已決陰陽相等脈至停均若脈來過數而至於疾有陽無陰其何以生是惟傷寒熱極方見此脈非他疾所恆有也若癆瘵虛憊之人亦或見之則陰髓下竭陽光上亢可與之決短期矣陰陽易病者脈常七八至號為離經是已登鬼籙者也至夫孕婦將産亦得離經之脈此又非以七八至得名如昨浮今沉昨大今小昨遲今數昨滑今澀但離於平素經常之脈即名為離經矣心肺諸證總之真陰消竭之兆譬如繁弦急管樂作將終烈焰騰空薪傳欲盡夫一息四至則一晝一夜約一萬三千五百息通計之當五十周於身而脈行八百一十丈此人身經脈流行之常度也若一息八至則一日一夜周於一身者當一百營而脈遂行一千六百餘丈矣必至喘促聲嘶僅呼吸於胸中數寸之間而不能達於根蒂真陰極於下孤陽亢於上而氣之短已極矣夫人之生死由於氣氣之聚散由乎血凡殘喘之尚延者只憑此一線之氣未絶耳一息八至之候則氣已欲脫而猶冀以草木生之何怪其不相及也
