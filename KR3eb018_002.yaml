body:
  text: 卷二小序崔紫虛所著四言脈訣由來尚矣刪補之者為李月池氏更名四言舉要豫取兩刻而損益之或繁或簡期合於理而已敢曰崔李之功臣哉脈為血脈氣血之先血之隧道氣息應焉脈為氣乎而氣為衛衛行脈外則知非氣矣脈為血乎而血為營營行脈中則知非血矣脈為經隧乎而經隧實繁則知非經隧矣善乎華元化云脈者氣血之先也蓋人之身惟是精與氣與神三者精氣即血氣氣血之先非神而何人非是神無以主宰血氣保合太和流行三焦灌溉百骸故脈非他即神之別名也明乎此則氣也血也渾淪條析所謂氣如橐籥血如波瀾一升一降以成其用而脈道成矣資始於腎資生於胃血脈氣息上下循環人未有此身先有此腎氣血藉之以立基而神依於氣氣依於血血資於谷谷本於胃是知胃氣充則血旺血旺則氣強氣強則神昌故曰先天之根本在腎後天之根本在脾脾胃相為夫妻神之昌與否皆以脈為徵兆脈之行也氣行而血隨上下周匝起伏交會詬濡守使各盡其職十二經中皆有動脈惟手太陰寸口取決難經一難曰十二經皆有動脈獨取寸口何謂也扁鵲曰寸口者脈之大會手太陰之動脈也以肺為五臟六腑之華蓋布一身之陰陽居於至高之位凡諸臟腑皆處其下肺繫上連喉嚨吭嗌以通呼吸肺主一身之氣氣非呼吸不行脈非肺氣不布故耳然素問五臟別論曰帝曰氣口何以獨為五臟主岐伯曰胃者水穀之海六腑之大源也五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口其義又所重在胃矣細思之而理則一也氣口本屬太陰而曰亦太陰者蓋氣口屬肺手太陰也布行胃氣則在於脾足太陰也按靈樞營衛生會篇曰谷入於胃以傳於肺五臟六腑皆以受氣厥論曰脾主為胃行其津液者也素問經脈別論曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺脾氣必歸於肺而後行於臟腑營衛所以氣口雖為手太陰而實即足太陰之所歸故曰氣口亦太陰也乃知五臟六腑之氣味皆由胃入脾由脾入肺此地道卑而上行也由肺而分布於臟腑此天道下濟而光明也土居中而為金之母系諸脈之根肺居高而有君之象布諸脈之令故曰肺朝百脈而寸口為之大會猶水之朝宗於澥也又考氣口即寸口也肺主諸氣氣之盛衰見於此故曰氣口脈出太淵共長一寸九分故曰寸口又肺朝百脈脈之大會聚於此故曰脈口其實一也吳草廬曰醫者於寸關尺輒名之曰此心脈此肺脈此肝脈此脾脈此腎脈者非也五臟六腑凡十二經兩手寸關尺者手太陰肺金之一脈也分其部位以候他藏之氣耳脈行始於肺終於肝而復會於肺肺為氣出入之門戶故名曰氣口而為脈之大會以占一身焉李時珍曰兩手六部皆肺之經脈也特取此以候五臟六腑之氣耳非五臟六腑所居之處也靈樞素問難經載十二經脈有走於手而不從三部過者如手陽明大腸經之脈起大指次指之端從大指次指之間盡處為合谷一路為臂之上廉入肘外上肩而終迎香以交於足陽明胃經也與右寸無干足陽明胃經之脈起於鼻之交頞中下行屬胃絡大腸至足而終於厲兌足大指端以交於足太陰脾經也與右關無干足太陰脾經之脈起於足之大指之端上行膝股入腹中以交於手少陰心經也與右關無干手少陰心經之脈起於心中下絡小腸其支者循臑下下肘內後廉小指一路終於小指之端即少衝穴以交於手太陽小腸經也與左寸無干手太陽小腸之脈起於小指之端循臂外側左右交於兩肩下屬小腸上行於頭絡於顴而終於耳中即聽宮穴以交於足太陽膀胱經也與左寸無干足太陽膀胱之脈起於目內眥下行絡腎屬膀胱終於足小指至陰穴以交於足少陰腎經也與左尺無干足少陰腎經之脈起於足小指上行循喉嚨挾舌本注於膻中以交於手厥陰心包絡經也與左尺無干手厥陰心包絡經之脈起於胸中屬心下之包絡入肘內之曲澤穴行臂兩筋之間入掌中循中指出其端而終以交於手少陽三焦經也脈行中指一路與左尺無干手少陽三焦之脈起於小指次指之端即無名指行臂外兩骨之間下絡膀胱其支者從膻中而止耳終於絲竹空而交於足少陽膽經也小指一路亦與右尺無干足少陽膽經之脈起於目鋭眥下胸中絡肝屬膽入足小指次指之間其支者自足跗出大指端以交於足厥陰肝經也足厥陰肝經之脈起於足大指叢毛之際循陰器屬肝絡膽上貫膈循喉嚨之後上入頏顙連目系出額其支者從目系下行至中脘以交於手太陰肺也則足之少陽厥陰皆不行於手惟有肺脈起於中焦循臂內上魚際終於大指之端即少商穴其支者從腕後臂骨盡處為腕出大指次指之端以交於大腸經也乃知此經正屬寸口肺之動脈所行之處也至如諸經動脈各從所行之處手陽明大腸脈動合谷在手大指次指岐骨間手少陰心脈動極泉在臂內腋下筋間手太陽小腸脈動天窗在頸側大筋間曲頰下手少陽三焦脈動和髎在耳前手厥陰心包絡脈動勞宮在掌中屈中指無名指盡處是足太陽膀胱脈動委中在膝骨約紋里足少陰腎脈動太溪在踝後跟骨上足太陰脾脈動衝門在期門下尺五寸足陽明胃脈動衝陽足大指次指陷中為內庭上內庭五寸是足厥陰肝脈動太衝足大指本節後二寸足少陽膽脈動聽會在耳前陷中夫諸經脈之動各自不同況不盡行於三部僞訣胡為漫無分疏乎難經二難雖言尺寸其意以關為界從關至魚際為一寸為陽陽得寸內之九分從關至尺澤為一尺為陰陰得尺中一寸乃以陰陽而言未嘗分經絡也然則臟腑果何藉以診乎經不云乎呼出心與肺吸入腎與肝呼吸之間脾受穀味也脈之盛衰本於胃出入由於肺胃氣如物之有輕重肺氣如物之輕重者權衡以平也如僞訣即以某部為某經其鑿甚矣脈之行於十二經絡者即手足三陰三陽之經脈也難經二十三難曰經脈十二絡脈十五何始何窮也然經脈者行血氣通陰陽以營衛於一身者也其始中焦注手太陰肺手太陰肺注手陽明大腸手陽明大腸注足陽明胃足陽明胃注足太陰脾足太陰脾注手少陰心手少陰心注手太陽小腸手太陽小腸注足太陽膀胱足太陽膀胱注足少陰腎足少陰腎注手厥陰心包手厥陰心包注手少陽三焦手少陽三焦注足少陽膽足少陽膽注足厥陰肝足厥陰肝還復注手太陰是謂一周也身形之中有營氣有衛氣有宗氣有臟腑之氣有經絡之氣各為區分其所以統攝臟腑經絡營衛而令充滿無間環流不息於通體者全恃胸中大氣為之主持大氣之說嘗一言之素問五運行大論曰黃帝問地之為下否乎岐伯曰地為人之下太虛之中者也曰馮乎曰大氣舉之也可見太虛寥廓而能充周磅礴包舉地之全體者莫非氣也故四虛無著然後寒暑燥濕風火之氣入地中而生化若不繇大氣苞地於無外則地之崩墜震動且不可言胡以巍然中處而永生其化耶人身亦然五臟六腑大經小絡晝夜循環不息必賴胸中大氣斡旋其間大氣一衰出入廢而升降息矣神機化滅立見危殆或謂大氣即膻中之氣所以膻中為心主宣布政令臣使之官然而參之天運膻中臣使但可盡寒暑燥濕風火六入之職必如太虛沕穆無可名象苞舉地形永奠厥中始為大氣膻中既稱臣使是有其職未可言大氣也或謂大氣即宗氣之別名宗者尊也主也十二經脈奉之為尊主也詎知宗氣與營氣衛氣分為三隧既有隧之可言即同六入地中之氣而非太虛之比矣膻中之診即心包絡宗氣之診在左乳下原不與大氣混診也然則大氣如何而診之內經標示昭然而讀者不察耳其謂上附上右外以候肺內以候胸中者正其診也肺主一身之氣而治節行焉苞舉無外之氣於人身者獨由胸中之肺故分其診於右手主氣之天部朝百脈而稱大會也脈之大會息之出入一呼一吸四至為息醫者調勻氣息自一呼人之脈再至自一吸人之脈亦再至呼吸之間而脈准來四至者為平脈間有五至者亦未可斷病蓋人之氣息時長時短凡鼓三息必有一息之長鼓五息又有一息之長名為太息如歷家三歲一閏五歲再閏也言脈必有四至為平五至便為太過惟正當太息之時亦曰無疴此息之長非脈之急也若非太息正合四至也呼吸既定合為一息日夜一萬三千五百呼出於陽吸入於陰一呼脈二至一吸脈二至合四至為一息一日一夜共計之約一萬三千五百息呼吸之間脈行六寸八百十丈日夜為準即此一呼一吸計之一呼氣行三寸一吸氣行三寸呼吸既定脈氣行去六寸以一萬三千五百息算之共得八百一十丈以脈數之十六丈二尺折算應周行身五十度此晝夜脈行之度數準則也按越人二十三難云脈數總長十六丈二尺任督二蹺在內以一呼一吸行六寸算之晝夜一萬三千五百息共計八百一十丈周於身者得五十度後又云其始從中焦注手太陰終於足厥陰厥陰復還注手太陰所謂如環無端者不知二蹺任督從何接入豈附行於足少陰太陽耶附則不能在循環注接之內當俟知者凡診病脈平旦為準虛靜凝神調息細審平旦者陰陽之交也陽主晝陰主夜陽主表陰主裡靈樞營衛生會篇曰平旦陰盡而陽受氣矣日中而陽隴日西而陽衰日入陽盡而陰受氣矣靈樞口問篇曰陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣故診法當於平旦初寤之時陰氣正平而未動陽氣將盛而未散飲食未進穀氣未行故經脈未盛絡脈調勻氣血未至擾亂脈體未及變更乃可以診有病之脈又切脈之道貴於精誠嫌其擾亂故必心虛而無妄想身靜而不言動然後可以得脈之妙也診人之脈令仰其掌掌後高骨是名關上審位既確可以布指疏密得宜長短不失凡診脈者令人仰手醫者覆手診之掌後有高骨對平處謂之關上看定部位徐以中指先下於關部次以食指下於寸部次以無名指下於尺部人長則下指宜疏人短則下指宜密指爪不可養長長則指頭不能取齊難於候脈且沉取之時爪長則按處必有深痕在於閨閣尤為不便布指輕重各自不同曰舉按尋消息從容看脈惟在指法之巧大法輕手循之曰舉重手取之曰按不輕不重委曲求之曰尋極須體認如舉必先按之按則必先舉之以舉物必自下而上按物必自上而下也則舉中有按按中有舉抑揚反覆而尋之義盡見矣難經五難曰脈有輕重何謂也然初持脈如三菽之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌骨相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也蓋言脈有六部輕重不同菽者豆也豆之多寡因舉按有輕重也凡持脈者下手當明舉按之法先輕手取浮而後重手取沉肺脈甚浮而先得故經文下初持脈三字以下心脾肝腎脈一臟重於一臟肺主皮毛心主血脈脾主肌肉肝主筋腎主骨相得者得其所主之分而即得其本部之脈也腎部不言十五菽而言至骨者因至骨明於十五菽也關前為陽關後為陰陽寸陰尺先後推尋從魚際至高骨卻有一寸因名曰寸從尺澤至高骨有一尺因名曰尺界乎尺寸之間因名曰關關前寸為陽關後尺為陰關居中若為陰陽界而陰陽實互交於此寸候上焦關候中焦尺候下焦須先後細為推尋推其虛實尋其體象也男子之脈左大為順女人之脈右大為順朱丹溪曰脈分屬左右手心小腸肝膽腎膀胱在左主血肺大腸脾胃命門在右主氣男以氣成胎故氣為之主女以血為胎故血為之主若男子久病氣口充於人迎者有胃氣也病雖重可治反此者逆或曰人迎在左氣口在右男女所同不易之位也脈法贊曰左大順男右大順女何子言之悖耶曰脈經一部叔和諄諄於教醫者此左右手以醫者之手為主而若主於病者之手奚止千里之謬按診家多曰陰氣右行陽氣左行男子陽氣多而左脈大為順女子陰氣多而右脈大為順其說似是而實非也丹溪所以力排俗見以合經旨蓋醫者切脈與病者相對醫者之左手對病者之右手醫者之右手對病者之左手其義易曉學者臨證多則理自見男尺恆虛女尺恆盛寸為陽尺為陰故男子尺虛象離中虛也女人尺盛象坎中滿也男女脈同同於定位惟尺則異異於盛衰朱丹溪曰昔日軒轅使伶倫截蟹谷之竹作黃鐘律管以候天地之節氣使岐伯取氣口作脈法以候人之動氣故黃鐘之數九分氣口之數亦九分律管具而寸之數始形故脈之動也陽得九分陰得一寸吻合於黃鐘天不足西北陽南而陰北故男子寸盛而尺弱肖乎天也地不滿東南陽北而陰南故女子尺盛而寸弱肖乎地也黃鐘者氣之先兆故能測天地之節候氣口者脈之要會故能知人命之生死陽弱陰強反此則病男尺脈弱女尺脈盛故男女之脈不同若男尺脈盛女尺脈弱則為相反而病矣參黃子曰男子以陽為主故兩寸脈常旺於尺若兩寸反弱尺反盛者腎氣不足也女子以陰為主故兩尺脈常旺於寸若兩尺反弱寸反盛者上焦有餘也不足固病有餘亦病所謂過猶不及也龍丘葉氏曰脈者天地之元性故男女尺寸盛弱肖乎天地越人以為男生於寅女生於申三陽從天生三陰從地長謬之甚也獨丹溪推本律法混合天人而闢之使千載之誤一旦昭然豈不韙哉僞訣云女人反此背看之尺脈第三同斷病若解云女人右心小腸肝膽腎左肺大腸脾胃命則惑亂經旨曾不知男女一皆以尺脈為根本所謂反者非男女脈位相易也當如男子尺脈常弱今反盛女人尺脈常盛今反弱便斷其病於義即通關前一分人命之主左偏緊盛風邪在表右偏緊盛飲食傷里關前一分者寸關尺各有三分共得九分今曰關前一分仍在關上但在前之一分耳故左關之前一分辨外因之風右關之前一分辨內因之食或以前一分為寸上豈有左寸之心可以辨風右寸之肺可以辨食乎其說大謬蓋寸關尺三部各占三分共成寸口故知關前一分正在關之前一分也左關之前一分屬少陽膽部膽為風木之司故緊盛則傷於風也何則以風木主天地春升之令萬物之始生也素問靈蘭祕典論曰肝者將軍之官謀慮出焉與足少陽膽相為表裡膽者中正之官決斷出焉人身之中膽少陽之脈行肝脈之分外肝厥陰之脈行膽脈之位內兩陰至是而交盡一陽至是而初生十二經脈至是而終且膽為中正之官剛毅果決凡十一臟咸取決於膽故左關之前一分為六腑之源頭為諸陽之主宰察表者之不能外也右關之前一分屬陽明胃部中央濕土得天地中和之氣萬物所歸之鄉也又曰脾胃者倉廩之官五味出焉土為君象土不主時寄王於四季之末故名孤臟夫胃為五臟六腑之海蓋清氣上交於肺肺氣從太陰而行之為十二經脈之始故右關之前一分為五臟之隘口為百脈之根荄察里者不能廢也況乎肝膽主春令春氣浮而上升陽之象也陽應乎外故以候表焉脾胃為居中土性凝而重濁陰之象也陰應乎內故以候里焉若夫左寸之前違度則生生之本虧右寸之前先發則資生之元廢古人以為人命之主顧不重哉舊以左關之前一分為人迎右關之前一分為氣口然考之靈樞本輸動腧經脈素問解精微論等篇明指人迎為結喉旁胃經動脈故綱目之釋人迎亦曰在兩喉旁龐安常論脈曰何謂人迎喉旁取之以此論之則左關之前一分不可名為人迎矣經脈篇曰手太陰之脈入寸口上循魚際又曰經脈者常不可見也其盛實也以氣口知之靈樞經筋篇曰手太陰之筋結於魚際後行寸口外側經脈別論曰欲知寸口太過與不及靈樞小針解曰氣口虛而當補實而當瀉以此論之則氣口乃統兩手而言右關之前一分不可名氣口矣靈樞四時氣篇曰氣口候陰人迎候陽靈樞禁服篇曰寸口主中人迎主外靈樞終始等篇曰人迎一盛二盛三盛等義皆言人迎為陽之府脈故主乎表脈口為太陰之動脈故主乎里如素問太陰陽明論曰太陰為之行氣於三陰陽明為之行氣於三陽靈樞陰陽別論曰三陽在頭正言人迎行氣於三陽也三陰在手正言脈口行氣於三陰也蓋因上古診法有三一取三部九候以診通身之脈一取太陰陽明以診陰陽之本一取左右氣口以診臟腑之氣細繹前後經旨則人迎自有定位何得扯入左關氣口概指兩手何得偏指右關也耶此名創自叔和群然附和莫可復正豫少從家先生遊及同郡施笠澤秦景明皆當代名彥相與議論咸謂人迎氣口之名固不可妄為移易以亂經常左右關前一分亦可通融以徵表裡故豫但分左右關前一分而不列人迎氣口之名如前所注者不識其當否至若藏氣有不齊稟賦有厚薄或左脈素大於右或右脈素大於左孰者為常孰者為變或於偏弱中略見有力已隱虛中之實或於偏盛中稍覺無神便是實中之虛活潑施治不攻代無過可也神門屬腎兩在關後人無二脈必死不救難經十四難曰上部無脈下部有脈雖困無能為害夫脈之有尺猶樹之有根枝葉雖枯槁根本將自生蓋兩尺屬腎水為天一之元人之元神在焉即難經八難所謂三焦之原守邪之神故為根本之脈而稱神門也若無此二脈則根本敗絶決無生理而脈微指為心脈者誤矣彼因心經有穴名曰神門正在掌後兌骨之端故錯認耳殊不知心在上焦豈有候於尺中之理乎脈有七診曰浮中沉上下左右七法推尋浮者輕下指於皮毛之間探其腑脈也表也中者略重指於肌肉之間候其胃氣也半表半裡也沉者重下指於筋骨之間察其臟脈也里也上者即上竟上者胸喉中事也即於寸內前一分取之下者即下竟下者少腹腰股膝脛足中事也即於尺內後一分取之左右者即左右手也凡此七法共為七診又素問三部九候論曰獨大者病獨小者病獨疾者病獨遲者病獨寒者病獨熱者病獨陷下者病王冰注曰診凡有七者此之謂也蓋指病者而言故曰七診雖見九候皆從者不死若本文專授醫家診法義各不同勿聽子則以靜其心忘外慮均呼吸分浮中沉三法為七診皆贅辭也又有九候即浮中沉三部各三合而為名每候五十方合於經每部有浮中沉三候合寸關尺三部算之共得九候之數也夫每侯必五十動者出自難經合大衍之數也乃僞訣以四十五動為準乖於經旨必每候五十乃知五臟缺失柳東陽曰今人指到腕臂即云見了五十動豈彈指間事凡九候共得四百五十兩手合計九百方與經旨相合也按素問三部九候論曰天之至數始於一終於九焉一者天二者地三者人因而三之三三者九以應九野故人有三部部有三候則以天地人言上中下謂之三才以人身言上中下謂之三部於三部中而各分其三謂之三候三而三之是為三部九候蓋上古診法於人身三部九候之脈各有所取以診五臟之氣而針邪除疾非獨以寸口為言也如仲景上取寸口下取跗陽是亦此意自十八難專以寸口而分三部九候之診以其簡捷言脈者靡不宗之然非古法上下來去至止六字陰陽虛實其中奧旨上下來去至止六字者足以明乎陰陽虛實本岐黃之奧旨而滑攖寧闡明之上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰上者自尺部上於寸口陽生於陰也下者自寸口下於尺部陰生於陽也脈有上下是陰陽相生病雖重不死來者自骨肉之分出於皮膚之際氣之升也去者自皮膚之際還於骨肉之分氣之降也脈有來去是表裡交泰病雖重必起此謂之人病脈和也若脈無上下來去死無日矣故曰脈不往來者死若來疾去徐上實下虛為癲厥來徐去疾上虛下實為惡風也至者脈之應止者脈之息也止而暫息者愈之疾止久有常者死也按素問陰陽別論云謹熟陰陽無與衆謀所謂陰陽者去者為陰至者為陽靜者為陰動者為陽遲者為陰數者為陽陰陽之理不可不熟故曰謹獨聞獨見非衆所知故曰無與謀則果能明於上下來去至止六字以通陰陽虛實之理者在昔猶難之初學於此道其有懵然無知者乃可肆口以談耶包絡與心左寸之應惟膽與肝左關所認膀胱及腎左尺為定胸中及肺右寸昭彰胃與脾脈屬在右關大腸並腎右尺班班包絡與心脈皆在左手寸上膽脈與肝脈皆在左手關上膀胱及腎脈皆在左手尺上肺脈在右手寸上胃與脾脈皆在右手關上大腸與腎脈皆在右手尺上僞訣以大小腸列於寸上三焦配於左尺命門列於右尺膻中置而不言男女易位至數差訛形脈不分圖象妄設良可笑也若寸主上焦以候胸中關主中焦以候膈中尺主下焦以候腹中此人身之定位也大小腸皆在下焦腹中僞訣越中焦而候之寸上謬矣滑伯仁以左尺主小腸膀胱前陰之病右尺主大腸後陰之病可稱千古隻眼僞訣之誤特因心與小腸為表裡肺與大腸為表裡耳抑知經絡相為表裡診候自有定位且如脾經自足而上行走腹胃經自頭而下行走足升降交通以成陰陽之用夫脾胃乃夫婦也而其脈行之上下不同如此豈必心與小腸肺與大腸上則皆上下則皆下強謂其盡屬一處耶則經所謂尺外以候腎尺裡以候腹二經將安歸乎蓋胸中屬陽腹中屬陰大腸小腸膀胱三焦所傳渣滓波濁皆陰惟腹中可以位置非若胃為水殼之海清氣在上膽為決斷之官靜藏於肝可得位之於中焦也心主高拱重重膈膜遮蔽惟心肺居之至若大腸小腸濁陰之最者而可混之耶金匱真言篇曰肝心脾肺腎五臟為陰膽胃大腸小腸三焦膀胱六腑為陽止十一經矣則手厥陰之一經竟何在乎素問靈蘭祕典篇曰心者君主之官神明出焉肺者相傅之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中者臣使之官喜樂出焉脾胃者倉廩之官五味出焉大腸者傳導之官變化出焉小腸者受盛之官化物出焉腎者作強之言伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣此以膻中足十二臟之數則是配手厥陰者實膻中也及靈樞敘經脈又見包絡而無膻中然曰動則喜笑不休正與喜樂出焉之句相合矣夫喜笑者心火所司則知其與心應也獨膻中稱臣使者君主之親臣也繇是則包絡即為膻中斷無可疑膻中以配心臟自有確據以心君無為而治肺為相傅如華蓋之覆於心上以布胸中之氣而燮理其陰陽膻中為臣使如包裹而絡於心下以寄喉舌之司而宣布其政令第心火寂然不動動而傳之心包即合相火設君火不動不過為相火之虛位而已三焦之火傳入心包即為相火設三焦之火不上亦不過為相火之虛位而已素問血氣形志篇謂手少陽與心主為表裡靈樞經脈謂手厥陰之脈出屬心包絡下膈歷絡三焦手少陽之脈散絡心包合心主正見心包相火與手少陽相火為表裡故歷絡於上下而兩相輸應也心君泰寧則相火不動而膻中喜樂出焉心君擾亂則相火翕然從之而改其常度心包所主二火之出入關係甚重是以亦得分手經之一而可稱為府也乃僞訣竟不之及則手厥陰為虛懸之位矣靈樞營衛生會篇曰上焦出於胃上口並咽以上貫膈而布胸中中焦亦並胃中出上焦之後泌糟粕蒸精液化精微而為血下焦者別回腸注於膀胱而滲入焉水穀者居於胃中成糟粕下大腸而成下焦又曰上焦如霧中焦如漚下焦如瀆繇是則明以上中下分三焦矣僞訣列於右尺不亦妄乎又曰密理厚皮者三焦厚粗理薄皮者三焦薄繇是則明有形象矣僞訣以為無形不亦妄乎又按靈樞本輸篇曰三焦者中瀆之府也水道出焉屬膀胱是孤之府也謂之中瀆者以其如川如瀆源流皆出其中即水穀之入於口出於便自上而下必歷三焦故曰中瀆之府水道出焉膀胱受三焦之水而當其疏泄之道氣本相依理同一致故三焦下輸出於委陽並太陽之正入絡膀胱約下焦也然於十二臟之中惟三焦獨大諸臟無與匹者故曰是孤之府也要知三焦雖為水瀆之府而實總護諸陽亦稱相火是又水中之火府故在本輸篇曰三焦屬膀胱在素問血氣形志篇曰少陽與心主為表裡蓋其在下者為陰屬膀胱而合腎水在上者為陽合包絡而通心火此三焦之所以際上極下象同六合而無所不包也觀本輸篇六腑之別極為明顯以其皆有盛貯因名為府而三焦者曰中瀆之府是孤之府分明確有一府蓋即臟腑之外軀體之內包羅諸臟一腔之大府也故有中瀆是孤之名而亦有大府之形難經已謂其有名無形況高陽生之妄人哉是蓋譬之探囊以計物而忘其囊之為物耳遂致後世紛紛無所憑據有分為前後三焦者有言為腎傍之脂者即如東垣之明亦以手三焦足三焦分而為二夫以一三焦尚云其無形而諸論不一又何三焦之多也至韓飛霞巧其說曰切脈至右尺必兩手並診消息之取三焦應脈浮為上焦與心肺脈合中為中焦與脾胃脈合沉為下焦與肝腎脈合故曰尺脈第三同斷病此又飛霞訛以傳訛違道愈遠素問脈要精微論曰尺外以候腎尺裡以候腹中未嘗謂尺候三焦也脈經曰尺脈芤下焦虛尺脈遲下焦有寒又曰尺脈浮者客陽在下焦觀此三言則尺主下焦耳何以韓之巧說附入哉脈經一卷第七篇脈法贊云右為子戶名曰三焦子戶命門也右腎為命門男子以藏精女子以系胞故為子戶而名之為三焦者此猶兩額之傍亦名為太陽云耳非謂即太陽經也安得執詞而害義耶若第二卷第二篇雖云右腎合三焦然上有一說云三字則叔和亦附此語以俟參考不敢自居為定論明矣今論定上焦從兩寸中焦從兩關下焦從兩尺斯則與脈要精微論上竟上者胸喉中事下竟下者少腹腰股膝脛足中事二句符合更何必紛紛異議哉一醫常謂余曰吾四十餘年行醫從不知分剖三焦乃亦見推於當世矣噫淺近如此者猶存而不論又安能司八正邪別五中部按脈動靜耶心肝脾肺俱各一候惟腎一臟而分兩尺候者謂腎有兩枚形如豇豆分列於腰脊之左右僞訣以左為腎右為命門考諸明堂銅人等經命門一穴在督脈十四椎下陷中兩腎之間蓋一陽居二陰之中所以成乎坎也且脈之應於指下者為有經絡循經朝於寸口內經並無命門之經絡何以應診而可列之右尺乎夫男女之異惟莖戶精血及胞門子戶耳若夫脈象自有定位如左尺水生左關木左關木生左寸火君火付權於相火故右尺火生右關土右關土生右寸金復生左尺水五行循序相生之理也僞訣乃云女人反此背看之豈理也哉甚有以左尺候心右尺候肺本褚澄地道右行之說而五行紊亂極矣內經候法分配昭彰如揭日月從僞訣盛行束靈素於高閣千古陰霾莫之能掃因附列素問脈法數則示尊經也世有不信鳴鼓之攻者試進而求之於經則趨向定矣豫言豈誣哉素問脈要精微論曰尺內兩傍則季脅也季脅小肋也在脅下兩傍為腎所近之處也尺外以候腎尺裡以候腹尺外者尺脈前半部也尺裡者尺脈後半部也前以候陽後以候陰人身以背為陽腎附於背故外以候腎腹為陰故里以候腹所謂腹者凡大小腸膀胱皆在其中矣以下諸部俱言左右而此獨不分者以兩尺皆主乎腎也中附上左外以候肝內以候鬲中附上者言附尺之上而居乎中即關脈也左外者言左關前半部內者言左關後半部余仿此肝為陰中之陽藏而亦附近於背故外以候肝內以候鬲舉一鬲而中焦之鬲膜膽府皆在其中矣右外以候胃內以候脾右關之前所以候胃右關之後所以候脾脾胃皆中州之官也而以表裡言之則胃為陽脾為陰故外以候胃內以候脾也按寸口者手太陰也太陰行氣於三陰故曰三陰在手而主五臟所以本篇止言五臟而不及六腑然胃亦府也而此獨言之何也經所謂五臟皆稟氣於胃胃者五臟之本也藏氣者不能自致於手太陰也故胃氣當於此察之又五臟別論云五味入口藏於胃以養五臟氣氣口亦太陰也是以五臟六腑之氣味皆出於胃變見於氣口然則此篇雖止言胃而六腑之氣亦並見乎此矣上附上右外以候肺內以候胸中上附上者言上而又上則寸脈也五臟之位惟肺最高故右寸之前以候肺右寸之後以候胸中胸中者鬲膜之上皆是也左外以候心內以候膻中心肺皆居膈上故左寸之前以候心左寸之後以候膻中膻中者即心包絡之別名也按五臟所居之位皆五行一定之理火旺於南故心居左寸木旺於東故肝居左關金旺於西故肺居右寸土旺於中而寄位西南故脾胃居右關此即河圖五行之次序也前以候前後以候後此重申上下內外之義也統而言之寸為前尺為後分而言之上半部為前下半部為後蓋言上以候上下以候下也上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也竟者盡也言上而盡於上在脈則盡於魚際在體則應乎胸喉也下而盡於下在脈則盡於尺部在體則應乎少腹腰足也按此篇首言尺次言中附上而為關又次言上附上而為寸皆自內以及外者蓋以太陰之脈從胸走手以尺為根本寸為枝葉也故曰凡人之脈寧可有根而無葉不可有葉而無根又按內外二字諸家之注皆云內側若以側為言必脈形扁闊或有兩條者乃可耳不然則於義不通矣如前以候前後以候後上竟上下竟下者皆內外之義也觀易卦六爻自下而上以上三爻為外卦以下三爻為內卦則上下內外之義昭然矣推而外之內而不外有心腹積也推者察也求也凡診脈先推求於外若但沉脈而無浮脈是有內而無外矣故知其病在心腹而有積也推而內之外而不內身有熱也推求於內浮而不沉則病在外而非內矣惟表有邪故身熱也推而上之上而不下腰足清也清者冷也推求於腰上部則脈強盛下部則脈虛弱此上盛下虛故足清冷也上下有二義以寸關尺言之寸為上尺為下也以浮中沉言之浮為上沉為下也推而下之下而不上頭項痛也推求於下部下部有力上部無力此清陽不能上升故頭項痛或陽虛而陰湊之亦頭項痛也按之至骨脈氣少者腰脊痛而身有痹也按之至骨腎肝之分也脈氣少者言無力也腎水虛故腰脊痛肝血虧則身有痹也按本篇上竟上者言胸喉中事下竟下者言小腹膝足中事分明上以候上下以候下而叔和乃謂心部在左手關前寸口與手太陽為表裡以小腸合為府合於上焦云云僞訣遂有左心小腸之說不知自秦漢而下從未有以大小腸取於兩寸者扁鵲仲景諸君心傳可考僞訣何能以手障天也五臟不同各有本脈左寸之心浮大而散右寸之肺浮澀而短肝在左關沉而弦長腎在左尺沉石而濡右關屬脾脈象和緩右尺相火與心同斷心肺居上脈應浮腎肝居下脈應沉脾胃居心肺腎肝之間謂之中州脈亦應在浮沉之間心肺同一浮也但浮大而散者象夏火故屬心浮澀而短者象秋金故屬肺肝腎同一沉也但沉而弦長者象春木故屬肝沉石而濡者象冬水故屬腎脈和而緩氣象沖融土之性也故屬脾右腎雖為水位而相火所寓故與左寸同斷也又按呼出者心與肺為陽故心肺之脈皆浮心為陽中之陽故浮且大而散肺為陽中之陰故浮而兼短澀吸入者腎與肝為陰故腎肝之脈皆沉腎為陰中之陰故沉而且實肝為陰中之陽故沉而兼長脾為中州故不浮不沉而脈在中若趙正宗本難經圖說以土居金木水火之中兩關宜皆屬脾肝既為陰不宜在半浮半沉之左關不知越人推明素問之義約而可守不必轉滋議論也春弦夏洪秋毛冬石四季之末和緩不忒太過實強病生於外不及虛微病生於內此言四季各有平脈也天地之氣東升屬木位當寅卯於時為春萬物始生其氣從伏藏中透出如一縷之煙一線之泉在人則肝應之而見弦脈即素問玉機真藏論所謂其氣來軟弱輕虛而滑端直以長素問平人氣象論所謂軟弱招招如揭長竿末梢者是也氣轉而南屬火位當巳午於時為夏萬物盛長其氣從升後散大於外如騰湧之波燎原之火在人則心應之而見鉤脈即玉機真藏論所謂其氣來盛去衰平人氣象論所謂脈來纍纍如連珠如循琅玕者是也氣轉而西屬金位當申酉於時為秋萬物收成其氣從散大之極自表初收如浪靜波恬煙清焰息在人則肺應之而見毛脈即平人氣象論所謂脈來厭厭聶聶如落榆莢者是也氣轉而北屬水位當亥子於時為冬萬物合藏其氣收降而斂實如埋壚之火匯潭之泉在人則腎應之而見石脈即玉機真藏論所謂其氣來沉以搏平人氣象論所謂脈來喘喘纍纍如鉤按之而堅者是也以上經論所云四時諸脈形狀雖因時變易其中總不可無和柔平緩景象蓋和緩為土即是胃氣有胃氣而合時便是平脈玉機真藏論云脾脈者土也孤藏以灌溉四旁者也今弦鉤毛石中有此一種和緩即是灌溉四旁即是土矣亦即是脾脈矣以其寓於四脈中故又曰善者不可得見平人氣象論亦云長夏屬脾其脈和柔相離如雞踐地察此脈象亦不過形容其和緩耳辰戌丑未之月各有土旺一十八日即是灌溉四旁之義故分而為四有土而不見土也若論五行則析而為五土居其中是屬長夏況長夏居金火之間為相生之過脈較他季月不同故獨見主時之脈二說雖殊其義不悖當參看之所謂太過不及者言弦鉤毛石之脈與時相應俱宜和緩而適中欲其微似不欲其太顯欲其微見不欲其不見今即以一弦脈論之若過於微弦而太弦是謂太過太過則氣實強氣實強則氣鼓於外而病生於外脈來洪大緊數弦長滑實為太過必外因風寒暑濕燥火之傷不及於微弦而不弦是謂不及不及則氣虛微氣虛微則氣餒於內而病生於內脈來虛微細弱短澀濡芤為不及必內因喜怒憂思悲恐驚七情之害其鉤毛石之太過不及病亦猶是循序漸進運合自然應時即至躁促為愆上古脈要曰春不沉夏不弦秋不數冬不澀是謂四塞謂脈之從四時者不循序漸進則四塞而不通也所以初當春夏秋冬孟月之脈則宜仍循冬春夏秋季月之常未改其度俟二分二至以後始轉而從本令之王氣乃為平人順脈也故天道春不分不溫夏不至不熱自然之運悠久無疆使在人之脈方春即以弦應方夏即以數應躁促所加不三時而歲度終矣其能長世乎故曰一歲之中脈象不可再見如春宜弦而脈得洪病脈見也謂真藏之氣先泄耳今人遇立春以前而得弦脈反曰時已近春不為病脈所謂四時之氣成功者退將來者進言則似辨而實悖於理矣四時百病胃氣為本脈貴有神不可不審土得天地衝和之氣長養萬物分王四時而人胃應之凡平人之常受氣於谷谷入於胃五臟六腑皆以受氣故胃為臟腑之本此胃氣者實平人之常氣不可一日無者無則為逆逆則死矣胃氣之見於脈者如素問玉機真藏論曰脈弱以滑是有胃氣終始篇曰邪氣來也緊而疾穀氣來也徐而和是皆胃氣之謂故四時有四時之脈四時有四時之病但土灌溉四旁雖病態百出必賴之以為出死入生之機也比如春令木旺其脈當弦但宜微弦而不至太過是得春胃之沖和若脈來過於弦者是肝邪之勝胃氣之衰而肝病見矣倘脈來但有弦急而絶無沖和之氣者乃春時胃氣已絶而見肝家真藏之脈病必危矣鉤毛石俱准此以此察胃氣之多寡有無而病之輕重存亡燎然在目矣故蔡氏曰不大不小不長不短不滑不澀不疾不遲應手中和意思欣欣悠悠揚揚難以名狀者胃氣脈也東垣曰有病之脈當求其神如六數七極熱也脈中有力即有神矣為泄其熱三遲二敗寒也脈中有力即有神矣為去其寒若數極遲敗脈中不復有力為無神也而遽泄之去之神將何依耶故經曰脈者氣血之先氣血者人之神也按王宗正診脈之法當從心肺俱浮肝腎俱沉脾在中州即王氏之說而知東垣所謂脈中有力之中蓋指中央戊己土正在中候也胃氣未散雖數而至於極遲而至於敗尚可圖也故東垣之所謂有神即內經之所謂有胃氣也三至為遲遲則為冷六至為數數即熱證一息而脈僅三至即為遲慢而不及矣遲主冷病若一息而脈遂六至即為急數而太過矣數主熱病若一息僅得二至甚而一至則轉遲而轉冷矣若一息七至甚而八至九至則轉數而轉熱矣凡一二至與八九至皆死脈也遲數既明浮沉須別遲則為寒數則為熱固一定之理欲知寒熱之所屬又當別乎浮沉耳浮沉遲數辨內外因因則有二此內外之不可不辨也外因於天內因於人外感六淫因之於天內傷七情因之於人天有陰陽風雨晦明人喜怒憂思悲恐驚左傳醫和云陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾也淫者淫佚偏勝久而不復之謂故陰淫則過於清冷而陽氣不治寒疾從起如上下厥逆中外寒栗之類陽淫則過於炎燠而陰氣不治熱疾從起如狂譫煩渴血泄吐衄之類風淫則過於動搖而疾生杪末如肢廢毛落昏冒瘛瘲之類雨淫則過於水濕而疾生腸腹如腹滿腫脹腸鳴濡泄之類晦淫則過於昏暗陽光內鬱而成惑疾如百合狐惑熱中臟燥之類明淫則過於彰露陽光外散而成心疾如恍惚動悸錯妄失神之類七情者人之喜怒憂思悲恐驚也即所謂七氣喜則氣緩怒則氣上憂則氣亂思則氣結悲則氣消恐則氣下驚則氣亂喜氣緩者喜則氣和營衛通利故氣緩矣怒氣上者怒則氣逆甚則嘔血及食故氣上矣憂氣亂者憂則抑鬱不解故氣亂矣思氣結者思則身心有所止氣留不行故氣結矣悲氣消者悲則心系急肺布葉舉使上焦不通營衛不散故氣消矣恐氣下者恐則精卻精卻則上焦閉故氣還還則下焦脹故氣下矣驚則心無所倚神無所歸慮無所定故氣亂矣老弱不同風土各異既明至理還貴圓通老弱之盛衰與時變遷風土之剛柔隨地移易如老弱之人脈宜緩弱若過於旺者病也少壯之人脈宜充實若過於弱者病也東極之地四時皆春其氣暄和民脈多緩南極之地四時皆夏其氣炎蒸民脈多軟西極之地四時皆秋其氣清肅民脈多徑北極之地四時皆冬其氣凜冽民脈多石然猶有說焉老人脈旺而躁者此天稟之厚引年之叟也名曰壽脈躁疾有表無里則為孤陽其死近矣壯者脈細而和緩三部同等此天稟之靜清逸之士也名曰陰脈若脈細小而徑直前後不等其可久乎東南卑濕其脈軟緩居於高巔亦西北也西北高燥其脈剛徑居於汙澤亦東南也南人北脈取氣必剛北人南脈取氣必柔東西不齊可以類剖又永年者天稟必厚故察證則將絶而脈猶不絶夭促者天稟必薄故察證則未絶而脈已先絶其可執一乎左傳曰土厚水深居之不疾淮南子曰堅土人剛弱土人肥壚土人大沙土人細息土人美耗土人醜山氣多男澤氣多女水氣多喑風氣多聾林氣多癃木氣多傴濕氣多腫石氣多力陰氣多癭暑氣多夭寒氣多壽穀氣多痹丘氣多狂野氣多仁陵氣多貪輕土人利重土人遲清水音小濁水音大湍水人輕遲水人重中土多聖凡此數端乃一定之論也然一地而或妍媸壽夭之各異同者蓋其生雖由於水土之氣而偏全厚薄又自不同也
