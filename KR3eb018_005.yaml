body:
  text: 卷五小序病有不盡憑於脈者然憑脈以斷者十居其九乃取其宜忌者而標示焉使不啻影之隨形以戒世之僥幸於萬一遺師其咎者也脈之主病有宜不宜陰陽順逆吉凶可知有是病則有是脈與病相宜則順不相宜則逆逆之與順何從區別是又在陰陽耳如表病見表脈里病見里脈實病見實脈虛病見虛脈陽病見陽脈陰病見陰脈之類皆順而相宜者也反此則逆逆順一分而病之吉凶從可推矣中風之脈卻喜浮遲數大急疾兼見難支中風之脈各有所兼蓋新風挾舊邪或外感或內傷其脈隨之忽變兼寒則脈浮緊兼風則脈浮緩兼熱則脈浮數兼痰則脈浮滑兼氣則脈沉澀兼火則脈盛大兼陽虛則脈微亦大而空兼陰虛則脈數亦如細絲陰陽俱虛則微數或微細虛滑為頭中痛緩遲為營衛衰大抵陽浮而數陰濡而弱浮滑沉滑微虛散數皆為中風風性空虛中之於表虛浮遲緩雖為正氣不足猶可補救急大數疾邪不受制必死無疑可見大數而猶未至急疾者尚不可謂其必死也傷寒熱病脈喜浮洪沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽證見陰命必危殆陰證見陽雖困無害素問熱論曰今夫熱病者皆傷寒之類也又曰人之傷於寒也則為病熱熱雖甚不死觀此則知傷寒雖是陰寒之邪襲人正氣與之抗拒鬱蒸成熱亦理勢之必然者抗拒在表故脈浮鬱蒸成熱故脈洪熱病得此陽脈知正氣不陷縮而能鼓發勝邪必矣故喜焉若沉微澀小是皆陰類證陽脈陰表病見里證與脈反邪盛正衰凶之兆也至若汗後邪解正復此時脈躁盛者亦應寧靜身體自然涼和設脈仍躁而熱加甚是正氣已衰邪氣更進必難乎其為生矣即素問評熱論所謂有病溫者汗出輒復熱而脈躁疾不為汗衰狂言不能食病名陰陽交也陽證見陰者見陰脈也即上文所云熱病而得沉微澀小之類言證與脈反故亦危殆陰證見陽者見陽脈也亦似與證相反惟傷寒則不然傷寒自表入里從陽之陰刻刻侵搏層層漸入今陰病得陽脈是轉寒凜而變溫和起深沉而出浮淺死陰忽作生陽病雖困篤自當無害故仲景云陰病見陽脈者生陽病見陰脈者死傷暑脈虛弦細芤遲若兼滑實別證當知經曰脈虛身熱得之傷暑甲乙經曰熱傷氣而不傷形所以脈虛者是也若難經四十九難曰其脈浮大而散殊有未然夫脈大而散乃心之本脈非病脈也故仲景不言但補其偏曰弦細芤遲芤即虛豁也弦細遲即熱傷氣之應也統而言之曰虛分而言之曰弦細芤遲其不以浮大之脈混入虛脈之中稱為病暑之脈慮何周耶若面垢身熱傷暑之證已見而脈反滑實將兼痰與食矣勞倦內傷脾脈虛弱汗出脈躁死證可察動而生陽身固不宜太逸東垣論升陽益胃湯方後云小役形體使胃氣與藥得以轉運升發此即動而生陽之義也若煩擾而過於勞則肢體轉旋四肢舉動陽氣張亂無往非脾氣之傷故脾脈虛弱為順也如汗出而脈反躁疾則為逆矣安得不死瘧脈自弦弦數者熱弦遲者寒代散者絶素問瘧論曰夫痎瘧皆生於風故瘧因風暑之邪客於風木之府木來乘土脾失轉輸不能運水穀之精微遂多停痰留飲弦應風木又主痰飲無痰不成瘧故曰瘧脈自弦數熱遲寒自然之理獨見代散之脈則正氣虛脫不續不斂之象邪盛正衰定主凶折泄瀉下痢沉小滑弱實大浮洪發熱則惡泄痢見於下部無論因之內外總屬傷陰耗里之虛證沉小滑弱乃為相宜若實大浮洪則惡矣實大與虛反浮洪與里反邪盛正衰不言可喻再加發熱則陰氣彌傷而裡氣彌耗不至躁亡不已嘔吐反胃浮滑者昌弦數緊澀結腸者亡嘔吐反胃上焦之病也浮為虛滑為痰是其正象可以受補故曰昌也脈弦者虛也木來乘土胃氣無餘土將奪矣數則為熱熱當消穀而反吐谷乃知數為虛數虛則不運數則氣促嘔吐不止胃將漸敗金匱要略云陽氣微膈氣虛脈乃數緊則為寒無陽以運故上出而嘔吐澀脈枯澀吐亡津液之所致水穀之海枯遂致糞如羊屎必死不治霍亂之候脈代勿訝厥逆遲微是則可嗟霍亂之證揮霍撩亂不能自持因一時清濁混亂卒吐暴下暫時不能接續非死脈也厥逆而舌卷囊縮脈至遲微陽衰陰盛真元漸絶之象暴脫者能漸生而漸絶者又何能暴起哉嗽脈多浮浮濡易治沉伏而緊死期將至嗽乃肺疾脈浮為宜兼見濡者病將退也沉則邪已入里緊則寒邪不散均主病危喘息抬肩浮滑是順沉澀肢寒皆為逆證喘證無非風與痰耳浮為陽為表為風滑為陽中之陰而為痰為食若能散其邪則機關可利推其物則否塞可通故曰順脈沉為陰為里為下部澀為陰為虛乃元氣不能接續豈能充四肢乎是以喘息抬肩而四肢又寒也若更見散脈則元真將隨喘而散死亡必矣故曰逆火熱之證洪數為宜微弱無神根本脫離病熱而有火證火則脈應洪數若得沉微之陰脈是無火矣無火而仍病熱則知為無根之陽虛見熱象也故主危殆骨蒸發熱脈數為虛熱而澀小必殞其軀骨蒸者腎水不足壯火僭上虛數二脈是其本然蒸熱而見澀小之脈澀則精血少小則元氣衰真陰日損邪火日增所謂發熱脈靜不可救藥耳勞極諸虛浮軟微弱土敗雙弦火炎則數勞極損傷氣血日耗形體漸衰所見之脈隨病呈象如空虛之浮不鼓之軟欲絶之微無力之弱雖云病脈然與病猶相宜也至若雙弦乃知土敗急數定為火炎蓋弦為肝木雙弦則木太盛久病之土何堪其侮故知其必敗也數已為熱急數則躁疾直強略無半點和柔邪火炎炎真陰自絶六至以上便不可治失血諸證脈必現芤緩小可喜數大堪憂芤有中空之象失血者宜爾也緩小脈順為可喜脈數而大邪盛正衰為火爍真陰誠為可憂蓄血在中牢大卻宜沉澀而微速愈者希血蓄於內瘀凝不行瘀凝則脈大不行則脈牢亦因病呈象也逐之使去巢穴一空而致新不難矣設脈沉小澀微是病有餘而脈反不足病有物而脈若無物既不能自行其血又難施峻猛之劑安望其速愈耶三消之脈浮大者生細微短澀形脫堪驚三消皆燥熱太過惟見浮大之脈為吉耳若脈細微短澀則氣血之虛衰枯槁不言可知再加身體瘦悴是謂形脫即戴人所云燔木則為炭燔金則為液燔石則為灰煎海水則為鹽鼎水形氣兩敗豈直可驚已哉小便淋閉鼻色必黃數大可療澀小知亡熱乘津液則水道不利水道不利而有熱必鬱蒸而外發黃色見於鼻者以鼻為肺竅耳數大為火象火證見之又何妨乎若逢澀小為精血敗壞死亡將亟矣癲乃重陰狂乃重陽浮洪吉象沉急凶殃癲狂既分陰陽而脈皆取浮洪者蓋浮洪者屬陽在陽狂者得之固與證相宜即陰癲者得之亦將從陰轉陽自里達表之象故均為吉兆若沉而急沉則入陰迫里急則強急不柔是無胃氣之脈也不論狂癲凶殃立至癇宜虛緩沉小急實或但弦急必死不失癇本虛痰脈來虛緩自應然也若沉小急實或虛而弦急者肝之真藏脈見矣安望其生耶疝屬肝病脈必弦急牢急者生弱急者死疝為肝病弦急肝脈之常也況弦斂急直氣不鼓暢者咸主痛脹疝則未有不痛不脹者故弦急而牢見積聚之有根亦見原本之壯實疝系陰寒之咎牢主裡寒之脈最為相合若急則邪盛弱則正衰必有性命之憂矣脹滿之脈浮大洪實細而沉微岐黃無術脹滿屬有餘之證宜見有餘之脈浮大洪實是也沉細而微知元氣已衰證實脈虛無復他望矣心腹之痛其類有九細遲速愈浮大延久心腹痛而脈見細遲是氣減舒徐厥邪欲退理應從吉設或浮大重則邪氣方張里證而得表脈大非所宜輕亦為中虛之證不能收捷得之效也頭痛多弦浮緊易治如呈短澀雖救何及弦為陰脈乃陽虛不能張大或致外邪所乘況頭乃諸陽之府而為邪束於外使陽氣遏郁故脈多近弦或浮或緊不出風寒初起者散之則愈若短則陽脫於上澀則陰衰於下至於手足厥寒至節者與真心痛無異必死不治腰痛沉弦浮緊滑實何者難療兼大者失足三陰從足入腹脈來沉弦者沉為在裡弦為主痛然何以又兼浮象乎乃沉弦者中有泛泛欲上之勢因風厥陰所謂腰中如張弓弦者是也故狀其風邪虛浮之性非言在表之浮也緊則兼寒滑為痰聚實因閃挫本乎外因雖困無害如房室過度煩勞不節以致精力耗竭腰膂空虛夫腰者腎之府力出於膂而腰者膂所繫其為痛也轉側呻吟屈伸不得膝酸脛冷腰寒面黑行則傴僂不能久立此腎臟虛衰之極無可收斂反見空松故按之豁然而大自不作靖咎將誰執壯盛者猶可挽回中年以後最為難治腳氣有四遲數浮濡脈空痛甚何可久持腳氣發於三陽者輕發於三陰者重以三陰屬臟經絡居里若非藏氣大虛邪不易及陳無擇謂風寒暑濕四邪皆能成病則遲數浮濡猶與證合痛則日盛而脈乃空虛邪盛正衰比之傷寒身涼脈躁勢則相反而咸非吉兆總以病脈背馳耳五臟為積六腑為聚實強可生沉細難愈積也聚也皆實證也實脈強盛邪正相搏一以徵元本之壯實從府從陽故曰可生其脈沉細者陰脈也一以徵邪氣之深入故曰難愈中惡腹脹緊細乃生浮大維何邪氣已深人之正氣自內達表自胸腹而達四肢者其常也卒中外邪則正氣不能達外而反退縮於中則氣機斂實而緊細之脈象見矣腹安得不脹藥力一助正氣必張邪氣必散緊者仍舒細者仍充而本來之面目可還也故知其生若脈浮大則正先散越散越於外則里更虛里更虛則邪必深入而欲為之治不亦難乎鬼祟之脈左右不齊乍大乍小乍數乍遲鬼祟犯人左右二手脈象不一忽大忽小忽數忽遲無一定之形也五疸實熱脈必洪數過極而亢渴者為惡五疸實熱濕與熱鬱外不得通內不得泄酓蒸成黃故曰實熱脈來固應洪數然洪數太過則必發渴黃為表蒸渴為裡熱表裡亢熱陰何以堪況疸為濕鬱而汗溺不通渴則更加之飲愈增其病矣水病之狀理必兼沉浮大出厄虛小可驚水病有陰有陽諸種不一而沉則在在皆兼即氣水風水之在表而脈應浮者亦必有沉沉欲下之勢蓋沉下者水之性也此則專以狀言如指浮者則以位言耳水脈浮大知水氣漸散災厄將出之象若脈虛小則正衰邪存誠可驚也癰疽之脈浮數為陽遲則屬陰藥宜酌量癰疽未潰洪大為祥若其已潰仍舊則殃其脈浮數者以血泣而氣復從之邪與正郁鬱則化熱故數也在表在陽故浮也正為邪搏則宣暢外衛之力薄故復惡寒據脈證似與傷寒表證無異但傷寒雖有痛或在頭或在身體或在骨節未有痛止於一處者今痛止一處而脈數此處必化熱為膿正癰疽所發之處也即傷寒論辨脈法所謂諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常者蓄積有膿是也如此者乃為陽毒若脈不數身不熱所患之處不疼是邪客陰分不能鼓發多致內陷然必兼有煩懊嘔逆胸膈不安等證否則不熱不疼脈又不數是一不病人也何得謂之陰瘡而反重於陽證耶方癰疽之未潰也無論成膿與否熱邪郁蓄外不疏通脈之鼓湧洪大是其宜也至於已潰則熱泄邪解而洪大之脈宜衰矣潰而不衰一派熱邪正從何復誠為大可懼者與素問評熱病論所謂病溫者汗出輒復熱而脈躁疾不為汗衰病名陰陽交而陽飛越雖治無益肺癰已成寸數而實肺痿之形數而無力肺癰色白脈宜短澀浮大相逢氣損血失腸癰實熱滑數可必沉細無根其死可測肺癰而寸口數實知膿已成矣肺葉焦痿火乘金也是以數而無力肺癰既作則肺氣虛損白者西方本色所謂一臟虛則一臟之本色見也短澀者秋金之素體若逢浮大是謂火來乘金克我者為賊邪血氣敗壞之證也腸癰實也沉細虛也證實脈虛死期將至矣喉痹之脈遲數為常纏喉走馬微伏則難十二經脈與經別多過於此即不然亦在其前後左右其脈多數數則為熱故耳間遲脈者乃是外邪襲經經氣不利鬱滯於所過之處故亦為痹脈來或遲亦與病合若腫痛麻癢之纏喉風須臾閉絶之走馬疳二者俱火中挾風凶暴急烈脈應浮大洪數而反見微伏是正衰邪盛補瀉罔從不亦難乎中毒之候尺寸數緊細微必危旦夕將殞數緊者因毒氣盤鬱而搏擊也一見細微知其正氣已虛毒邪深入其能久乎金瘡出血脈多虛細急實大數垂亡休治受創血去已多脈空自宜沉細而反見急數陰欲盡矣治之何用婦人之脈以血為本血旺易胎氣旺難孕少陰動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如釜此言女人胎前之脈也女為陰陰主血故女人以血為本本足而成胎亦易氣旺則血反衰是為本不足未有理失常而能孕者也少陰動甚者心手少陰之脈動甚也心主血動甚則血旺血旺易胎故云有子即素問平人氣象論所謂婦人手少陰脈動甚者妊子也心臟主血故胎結而動甚乃往來流利之義非厥厥如豆之動也尺脈者左右腎脈也腎為天一之水主子宮以系胞孕胎之根蒂也滑利則不枯澀而且有替替含物之象故喜其妊娠即素問陰陽別論所謂陰搏陽別謂之有子蓋寸為陽尺為陰言尺陰之脈搏指而動與寸陽之脈迥然分別也即此滑利之脈應指滑而不散滑為血液疾而不散乃血液斂結之象是為有胎三月矣若但疾而不散是從虛漸實從柔漸剛血液堅凝轉為形體故不滑耳此妊娠五月之脈其疾左勝於右是為男孕以男屬陽居左胎氣鍾於陽故左勝右勝於左是為女孕以女屬陰居右胎氣鍾於陰故右勝勝者甚不甚之謂非左疾右不疾也更視其腹如箕者為女胎如釜者為男胎蓋男女之孕於胞中女則面母腹男則面母背雖各肖父母之形亦陰陽相抱之理女面腹則足膝抵腹下大上小故如箕男面背則背脊抵腹其形正圓故如釜按男女之別叔和脈經曰左疾為男右疾為女又曰左手沉實為男右手浮大為女又曰尺脈左偏大為男右偏大為女又曰得太陰脈為男得太陽脈為女太陰脈沉太陽脈浮自後凡言妊脈者總不出此及滑伯仁則曰左手尺脈洪大為男右手沉實為女近代徐東皋則曰男女之別須審陰陽右脈盛陰狀多俱主弄瓦左尺盛陽狀多俱主弄璋備察諸義固已詳盡然多彼此矛盾難為憑據若其不易之理則在陰陽二字以左右分陰陽則左為陽右為陰以脈體分陰陽則鼓搏沉實為陽虛浮沉澀為陰諸陽實者為男諸陰虛者為女乃為一定之論更當察孕婦之強弱老少及平日之偏左偏右尺寸之素強素弱斯足以盡其法耳欲産之脈散而離經新産之脈小緩為應實大弦牢其凶可明此言産中之脈也其脈與十月懷妊平常見者忽異假如平日之脈原浮臨産則脈忽沉平日之脈遲臨産則脈忽數至如大小滑澀臨産皆忽然而異蓋十月胎氣安定一旦欲落氣血動蕩胞胎迸裂自與經常離異而脈亦非平昔之狀貌矣及其已産也氣血兩虛其脈宜緩滑緩則舒徐不因氣奪而急促滑則流利不因血去而澀枯均吉兆也若脈實大弦牢非産後氣血俱虛者所宜實為邪實大為邪進弦為陰斂而宣布不能牢為堅著而瘀凝不解是皆相逆之脈設外有證又豈能順乎小兒之脈全憑虎口風氣命關三者細剖虎口者食指內側連大指作虎口形故曰虎口此處肌皮嫩薄文色顯明即肺手太陰經脈之盡處諸脈大位之地也雖無五部之分而有三關之別指初節曰風關二節曰氣關三節曰命關男左女右側看之文色見風關者輕再進則上氣關為重再進則直透命關為最重甚則主死由風邪而干正氣正氣不能勝而迫及於命漸進漸深之象也其色維何色赤為熱在脈則數色白為寒在脈則遲色黃為積在脈則緩色青黑痛在脈沉弦三歲以下小兒純陽之體形質小脈之周行駃而應指疾故若大法則以七至為平其太過為數為熱不及為遲為寒此其大較矣然而脈至七八來往速而數息難恐醫者一時不能得病之情狀在五臟之列於面各有定部如左腮屬肝右腮屬肺額上屬心鼻屬脾頦屬腎是已諸邪之見於三關亦各有定色如上所列識本知源錯綜體認存乎其人耳紫熱傷寒青則驚風白為疳病黃乃脾困黑多赤痢有紫相兼口必加渴虎口紋亂氣不調和紅黃隱隱乃為常候無病之色最為可喜至夫變態由乎病甚因而加變黃盛作紅紅盛作紫紫盛作青青盛作黑黑而不雜藥又何及此以色合病也三歲以上便可憑脈獨以一指按其三部六至七至乃為常則增則為熱減則為寒脈來浮數乳癇風熱虛濡驚風緊實風癇弦緊腹痛弦急氣逆牢實便祕沉細為冷乍大乍小知為祟脈或沉或滑皆由宿食脈亂身熱汗出不食食已即吐必為變蒸浮則為風伏結物聚單細疳勞氣促脈代散亂無倫此所最忌百難必一三歲以上便可切脈斷證但小兒正屬純陽陽盛必數故以六七至為常也小兒三部狹小故以一指診之所有死證雖治無成眼上赤脈下貫瞳神赤脈屬心瞳神屬腎乃心火勝腎水水乾則不生木致腎肝皆絶也囟門腫起兼及作坑顱囟者精神之門戶關竅之橐籥氣實則合氣虛則開諸陽會於首外生風邪而乘諸陽所以腫起風氣乘於陽陽極則散散則絶所以陷者死鼻乾黑燥鼻者肺之竅肺金燥則不能生腎水故鼻乾黑燥則死肚大青筋土被木克以致脾虛而欲絶故腹脹現青筋者死目多直視睹不轉睛戴眼者精不轉而返視此是太陽已絶指甲青黑肝之合筋也其榮爪也爪甲乃肝之華肝絶而不能榮故色黑忽作鴉聲人之言語出於肺肺屬金扣之則響肺金既絶故欲語而不成聲但如鴉鳥之啞啞而已虛舌出口舌者心之苗心氣已絶故舌縱而不收齧齒咬人齒者骨之餘也腎臟精而主骨腎氣已絶齒多咬齧心為陽腎為陰陰陽相離安得不死魚口氣急啼不作聲魚口張而不合也是謂脾絶氣急作喘哭而無聲是謂肺絶蛔蟲既出必是死形蛔蟲生於胃藉穀食以養胃絶而穀食不食蟲乃出也按素問通評虛實論帝曰乳子而病熱脈懸小者何如岐伯曰手足溫則生寒則死此統言小兒之內外證也病熱脈懸小者陽證陰脈本為大禁但小而緩者陽之微也其愈則易小而急者邪之甚也為可慮耳脈雖小而手足溫者以四肢為諸陽之本陽猶在也故生若四肢寒冷則邪勝其正元陽去矣故死帝曰乳子中風熱喘鳴肩息者脈何如岐伯曰喘鳴肩息者脈實大也緩則生急則死此言小兒之外感也風熱中於陽分為喘鳴肩息者脈當實大但大而緩則胃氣存邪漸退故生實而急則真藏見病日進故死經文二節之義可見古人之診小兒者未嘗不重在脈即雖初脫胞胎亦自有脈可辨何後世幼科如水鏡訣及全幼心鑑等書別有察三關之說及遍考內經並無其名惟靈樞經脈篇有察手魚之色者若乎近之乃概言診法非獨為小兒也然則三關之說特後世之別名耳夫三關又為手陽明之浮絡原不足以候臟腑之氣且凡在小兒無論病與不病此脈皆紫白而兼乎青紅雖時有濃淡之異而四色常不相離何以辨其紫為風紅為寒青為驚白為疳又何以辨其為雷驚人驚水驚獸驚之的確乎此說自正但余見富貴之家兒女嬌弱一見醫者動輒喊哭若將握手診視勢必推阻百端宛轉悲啼汗流浹背父母姑息惟恐因哭受傷不覺從旁蹙額況因近來止看虎口一法相沿成俗則病家反以診脈為迂總之幼科大者曰痘曰痧雜證曰吐瀉驚疳之類其發也莫不先有昭然之形證可據不須布指切脈而用藥未致懸殊則虎口一說原可借用正不以古今為限也因備録虎口之說以通診法旁門云耳脈之指趣吉凶先定更有圓機活潑自審從證舍脈從脈舍證兩者畫然藥無不應脈之合證是其常也又有不當執者更不可不知於傷寒尤為吃緊如脈浮為表治宜汗之是其常也而亦有宜下者焉仲景云若脈浮大心下硬有熱屬臟者攻之不令發汗是也脈沉為里治宜下之是其常也而亦有宜汗者焉少陰病始得之反發熱而脈沉者麻黃附子細辛湯微汗之是也脈促為陽當用葛根芩連清之矣若脈促厥冷為虛脫非灸非溫不可此又非促為陽盛之脈也脈遲為寒當用乾薑附子溫之矣若陽明脈遲不惡寒身體濈濈汗出則用大承氣此又非遲為陰寒之脈矣四者皆從證不從脈也世有切脈而不問證其失可勝言哉表證汗之此其常也仲景曰病發熱頭痛脈反沉身體疼痛當救其里用四逆湯此從脈之沉也里證下之此其常也日晡發熱者屬陽明脈浮虛者發汗用桂枝湯此從脈之浮也結胸證具當以大小陷胸下之矣脈浮大者不可下下之則死是宜從脈而治其表也身疼痛者當以桂枝麻黃解之矣然尺中遲者不可汗以營血不足故也是宜從脈而調其營矣此皆從脈不從證也世有問證而忽脈者得非仲景之罪人乎
